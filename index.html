<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>True Embalagens · Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0c0c0c;--bg2:#141414;--bg3:#1c1c1c;--bg4:#222;
  --border:#2a2a2a;--border2:#333;
  --orange:#E87722;--orange2:#ff9944;--orange-dim:rgba(232,119,34,0.13);--orange-glow:rgba(232,119,34,0.3);
  --text:#f0f0f0;--text2:#aaa;--text3:#666;
  --green:#2ecc71;--green-dim:rgba(46,204,113,0.13);
  --red:#e74c3c;--red-dim:rgba(231,76,60,0.13);
  --blue:#5b8af5;--blue-dim:rgba(91,138,245,0.13);
  --yellow:#f1c40f;--yellow-dim:rgba(241,196,15,0.1);
  --purple:#a55eea;--purple-dim:rgba(165,94,234,0.13);
}
*{margin:0;padding:0;box-sizing:border-box;}
html{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;font-size:15px;}
body{min-height:100vh;padding-bottom:80px;}
.header{background:var(--bg2);border-bottom:2px solid var(--border2);padding:16px 40px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;flex-wrap:wrap;gap:12px;}
.logo{display:flex;align-items:center;gap:14px;}
.logo-icon{width:44px;height:44px;border:2px solid var(--orange);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.logo-name{font-size:22px;font-weight:800;letter-spacing:-0.5px;}
.logo-name em{color:var(--orange);font-style:normal;}
.logo-sub{font-size:11px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-top:2px;}
.header-controls{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.ctrl-box{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:8px 14px;}
.ctrl-label{font-size:11px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;}
.ctrl-input{background:transparent;border:none;outline:none;font-family:'DM Mono',monospace;font-size:16px;color:var(--orange);font-weight:500;width:65px;text-align:right;}
.btn{padding:9px 20px;border-radius:9px;border:none;cursor:pointer;font-family:'Syne',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;transition:all .2s;white-space:nowrap;}
.btn-primary{background:var(--orange);color:#fff;}
.btn-primary:hover{background:var(--orange2);}
.btn-ghost{background:transparent;color:var(--text3);border:1px solid var(--border2);}
.btn-ghost:hover{border-color:var(--text2);color:var(--text);}
.btn-sm{padding:5px 12px;font-size:11px;border-radius:6px;}
.btn-paid{background:var(--green-dim);color:var(--green);border:1px solid rgba(46,204,113,0.3);}
.btn-unpaid{background:var(--bg3);color:var(--text3);border:1px solid var(--border2);}
.tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);padding:0 40px;overflow-x:auto;}
.tab{padding:15px 22px;font-size:12px;font-weight:700;color:var(--text3);cursor:pointer;letter-spacing:1px;text-transform:uppercase;border-bottom:3px solid transparent;margin-bottom:-1px;transition:all .2s;white-space:nowrap;}
.tab:hover{color:var(--text2);}
.tab.active{color:var(--orange);border-bottom-color:var(--orange);}
.month-bar{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 40px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.month-btn{font-size:12px;padding:5px 16px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--text3);cursor:pointer;font-family:'Syne',sans-serif;font-weight:600;letter-spacing:.5px;transition:all .2s;}
.month-btn.active{background:var(--orange-dim);color:var(--orange);border-color:var(--orange-glow);}
.sync-bar{background:var(--bg3);border-bottom:1px solid var(--border);padding:8px 40px;display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--text3);}
.sync-status{display:flex;align-items:center;gap:8px;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);}
.sync-dot.loading{background:var(--yellow);animation:pulse 1s infinite;}
.sync-dot.error{background:var(--red);box-shadow:none;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.main{padding:28px 40px;max-width:1600px;}
.kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;margin-bottom:28px;}
.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:20px 22px;position:relative;overflow:hidden;}
.kpi::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--orange),var(--orange2));}
.kpi-icon{font-size:20px;margin-bottom:8px;}
.kpi-label{font-size:11px;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px;}
.kpi-val{font-family:'DM Mono',monospace;font-size:24px;font-weight:500;color:var(--text);line-height:1;}
.kpi-sub{font-size:12px;color:var(--text3);margin-top:5px;}
.section{margin-bottom:28px;}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.section-title{font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text2);}
.section-badge{font-size:11px;padding:4px 12px;border-radius:20px;background:var(--orange-dim);color:var(--orange);font-weight:600;}
.table-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:14px;overflow:hidden;}
.data-table{width:100%;border-collapse:collapse;font-size:14px;}
.data-table th{padding:12px 16px;text-align:right;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);background:var(--bg3);border-bottom:1px solid var(--border);}
.data-table th:first-child{text-align:left;}
.data-table td{padding:10px 16px;text-align:right;border-bottom:1px solid var(--border);font-variant-numeric:tabular-nums;font-family:'DM Mono',monospace;font-size:13px;color:var(--text2);}
.data-table td:first-child{text-align:left;font-family:'Syne',sans-serif;font-weight:700;font-size:14px;color:var(--text);}
.data-table tr:last-child td{border-bottom:none;}
.data-table tr:hover td{background:rgba(255,255,255,0.02);}
.data-table .total-row td{background:var(--bg3);color:var(--text);font-weight:700;border-top:2px solid var(--border2);}
.badge{display:inline-block;font-size:11px;padding:3px 10px;border-radius:20px;font-weight:700;font-family:'Syne',sans-serif;}
.b-up{background:var(--red-dim);color:var(--red);}
.b-down{background:var(--green-dim);color:var(--green);}
.b-neu{background:var(--bg3);color:var(--text3);}
.b-new{background:var(--blue-dim);color:var(--blue);}
.alerts{display:flex;flex-direction:column;gap:10px;margin-bottom:24px;}
.alert{display:flex;align-items:flex-start;gap:14px;padding:14px 18px;border-radius:12px;font-size:13px;}
.alert-warn{background:var(--yellow-dim);border:1px solid rgba(241,196,15,0.25);}
.alert-icon{font-size:18px;flex-shrink:0;}
.alert-text{line-height:1.6;}
.alert-text strong{display:block;font-size:14px;margin-bottom:2px;}
.chart-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:28px;}
.chart-bars{display:flex;align-items:flex-end;gap:8px;height:130px;margin-top:20px;}
.bar-group{display:flex;flex-direction:column;align-items:center;flex:1;gap:5px;}
.bar{width:100%;border-radius:5px 5px 0 0;background:var(--orange-dim);border:1px solid var(--orange-glow);transition:all .3s;min-height:4px;cursor:pointer;}
.bar:hover{background:var(--orange);}
.bar-lbl{font-size:10px;color:var(--text3);text-align:center;writing-mode:vertical-rl;transform:rotate(180deg);max-height:52px;}
.boletos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;margin-bottom:28px;}
.boleto-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:18px 20px;position:relative;overflow:hidden;transition:all .2s;}
.boleto-card.pago{border-color:rgba(46,204,113,0.35);opacity:.65;}
.boleto-card::before{content:'';position:absolute;top:0;left:0;bottom:0;width:4px;background:var(--orange);}
.boleto-card.pago::before{background:var(--green);}
.bol-data{font-size:11px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;padding-left:10px;margin-bottom:4px;}
.bol-total{font-size:12px;color:var(--text3);padding-left:10px;margin-bottom:10px;}
.bol-vals{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding-left:10px;margin-bottom:12px;}
.bol-item{display:flex;flex-direction:column;gap:3px;}
.bol-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;}
.bol-valor{font-family:'DM Mono',monospace;font-size:19px;font-weight:500;color:var(--text);}
.bol-venc{font-size:12px;color:var(--orange);font-weight:600;margin-top:2px;}
.bol-venc.pago{color:var(--green);}
.bol-actions{display:flex;gap:8px;padding-left:10px;}
.empty{text-align:center;padding:60px;color:var(--text3);font-size:14px;}
.loading-overlay{text-align:center;padding:80px;color:var(--text3);}
.spinner{width:36px;height:36px;border:3px solid var(--border2);border-top-color:var(--orange);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 20px;}
@keyframes spin{to{transform:rotate(360deg);}}
@media(max-width:1100px){.kpis{grid-template-columns:repeat(3,1fr);}.main,.header,.tabs,.month-bar,.sync-bar{padding-left:16px;padding-right:16px;}}
@media(max-width:700px){.kpis{grid-template-columns:repeat(2,1fr);}}

/* OPERACIONAL */
.op-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:28px;}
.op-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;margin-bottom:28px;}
.rank-list{display:flex;flex-direction:column;gap:8px;}
.rank-item{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;transition:all .2s;}
.rank-item:hover{border-color:var(--border2);}
.rank-pos{font-family:'DM Mono',monospace;font-size:18px;font-weight:700;width:28px;text-align:center;flex-shrink:0;}
.rank-pos.gold{color:#FFD700;}
.rank-pos.silver{color:#C0C0C0;}
.rank-pos.bronze{color:#CD7F32;}
.rank-pos.other{color:var(--text3);}
.rank-info{flex:1;}
.rank-name{font-size:14px;font-weight:700;color:var(--text);}
.rank-sub{font-size:11px;color:var(--text3);margin-top:2px;font-family:'DM Mono',monospace;}
.rank-score{text-align:right;}
.rank-pts{font-family:'DM Mono',monospace;font-size:16px;font-weight:700;color:var(--orange);}
.rank-pts-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;}
.bar-h-wrap{display:flex;flex-direction:column;gap:6px;}
.bar-h-item{display:flex;align-items:center;gap:10px;}
.bar-h-label{font-size:12px;color:var(--text2);width:80px;flex-shrink:0;text-align:right;}
.bar-h-track{flex:1;background:var(--bg3);border-radius:4px;height:22px;overflow:hidden;position:relative;}
.bar-h-fill{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:8px;font-size:11px;font-family:'DM Mono',monospace;font-weight:700;color:#000;white-space:nowrap;transition:width .6s ease;}
.bar-h-val{font-size:11px;font-family:'DM Mono',monospace;color:var(--text3);width:70px;text-align:right;flex-shrink:0;}
.alert-op{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;border-radius:10px;font-size:13px;margin-bottom:8px;}
.alert-op.red{background:rgba(231,76,60,0.08);border:1px solid rgba(231,76,60,0.2);}
.alert-op.yellow{background:var(--yellow-dim);border:1px solid rgba(241,196,15,0.2);}
.alert-op.blue{background:var(--blue-dim);border:1px solid rgba(91,138,245,0.2);}
.alert-op.green{background:var(--green-dim);border:1px solid rgba(46,204,113,0.2);}
.alert-op-icon{font-size:16px;flex-shrink:0;}
.alert-op-body{flex:1;line-height:1.5;}
.alert-op-body strong{display:block;margin-bottom:2px;}
.turno-compare{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.turno-card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:16px 18px;}
.turno-title{font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin-bottom:12px;}
.turno-stat{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);}
.turno-stat:last-child{border-bottom:none;}
.turno-stat-label{font-size:12px;color:var(--text3);}
.turno-stat-val{font-family:'DM Mono',monospace;font-size:13px;font-weight:700;color:var(--text);}
.podio{display:flex;align-items:flex-end;justify-content:center;gap:12px;padding:20px 0;}
.podio-item{display:flex;flex-direction:column;align-items:center;gap:8px;}
.podio-avatar{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;}
.podio-avatar.gold{background:rgba(255,215,0,0.15);border:2px solid #FFD700;}
.podio-avatar.silver{background:rgba(192,192,192,0.15);border:2px solid #C0C0C0;}
.podio-avatar.bronze{background:rgba(205,127,50,0.15);border:2px solid #CD7F32;}
.podio-name{font-size:13px;font-weight:700;color:var(--text);}
.podio-pts{font-family:'DM Mono',monospace;font-size:12px;color:var(--orange);}
.podio-base{padding:8px 16px;border-radius:8px;font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);}
.podio-base.gold{background:rgba(255,215,0,0.1);height:70px;display:flex;align-items:center;}
.podio-base.silver{background:rgba(192,192,192,0.08);height:50px;display:flex;align-items:center;}
.podio-base.bronze{background:rgba(205,127,50,0.08);height:35px;display:flex;align-items:center;}

/* ── VENDAS DIRETAS ─────────────────────────────── */
.vd-mes-btn{font-size:12px;padding:5px 14px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--text3);cursor:pointer;font-family:'Syne',sans-serif;font-weight:600;transition:all .2s;}
.vd-mes-btn.active{background:var(--green-dim);color:var(--green);border-color:rgba(46,204,113,0.4);}
.vd-vend-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px;margin-bottom:28px;}
.vd-vend-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:18px 20px;position:relative;overflow:hidden;}
.vd-vend-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--orange);}
.vd-vend-card.meta-ok::before{background:var(--green);}
.vd-vend-name{font-size:16px;font-weight:700;color:var(--text);margin-bottom:2px;display:flex;align-items:center;gap:8px;}
.vd-vend-medal{font-size:18px;}
.vd-vend-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:14px 0;}
.vd-stat{background:var(--bg3);border-radius:8px;padding:8px 10px;}
.vd-stat-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px;}
.vd-stat-val{font-family:'DM Mono',monospace;font-size:13px;font-weight:600;color:var(--text);}
.vd-meta-bar-wrap{margin-top:12px;}
.vd-meta-bar-label{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-bottom:5px;}
.vd-meta-bar-track{height:6px;background:var(--bg3);border-radius:99px;overflow:hidden;}
.vd-meta-bar-fill{height:100%;border-radius:99px;transition:width .4s ease;background:var(--orange);}
.vd-meta-bar-fill.ok{background:var(--green);}
.quinzena-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;}
.quinzena-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px 18px;position:relative;overflow:hidden;}
.quinzena-card::before{content:'';position:absolute;top:0;left:0;bottom:0;width:4px;background:var(--orange);}
.quinzena-card.pago::before{background:var(--green);}
.quinzena-title{font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;padding-left:10px;margin-bottom:3px;}
.quinzena-vendedor{font-size:14px;font-weight:700;color:var(--text);padding-left:10px;margin-bottom:8px;}
.quinzena-valor{font-family:'DM Mono',monospace;font-size:22px;font-weight:500;color:var(--orange);padding-left:10px;margin-bottom:3px;}
.quinzena-valor.pago{color:var(--green);}
.quinzena-periodo{font-size:11px;color:var(--text3);padding-left:10px;margin-bottom:10px;}
.quinzena-actions{padding-left:10px;}
.tag-margem{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px;font-family:'DM Mono',monospace;}
.tag-ok{background:rgba(46,204,113,.15);color:var(--green);}
.tag-atencao{background:rgba(230,179,0,.15);color:#e6b300;}
.tag-ruim{background:rgba(231,76,60,.15);color:var(--red);}

/* ── MERCADO ADS ──────────────────────────────────── */
.ads-upload-zone{border:2px dashed var(--border2);border-radius:14px;padding:48px;text-align:center;cursor:pointer;transition:all .2s;background:var(--bg2);margin-bottom:28px;}
.ads-upload-zone:hover{border-color:var(--orange);background:var(--orange-dim);}
.ads-upload-icon{font-size:32px;margin-bottom:12px;}
.ads-upload-title{font-size:16px;font-weight:700;color:var(--text);margin-bottom:6px;}
.ads-upload-sub{font-size:13px;color:var(--text3);}
.ads-period-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:20px;}
.ads-period-btn{font-size:12px;padding:5px 16px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--text3);cursor:pointer;font-family:'Syne',sans-serif;font-weight:600;transition:all .2s;}
.ads-period-btn.active{background:var(--orange-dim);color:var(--orange);border-color:var(--orange-glow);}
.ads-period-label{font-size:11px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-right:6px;}
.ads-class-hero{background:rgba(46,204,113,0.12);color:#2ecc71;border:1px solid rgba(46,204,113,0.25);display:inline-block;font-size:10px;font-weight:700;padding:2px 9px;border-radius:20px;font-family:'Syne',sans-serif;}
.ads-class-healthy{background:rgba(91,138,245,0.12);color:#5b8af5;border:1px solid rgba(91,138,245,0.25);display:inline-block;font-size:10px;font-weight:700;padding:2px 9px;border-radius:20px;font-family:'Syne',sans-serif;}
.ads-class-alert{background:rgba(241,196,15,0.12);color:#f1c40f;border:1px solid rgba(241,196,15,0.25);display:inline-block;font-size:10px;font-weight:700;padding:2px 9px;border-radius:20px;font-family:'Syne',sans-serif;}
.ads-class-cut{background:rgba(231,76,60,0.12);color:#e74c3c;border:1px solid rgba(231,76,60,0.25);display:inline-block;font-size:10px;font-weight:700;padding:2px 9px;border-radius:20px;font-family:'Syne',sans-serif;}
.ads-class-sub{background:rgba(165,94,234,0.12);color:#a55eea;border:1px solid rgba(165,94,234,0.25);display:inline-block;font-size:10px;font-weight:700;padding:2px 9px;border-radius:20px;font-family:'Syne',sans-serif;}
.ads-roas-bar{display:inline-block;height:5px;border-radius:3px;background:var(--orange);vertical-align:middle;margin-right:6px;}
.ads-insight{display:flex;align-items:flex-start;gap:14px;padding:16px 20px;border-radius:12px;font-size:13px;background:rgba(232,119,34,0.07);border:1px solid rgba(232,119,34,0.2);margin-bottom:24px;}
.ads-insight-icon{font-size:22px;flex-shrink:0;}
.ads-insight-body{line-height:1.65;color:var(--text);}
.ads-insight-body strong{color:var(--orange);display:block;font-size:14px;margin-bottom:3px;}
.ads-filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.ads-filter-btn{font-size:11px;padding:4px 12px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--text3);cursor:pointer;font-family:'Syne',sans-serif;font-weight:600;transition:all .2s;}
.ads-filter-btn.active{background:var(--orange-dim);color:var(--orange);border-color:var(--orange-glow);}
.ads-compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px;}
.ads-compare-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:18px 20px;}
.ads-compare-title{font-size:11px;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:14px;}
.ads-compare-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);}
.ads-compare-row:last-child{border-bottom:none;}
.ads-compare-label{font-size:12px;color:var(--text3);}
.ads-compare-val{font-family:'DM Mono',monospace;font-size:14px;font-weight:700;color:var(--text);}
.ads-compare-delta{font-size:11px;padding:2px 7px;border-radius:12px;font-weight:700;}
.ads-delta-up{background:rgba(46,204,113,0.13);color:#2ecc71;}
.ads-delta-down{background:rgba(231,76,60,0.13);color:#e74c3c;}

/* ── ETIQUETAS FULL ──────────────────────────────── */
.etq-wrap{max-width:700px;margin:0 auto;}
.etq-drop{border:2px dashed var(--border2);border-radius:14px;padding:56px 32px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;background:var(--bg2);position:relative;margin-bottom:20px;}
.etq-drop:hover,.etq-drop.drag-over{border-color:var(--orange);background:var(--orange-dim);}
.etq-drop input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.etq-drop-icon{font-size:40px;margin-bottom:14px;display:block;}
.etq-drop-label{font-size:16px;font-weight:700;color:var(--text);margin-bottom:6px;}
.etq-drop-hint{font-size:12px;color:var(--text3);}
.etq-config{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:22px;margin-bottom:16px;}
.etq-config-title{font-size:11px;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:16px;}
.etq-config-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
.etq-field{display:flex;flex-direction:column;gap:6px;}
.etq-field label{font-size:11px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;}
.etq-field select,.etq-field input[type=number]{background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'DM Mono',monospace;font-size:13px;padding:8px 10px;outline:none;width:100%;transition:border-color .2s;}
.etq-field select:focus,.etq-field input[type=number]:focus{border-color:var(--orange);}
.etq-info-bar{background:rgba(232,119,34,0.07);border:1px solid rgba(232,119,34,0.2);border-radius:8px;padding:12px 16px;font-size:12px;color:var(--orange);display:none;justify-content:space-between;margin-bottom:12px;}
.etq-info-bar.visible{display:flex;}
.etq-status{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px 16px;font-size:13px;color:var(--text3);display:none;align-items:center;gap:10px;margin-bottom:8px;}
.etq-status.visible{display:flex;}
.etq-sdot{width:8px;height:8px;border-radius:50%;background:var(--text3);flex-shrink:0;}
.etq-sdot.proc{background:var(--orange);animation:pulse 0.8s ease-in-out infinite alternate;}
.etq-sdot.done{background:var(--green);}
.etq-sdot.err{background:var(--red);}
.etq-progress{margin-bottom:8px;display:none;}
.etq-progress.visible{display:block;}
.etq-prog-track{width:100%;height:3px;background:var(--border);border-radius:2px;overflow:hidden;}
.etq-prog-fill{height:100%;background:var(--orange);width:0%;transition:width .3s ease;border-radius:2px;}
.etq-prog-label{font-size:11px;color:var(--text3);margin-top:5px;text-align:right;}
.etq-log{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:11px;color:var(--text3);line-height:1.8;max-height:110px;overflow-y:auto;display:none;margin-bottom:8px;}
.etq-log.visible{display:block;}
.etq-log .ok{color:var(--green);}
.etq-log .fail{color:var(--red);}
.etq-btn-convert{width:100%;background:var(--orange);color:#fff;font-family:'Syne',sans-serif;font-size:14px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;border:none;border-radius:10px;padding:17px;cursor:pointer;transition:background .15s;display:none;margin-bottom:10px;}
.etq-btn-convert.visible{display:block;}
.etq-btn-convert:hover{background:var(--orange2);}
.etq-btn-convert:disabled{background:var(--border);color:var(--text3);cursor:not-allowed;}
.etq-download{background:rgba(46,204,113,0.07);border:1px solid rgba(46,204,113,0.25);border-radius:12px;padding:20px;display:none;align-items:center;justify-content:space-between;gap:14px;margin-bottom:10px;}
.etq-download.visible{display:flex;}
.etq-dl-name{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--green);}
.etq-dl-meta{font-size:12px;color:var(--text3);margin-top:3px;}
.etq-btn-dl{background:var(--green);color:#000;font-family:'Syne',sans-serif;font-size:12px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;border:none;border-radius:8px;padding:11px 18px;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:background .15s;}
.etq-btn-dl:hover{background:#1abf52;}
.etq-btn-reset{width:100%;background:transparent;border:1px solid var(--border);color:var(--text3);font-family:'DM Mono',monospace;font-size:12px;padding:9px;border-radius:8px;cursor:pointer;transition:border-color .2s,color .2s;display:none;}
.etq-btn-reset.visible{display:block;}
.etq-btn-reset:hover{border-color:var(--text2);color:var(--text);}
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-icon">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <rect x="2" y="5" width="16" height="16" rx="2" stroke="#E87722" stroke-width="2"/>
        <path d="M7 13h6M10 10v6" stroke="#E87722" stroke-width="2" stroke-linecap="round"/>
        <path d="M10 2C10 2 13.5 0 17 2" stroke="white" stroke-width="1.8" stroke-linecap="round" fill="none"/>
      </svg>
    </div>
    <div>
      <div class="logo-name">True Embalagens<em>.</em></div>
      <div class="logo-sub">Dashboard de Produção</div>
    </div>
  </div>
  <div class="header-controls">
    <div class="ctrl-box">
      <span class="ctrl-label">Fator kg</span>
      <span style="color:var(--text3);font-size:13px">R$</span>
      <input class="ctrl-input" type="number" step="0.01" id="fatorKg" value="14.50" onchange="render()">
    </div>
    <div class="ctrl-box" id="moCtrl">
      <span class="ctrl-label">MO / kg</span>
      <span style="color:var(--text3);font-size:13px">R$</span>
      <input class="ctrl-input" type="number" step="0.01" id="moKg" value="4.40" onchange="render()" style="width:55px;">
    </div>
    <button class="btn btn-primary" onclick="syncSheets()">↻ Atualizar</button>
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="setFab(0)">ALP — Fábrica 1</div>
  <div class="tab" onclick="setFab(1)">Primícia — Fábrica 2</div>
  <div class="tab" onclick="setFab(2)">Consolidado</div>
  <div class="tab" onclick="setFab(3)">Operacional</div>
  <div class="tab" onclick="setFab(4)">Produtividade</div>
  <div class="tab" onclick="setFab(5)">💰 Vendas Diretas</div>
  <div class="tab" onclick="setFab(6)">📊 Mercado Ads</div>
  <div class="tab" onclick="setFab(7)">📦 Etiquetas Full</div>
</div>

<div class="month-bar" id="monthBar"></div>

<div class="sync-bar">
  <div class="sync-status">
    <div class="sync-dot loading" id="syncDot"></div>
    <span id="syncMsg">Conectando ao Google Sheets...</span>
  </div>
  <span id="syncTime"></span>
</div>

<div class="main" id="main">
  <div class="loading-overlay"><div class="spinner"></div>Carregando dados...</div>
</div>

<script>
// ── IDs das abas publicadas ──
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx0kRg5q4rzshc3ZQPTCIYMjC5r6S6nSnA3l1ciOqkVuf6kSt-9Hdna3FNXJe5kYBp5/exec';

const ABRIL_REF={
  '12x18':29.47,'15x20':32.35,'15x25':38.17,'20x20':41.29,
  '19x25':57.52,'20x30':69.74,'26x36':109.17,'32x40':143.18,
  '40x40':166.29,'40x50':218.42,'40x60':271.64,'50x50':223.59,
  '50x60':322.68,'50x70':400.51,'60x50':335.01,'70x60':451.60,
  '80x60':535.58,'100x60':669.66,
};

let STATE={
  fab:0, f1:[], f2:[], vendas:[],
  months:[], selMonth:null, selMesVenda:null,
  paid:JSON.parse(localStorage.getItem('truePaid')||'{}'),
  ads:[],
  selPeriodoAds:null,
  paidComissao:JSON.parse(localStorage.getItem('truePaidComissao')||'{}'),
};

function getFator(){return parseFloat(document.getElementById('fatorKg').value)||14.50;}
function getMO(){return parseFloat(document.getElementById('moKg').value)||4.40;}
function ceilCents(n){return Math.ceil(n*100)/100;}
function fmt(n){return 'R$ '+n.toFixed(2).replace('.',',');}
function fmtN(n){return n.toLocaleString('pt-BR');}

function parseKg(s){
  if(!s) return 0;
  const clean = String(s).replace(/\s/g,'');
  const num = parseFloat(clean.replace('.',''));
  if(isNaN(num)) return 0;
  return num / 1000;
}

function parseMil(s){
  if(!s) return 0;
  const clean = String(s).replace(/\s/g,'').replace(',','.');
  const num = parseFloat(clean.replace('.',''));
  if(isNaN(num)) return 0;
  return num / 1000;
}

function extractMonth(data){
  const p=String(data).split('/');
  if(p.length>=2) return p[1].padStart(2,'0')+'/'+(p[2]||'2025');
  return null;
}

function monthLabel(m){
  if(!m) return '';
  const [mm,yy]=m.split('/');
  const n=['','Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  return n[parseInt(mm)]+' '+yy;
}

function parseCSV(text){
  const lines=text.split('\n').map(l=>l.trim()).filter(l=>l);
  return lines.map(line=>{
    const cols=[];let cur='',inq=false;
    for(let c=0;c<line.length;c++){
      if(line[c]==='"'){inq=!inq;}
      else if(line[c]===','&&!inq){cols.push(cur.trim());cur='';}
      else cur+=line[c];
    }
    cols.push(cur.trim());
    return cols;
  });
}

function parseRows(csv, hasmo){
  const rows=parseCSV(csv);
  const result=[];
  let id=1;
  let startRow=1;
  for(let i=0;i<Math.min(5,rows.length);i++){
    if(rows[i].some(c=>c.toLowerCase()==='data'||c.toLowerCase()==='kg')){
      startRow=i+1; break;
    }
  }
  for(let i=startRow;i<rows.length;i++){
    const c=rows[i];
    if(!c[0]||!c[0].trim()) continue;
    let data='';
    const raw=c[0].trim();
    if(raw.match(/^\d{1,2}\/\d{1,2}/)){
      data=raw.split('/').slice(0,2).map(p=>p.padStart(2,'0')).join('/');
    } else if(raw.includes('GMT')||raw.match(/^[A-Za-z]{3}\s/)){
      const d=new Date(raw);
      if(!isNaN(d)){
        data=String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0');
      }
    }
    if(!data) continue;
    const kgRaw=String(c[1]||'').trim();
    const kg=parseFloat(kgRaw)/1000;
    if(!kg||isNaN(kg)) continue;
    const fardos=parseInt(c[2])||0;
    const med=c[3]?c[3].trim().toUpperCase().replace(/X/gi,'x'):'';
    if(!med) continue;
    const milRaw=String(c[4]||'').trim();
    const mil=parseFloat(milRaw)/1000;
    if(!mil||isNaN(mil)) continue;
    let mo=0;
    if(hasmo&&c[5]){
      const ms=String(c[5]).replace(/[R$\s]/g,'').replace(',','.').replace(/\.(?=.*\.)/g,'');
      mo=parseFloat(ms)||0;
    }
    const baseIdx = hasmo ? 6 : 5;
    const maquina = c[baseIdx]   ? String(c[baseIdx]).trim().toUpperCase() : '';
    const turno   = c[baseIdx+1] ? String(c[baseIdx+1]).trim() : '';
    const operador= c[baseIdx+2] ? String(c[baseIdx+2]).trim() : '';
    const perdaRaw= c[baseIdx+3] ? String(c[baseIdx+3]).trim().replace(',','.') : '0';
    const perda   = parseFloat(perdaRaw) || 0;
    result.push({id:id++,data,kg,fardos,med,mil,mo,maquina,turno,operador,perda});
  }
  return result;
}

async function syncSheets(){
  const dot=document.getElementById('syncDot');
  const msg=document.getElementById('syncMsg');
  dot.className='sync-dot loading';
  msg.textContent='Sincronizando com Google Sheets...';
  try{
    msg.textContent='Buscando ALP...';
    const r1 = await fetch(`${SCRIPT_URL}?aba=alp`,{signal:AbortSignal.timeout(3000)}).then(r=>{
      if(!r.ok) throw new Error('ALP erro '+r.status);
      return r.text();
    });
    msg.textContent='Buscando Primícia...';
    const r2 = await fetch(`${SCRIPT_URL}?aba=primicia`,{signal:AbortSignal.timeout(3000)}).then(r=>{
      if(!r.ok) throw new Error('Primícia erro '+r.status);
      return r.text();
    });
    msg.textContent='Buscando Vendas Diretas...';
    const r3 = await fetch(`${SCRIPT_URL}?aba=vendas`,{signal:AbortSignal.timeout(3000)}).then(r=>{
      if(!r.ok) throw new Error('Vendas erro '+r.status);
      return r.text();
    });
    STATE.f1=parseRows(r1,true);
    STATE.f2=parseRows(r2,false);
    STATE.vendas=parseVendas(r3);
    buildMonths();
    dot.className='sync-dot';
    msg.textContent=`✓ Conectado · ALP: ${STATE.f1.length} lotes · Primícia: ${STATE.f2.length} lotes · Vendas: ${STATE.vendas.length} pedidos`;
    document.getElementById('syncTime').textContent='Atualizado às '+new Date().toLocaleTimeString('pt-BR');
    render();
  }catch(e){
    dot.className='sync-dot error';
    msg.textContent='Erro: '+e.message;
    console.error(e);
  }
}

function buildMonths(){
  const set=new Set();
  [...STATE.f1,...STATE.f2].forEach(r=>{const m=extractMonth(r.data);if(m)set.add(m);});
  STATE.months=Array.from(set).sort();
  if(!STATE.selMonth||!STATE.months.includes(STATE.selMonth))
    STATE.selMonth=STATE.months[STATE.months.length-1]||null;
}

function getRows(){
  const src=STATE.fab===0?STATE.f1:STATE.fab===1?STATE.f2:[...STATE.f1,...STATE.f2];
  return STATE.selMonth?src.filter(r=>extractMonth(r.data)===STATE.selMonth):src;
}

function getPrevRows(){
  const src=STATE.fab===0?STATE.f1:STATE.fab===1?STATE.f2:[...STATE.f1,...STATE.f2];
  const idx=STATE.months.indexOf(STATE.selMonth);
  if(idx<=0) return [];
  const prev=STATE.months[idx-1];
  return src.filter(r=>extractMonth(r.data)===prev);
}

function consolidate(rows){
  const map={};
  rows.forEach(r=>{
    if(!map[r.med])map[r.med]={med:r.med,kg:0,fardos:0,mil:0};
    map[r.med].kg+=r.kg;map[r.med].fardos+=r.fardos;map[r.med].mil+=r.mil;
  });
  return Object.values(map).sort((a,b)=>a.med.localeCompare(b.med));
}

function calcCusto(kg,mil){
  return ceilCents((kg/mil)*getFator());
}

function kgPorUnidade(kg, mil){
  return kg / (mil * 1000);
}

function kgPorMilheiro(kg, mil){
  return kg / mil;
}

function getBoletos(rows){
  const byDay={};
  rows.forEach(r=>{
    if(!byDay[r.data])byDay[r.data]={data:r.data,kg:0};
    byDay[r.data].kg+=r.kg;
  });
  const moKg=getMO();
  return Object.values(byDay).sort((a,b)=>a.data.localeCompare(b.data)).map(d=>{
    const total=d.kg*moKg;
    if(total<=0) return null;
    const [dd,mm]=(d.data+'/2025').split('/').map(Number);
    const yy=2025;
    const base=new Date(yy,mm-1,dd);
    const v21=new Date(base);v21.setDate(v21.getDate()+21);
    const v28=new Date(base);v28.setDate(v28.getDate()+28);
    const fd=dt=>`${String(dt.getDate()).padStart(2,'0')}/${String(dt.getMonth()+1).padStart(2,'0')}/${dt.getFullYear()}`;
    const k1=d.data+'_b1',k2=d.data+'_b2';
    return{data:d.data,total,
      b1:{val:total/2,venc:fd(v21),key:k1,paid:!!STATE.paid[k1]},
      b2:{val:total/2,venc:fd(v28),key:k2,paid:!!STATE.paid[k2]},
    };
  }).filter(Boolean);
}

function togglePaid(key){
  if(STATE.paid[key])delete STATE.paid[key];
  else STATE.paid[key]=true;
  localStorage.setItem('truePaid',JSON.stringify(STATE.paid));
  render();
}

function getAlerts(rows){
  const cons=consolidate(rows);
  const alerts=[];
  cons.forEach(c=>{
    const media=kgPorUnidade(c.kg, c.mil);
    rows.filter(r=>r.med===c.med).forEach(r=>{
      const lote=kgPorUnidade(r.kg, r.mil);
      const dev=Math.abs((lote-media)/media);
      if(dev>0.20)alerts.push({med:c.med,data:r.data,lote,media,dev});
    });
  });
  return alerts.slice(0,5);
}

function setFab(i){
  STATE.fab=i;
  document.querySelectorAll('.tab').forEach((t,j)=>t.classList.toggle('active',i===j));
  document.getElementById('moCtrl').style.display=i===0?'flex':'none';
  document.getElementById('monthBar').style.display=(i===3||i===4||i===5||i===6||i===7)?'none':'flex';
  render();
}

function setMonth(m){
  STATE.selMonth=m;
  renderMonthBar();
  render();
}

function renderMonthBar(){
  document.getElementById('monthBar').innerHTML=STATE.months.map(m=>
    `<button class="month-btn${m===STATE.selMonth?' active':''}" onclick="setMonth('${m}')">${monthLabel(m)}</button>`
  ).join('');
}

function render(){
  if(STATE.fab===3){ renderOperacional(); return; }
  if(STATE.fab===4){ renderProdutividade(); return; }
  if(STATE.fab===5){ renderVendas(); return; }
  if(STATE.fab===6){ renderAds(); return; }
  if(STATE.fab===7){ renderEtiquetas(); return; }
  renderMonthBar();
  const rows=getRows();
  if(!rows.length && !STATE.f1.length && !STATE.f2.length){
    document.getElementById('main').innerHTML=`<div style="padding:80px;text-align:center;color:var(--text3)">
      <div style="font-size:40px;margin-bottom:16px">📡</div>
      <div style="font-size:16px;font-weight:700;color:var(--text2);margin-bottom:8px">Sem dados carregados</div>
      <div style="font-size:13px;line-height:1.7">Clique em <strong style="color:var(--orange)">↻ Atualizar</strong> para conectar ao Google Sheets.</div>
    </div>`;
    return;
  }
  const prevRows=getPrevRows();
  const cons=consolidate(rows);
  const prevMap={};consolidate(prevRows).forEach(c=>prevMap[c.med]=c);
  const isALP=STATE.fab===0;
  const isCons=STATE.fab===2;
  const fabLabel=STATE.fab===0?'ALP':STATE.fab===1?'Primícia':'ALP + Primícia';
  const prevMonthLabel=STATE.months[STATE.months.indexOf(STATE.selMonth)-1];

  const totalKg=cons.reduce((s,c)=>s+c.kg,0);
  const totalMil=cons.reduce((s,c)=>s+c.mil,0);
  const totalFardos=cons.reduce((s,c)=>s+c.fardos,0);
  const alerts=getAlerts(rows);

  let html=`<div class="kpis">
    <div class="kpi"><div class="kpi-icon">⚖️</div><div class="kpi-label">Peso Total</div><div class="kpi-val">${totalKg.toLocaleString('pt-BR',{maximumFractionDigits:0})} kg</div><div class="kpi-sub">${rows.length} lotes · ${monthLabel(STATE.selMonth)}</div></div>
    <div class="kpi"><div class="kpi-icon">📦</div><div class="kpi-label">Unidades</div><div class="kpi-val">${(totalMil*1000).toLocaleString('pt-BR')}</div><div class="kpi-sub">${totalMil.toLocaleString('pt-BR')} milheiros</div></div>
    <div class="kpi"><div class="kpi-icon">🗂️</div><div class="kpi-label">Fardos</div><div class="kpi-val">${fmtN(totalFardos)}</div><div class="kpi-sub">${cons.length} medidas</div></div>
    <div class="kpi"><div class="kpi-icon">💰</div><div class="kpi-label">Fator kg</div><div class="kpi-val" style="color:var(--orange)">R$ ${getFator().toFixed(2).replace('.',',')}</div><div class="kpi-sub">Editável no topo</div></div>`;

  if(isALP){
    const bols=getBoletos(STATE.f1.filter(r=>extractMonth(r.data)===STATE.selMonth));
    const pend=bols.reduce((s,b)=>s+(!b.b1.paid?b.b1.val:0)+(!b.b2.paid?b.b2.val:0),0);
    html+=`<div class="kpi"><div class="kpi-icon">🧾</div><div class="kpi-label">MO Pendente</div><div class="kpi-val" style="color:var(--purple)">${fmt(pend)}</div><div class="kpi-sub">Total: ${fmt(totalKg*getMO())}</div></div>`;
  }else{
    html+=`<div class="kpi"><div class="kpi-icon">🏭</div><div class="kpi-label">Operação</div><div class="kpi-val" style="font-size:16px">${STATE.fab===1?'Própria':'Consolidado'}</div><div class="kpi-sub">${STATE.fab===1?'Sem custo MO':'ALP + Primícia'}</div></div>`;
  }
  html+=`</div>`;

  if(alerts.length){
    html+=`<div class="alerts">`;
    alerts.forEach(a=>{
      html+=`<div class="alert alert-warn"><div class="alert-icon">⚠️</div><div class="alert-text"><strong>Lote fora da média — ${a.med} · ${a.data}</strong>kg/unidade deste lote: ${a.lote.toFixed(6)} kg · Média: ${a.media.toFixed(6)} kg · <strong>${(a.dev*100).toFixed(0)}% ${a.lote>a.media?'acima':'abaixo'} da média</strong></div></div>`;
    });
    html+=`</div>`;
  }

function etqHandleFile(file){
  ETQ.fileName = file.name;
  const reader = new FileReader();
  reader.onload = e => {
    ETQ.labels = etqSplitZPL(e.target.result);
    document.getElementById('etqInfoBar').classList.add('visible');
    document.getElementById('etqFileNameLabel').textContent = file.name;
    document.getElementById('etqLabelCount').textContent = `${ETQ.labels.length} etiquetas · ${Math.ceil(ETQ.labels.length/50)} lotes`;
    document.getElementById('etqBtnConvert').classList.add('visible');
    etqSetStatus('idle', `${ETQ.labels.length} etiquetas encontradas. Pronto para gerar PDF.`);
  };
  reader.readAsText(file, 'UTF-8');
}

function etqSplitZPL(content){
  const labels = [];
  let current = '';
  const parts = content.split(/(\^XZ)/i);
  for(const part of parts){
    current += part;
    if(/\^XZ/i.test(part)){
      const t = current.trim();
      if(t && /\^XA/i.test(t)) labels.push(t);
      current = '';
    }
  }
  if(current.trim() && /\^XA/i.test(current)) labels.push(current.trim());
  return labels;
}

function etqSetStatus(type, msg){
  const bar = document.getElementById('etqStatus');
  const dot = document.getElementById('etqSDot');
  const txt = document.getElementById('etqStatusText');
  if(!bar) return;
  bar.classList.add('visible');
  dot.className = 'etq-sdot';
  txt.textContent = msg;
  if(type==='proc') dot.classList.add('proc');
  else if(type==='done') dot.classList.add('done');
  else if(type==='err') dot.classList.add('err');
}

function etqAddLog(msg, cls){
  const log = document.getElementById('etqLog');
  if(!log) return;
  log.classList.add('visible');
  const line = document.createElement('div');
  line.textContent = msg;
  if(cls) line.className = cls;
  log.appendChild(line);
  log.scrollTop = log.scrollHeight;
}

async function etqLoadPdfLib(){
  if(window.PDFLib) return window.PDFLib;
  return new Promise((res,rej)=>{
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js';
    s.onload = ()=>res(window.PDFLib);
    s.onerror = rej;
    document.head.appendChild(s);
  });
}

async function etqConvert(){
  if(!ETQ.labels.length) return;

  const btn     = document.getElementById('etqBtnConvert');
  const progW   = document.getElementById('etqProgress');
  const progF   = document.getElementById('etqProgFill');
  const progL   = document.getElementById('etqProgLabel');
  const logEl   = document.getElementById('etqLog');

  btn.disabled  = true;
  btn.textContent = 'Gerando...';
  progW.classList.add('visible');
  logEl.innerHTML = '';
  logEl.classList.add('visible');
  document.getElementById('etqDownload').classList.remove('visible');
  document.getElementById('etqBtnReset').classList.remove('visible');

  const dpmm = document.getElementById('etqDpmm').value;
  const w    = document.getElementById('etqWidth').value;
  const h    = document.getElementById('etqHeight').value;
  const URL  = `https://api.labelary.com/v1/printers/${dpmm}dpmm/labels/${w}x${h}/`;
  const BATCH = 50;

  const batches = [];
  for(let i=0; i<ETQ.labels.length; i+=BATCH)
    batches.push(ETQ.labels.slice(i, i+BATCH));

  etqSetStatus('proc', `Convertendo ${ETQ.labels.length} etiquetas em ${batches.length} lotes...`);

  const pdfBuffers = [];
  let ok=0, fail=0;

  for(let i=0; i<batches.length; i++){
    const batchZpl = batches[i].join('\n');
    const start = i*BATCH+1;
    const end   = start+batches[i].length-1;
    if(i>0) await new Promise(r=>setTimeout(r,380));
    try{
      const resp = await fetch(URL, {
        method:'POST',
        headers:{'Content-Type':'application/x-www-form-urlencoded','Accept':'application/pdf'},
        body: batchZpl,
      });
      if(!resp.ok) throw new Error(`HTTP ${resp.status}`);
      pdfBuffers.push(await resp.arrayBuffer());
      ok += batches[i].length;
      etqAddLog(`✓ Lote ${i+1}/${batches.length} — etiquetas ${start}–${end}`, 'ok');
    }catch(e){
      fail += batches[i].length;
      etqAddLog(`✗ Lote ${i+1}/${batches.length} — ERRO: ${e.message}`, 'fail');
    }
    const pct = Math.round(((i+1)/batches.length)*100);
    progF.style.width = pct+'%';
    progL.textContent = `${i+1} / ${batches.length} lotes (${pct}%)`;
    etqSetStatus('proc', `Lote ${i+1} de ${batches.length} — ${ok} OK${fail?', '+fail+' erro':''}`);
  }

  if(!pdfBuffers.length){
    etqSetStatus('err','Nenhum lote convertido. Verifique o arquivo ZPL.');
    btn.disabled=false; btn.textContent='Gerar PDF'; return;
  }

  etqSetStatus('proc','Mesclando PDFs...');

  try{
    const PDFLib = await etqLoadPdfLib();
    const merged = await PDFLib.PDFDocument.create();
    for(const buf of pdfBuffers){
      const doc = await PDFLib.PDFDocument.load(buf);
      const pages = await merged.copyPages(doc, doc.getPageIndices());
      pages.forEach(p=>merged.addPage(p));
    }
    const bytes = await merged.save();
    ETQ.blob = new Blob([bytes],{type:'application/pdf'});

    const outName = ETQ.fileName.replace(/\.(txt|zpl)$/i,'')+'.pdf';
    const sizeKB  = Math.round(bytes.byteLength/1024);

    document.getElementById('etqDlName').textContent = outName;
    document.getElementById('etqDlMeta').textContent = `${ok} etiquetas · ${sizeKB} KB${fail?' · '+fail+' com erro':''}`;
    document.getElementById('etqDownload').classList.add('visible');
    document.getElementById('etqBtnReset').classList.add('visible');

    document.getElementById('etqBtnDl').onclick = ()=>{
      const a = document.createElement('a');
      a.href = URL.createObjectURL(ETQ.blob);
      a.download = outName;
      a.click();
    };

    etqSetStatus('done', `Pronto! ${ok} etiquetas convertidas.${fail?' ('+fail+' falharam)':''}`);
  }catch(e){
    etqSetStatus('err','Erro ao mesclar: '+e.message);
  }

  btn.disabled=false; btn.textContent='Gerar PDF';
}

function etqReset(){
  ETQ.labels=[];
  ETQ.blob=null;
  ETQ.fileName='';
  renderEtiquetas();
}

function diasUteisNoMes(mesRef){
  if(!mesRef) return 22;
  const [mm,yy]=mesRef.split('/').map(Number);
  const ano=yy<100?2000+yy:yy;
  const dias=new Date(ano,mm,0).getDate();
  let uteis=0;
  for(let d=1;d<=dias;d++){
    const dow=new Date(ano,mm-1,d).getDay();
    if(dow!==0&&dow!==6) uteis++;
  }
  return uteis;
}

function diasUteisDecorridos(mesRef){
  if(!mesRef) return 1;
  const [mm,yy]=mesRef.split('/').map(Number);
  const ano=yy<100?2000+yy:yy;
  const hoje=new Date();
  const anoNorm=ano<100?2000+ano:ano;
  const eMesAtual=(hoje.getFullYear()===anoNorm && hoje.getMonth()+1===mm);
  const limDia=eMesAtual?hoje.getDate():new Date(anoNorm,mm,0).getDate();
  let uteis=0;
  for(let d=1;d<=limDia;d++){
    const dow=new Date(anoNorm,mm-1,d).getDay();
    if(dow!==0&&dow!==6) uteis++;
  }
  return Math.max(uteis,1);
}

function parseVendas(csv){
  const rows=parseCSV(csv);
  const result=[];
  let startRow=1;
  for(let i=0;i<Math.min(5,rows.length);i++){
    if(rows[i].some(c=>['data','vendedor'].includes((c||'').toLowerCase().trim()))){startRow=i+1;break;}
  }
  for(let i=startRow;i<rows.length;i++){
    const c=rows[i];
    if(!c[0]||!String(c[0]).trim()) continue;
    const raw=String(c[0]).trim();
    let data='';
    if(raw.match(/^\d{1,2}\/\d{1,2}/)){
      data=raw.split('/').slice(0,2).map(p=>p.padStart(2,'0')).join('/');
    } else {
      const d=new Date(raw);
      if(!isNaN(d)) data=String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0');
    }
    if(!data) continue;
    const vendedor=(c[1]||'').trim();
    const cliente=(c[2]||'').trim();
    const itensRaw=(c[3]||'').trim();
    const valorTotal=parseFloat(String(c[4]||'').replace(/[R$\s]/g,'').replace(',','.'))||0;
    const freteCobrado=parseFloat(String(c[5]||'').replace(/[R$\s\-]/g,'').replace(',','.'))||0;
    const prazo=(c[6]||'').trim();
    const freteCusto=parseFloat(String(c[7]||'').replace(/[R$\s\-]/g,'').replace(',','.'))||0;
    if(!valorTotal) continue;
    const itens=[];
    itensRaw.split('/').forEach(part=>{
      const p=part.trim().split(':');
      if(p.length<3) return;
      const med=p[0].trim().toUpperCase().replace(/X/gi,'x');
      const qtdRaw=p[1].trim().toLowerCase().replace(',','.');
      let qtdMil=0;
      if(qtdRaw.endsWith('uni')) qtdMil=parseFloat(qtdRaw.replace('uni',''))/1000;
      else qtdMil=parseFloat(qtdRaw.replace('mil',''))||0;
      const precoTotal=parseFloat(p[2].trim().replace(',','.'))||0;
      if(med&&qtdMil&&precoTotal) itens.push({med,qtdMil,precoTotal});
    });
    const temComissao=!['ramon'].includes(vendedor.toLowerCase().trim());
    const baseComissao=valorTotal-freteCobrado;
    const comissao=temComissao?ceilCents(baseComissao*0.05):0;
    const parcelas=calcParcelas(data,valorTotal,prazo);
    const [dd]=data.split('/').map(Number);
    const quinzena=dd<=15?'primeira':'segunda';
    const mesRef=extractMonth(data);
    result.push({data,vendedor,cliente,itensRaw,itens,valorTotal,freteCobrado,freteCusto,prazo,baseComissao,comissao,temComissao,parcelas,quinzena,mesRef});
  }
  return result;
}

function calcParcelas(data,valor,prazo){
  if(!prazo||['à vista','a vista'].includes(prazo.toLowerCase()))
    return [{label:'À vista',valor,venc:data}];
  const dias=prazo.split('/').map(d=>parseInt(d.trim())).filter(d=>!isNaN(d)&&d>0);
  if(!dias.length) return [{label:'À vista',valor,venc:data}];
  const [dd,mm]=data.split('/').map(Number);
  const ano=new Date().getFullYear();
  const base=new Date(ano,mm-1,dd);
  const valParcela=ceilCents(valor/dias.length);
  return dias.map(d=>{
    const dt=new Date(base); dt.setDate(dt.getDate()+d);
    const venc=String(dt.getDate()).padStart(2,'0')+'/'+String(dt.getMonth()+1).padStart(2,'0')+'/'+dt.getFullYear();
    return {label:d+' dias',valor:valParcela,venc};
  });
}

function getCustoMilMaisRecente(med){
  const porMes={};
  [...STATE.f1,...STATE.f2].forEach(r=>{
    if(r.med!==med) return;
    const m=extractMonth(r.data);
    if(!m) return;
    if(!porMes[m])porMes[m]={kg:0,mil:0};
    porMes[m].kg+=r.kg; porMes[m].mil+=r.mil;
  });
  const meses=Object.keys(porMes).sort();
  if(!meses.length) return 0;
  const d=porMes[meses[meses.length-1]];
  return d.mil?calcCusto(d.kg,d.mil):0;
}

function getCustoVenda(venda){
  return venda.itens.reduce((s,it)=>{
    const c=getCustoMilMaisRecente(it.med);
    return s+(c?c*it.qtdMil:0);
  },0);
}

function getLucroVenda(venda){
  return venda.valorTotal-venda.freteCusto-venda.comissao-getCustoVenda(venda);
}

function getMargemVenda(venda){
  if(!venda.valorTotal) return 0;
  return (getLucroVenda(venda)/venda.valorTotal)*100;
}

function tagMargem(pct){
  if(pct>=15) return `<span class="tag-margem tag-ok">${pct.toFixed(1)}%</span>`;
  if(pct>=0)  return `<span class="tag-margem tag-atencao">${pct.toFixed(1)}%</span>`;
  return `<span class="tag-margem tag-ruim">${pct.toFixed(1)}%</span>`;
}

function parseAdsXLSX(arrayBuffer){
  const XLSX = window.XLSX;
  const wb   = XLSX.read(arrayBuffer,{type:'array'});
  const sheetName = wb.SheetNames.find(n=>n.toLowerCase().includes('relat'))||wb.SheetNames[0];
  const ws   = wb.Sheets[sheetName];
  const raw  = XLSX.utils.sheet_to_json(ws,{header:1,defval:''});

  let headerRow=-1;
  for(let i=0;i<Math.min(10,raw.length);i++){
    if(raw[i].some(c=>String(c).toLowerCase().includes('título')||String(c).toLowerCase().includes('titulo'))){
      headerRow=i; break;
    }
  }
  if(headerRow<0) return {rows:[],periodoLabel:'',dias:30};

  const headers=raw[headerRow].map(h=>String(h).toLowerCase().replace(/\n/g,' ').trim());
  const fi=name=>headers.findIndex(h=>h.includes(name));
  const idx={
    campanha:fi('campanha'), titulo:fi('título')||fi('titulo'),
    impressoes:fi('impres'), cliques:fi('clique'), cvr:fi('cvr'),
    receita:headers.findIndex(h=>h.includes('receita')&&!h.includes('diret')&&!h.includes('indir')),
    invest:fi('investimento'), acos:fi('acos'),
    vendasDir:headers.findIndex(h=>h.includes('diretas')&&!h.includes('receita')),
    vendasIndir:headers.findIndex(h=>h.includes('indir')&&!h.includes('receita')),
    desde:fi('desde'), ate:fi('até')||fi('ate'),
  };

  let periodoLabel='', datas=[];
  for(let i=0;i<headerRow;i++){
    for(const cell of raw[i]){
      const s=String(cell);
      if(s.match(/\d{2}[\s-](jan|fev|mar|abr|mai|jun|jul|ago|set|out|nov|dez)/i)||
         s.match(/\d{2}[\/\-]\d{2}[\/\-]\d{4}/)){
        periodoLabel=s.trim(); break;
      }
    }
    if(periodoLabel) break;
  }

  const meses={'jan':0,'fev':1,'mar':2,'abr':3,'mai':4,'jun':5,'jul':6,'ago':7,'set':8,'out':9,'nov':10,'dez':11};
  function parsePTDate(s){
    const m=s.match(/(\d{1,2})[\s-](jan|fev|mar|abr|mai|jun|jul|ago|set|out|nov|dez)[a-z]*[\s-]*(\d{4})?/i);
    if(m) return new Date(parseInt(m[3]||2026), meses[m[2].toLowerCase().slice(0,3)], parseInt(m[1]));
    const m2=s.match(/(\d{2})[\/\-](\d{2})[\/\-](\d{4})/);
    if(m2) return new Date(parseInt(m2[3]),parseInt(m2[2])-1,parseInt(m2[1]));
    return null;
  }

  let minDate=null,maxDate=null;
  const pn=v=>{const n=parseFloat(String(v).replace(',','.')); return isNaN(n)?0:n;};
  const rows=[];
  for(let i=headerRow+1;i<raw.length;i++){
    const r=raw[i];
    if(!r||!r[idx.titulo]) continue;
    const receita=pn(r[idx.receita]);
    const invest =pn(r[idx.invest]);
    if(receita===0&&invest===0) continue;
    if(idx.desde>=0&&r[idx.desde]){
      const d=parsePTDate(String(r[idx.desde]));
      if(d){ if(!minDate||d<minDate) minDate=d; }
    }
    if(idx.ate>=0&&r[idx.ate]){
      const d=parsePTDate(String(r[idx.ate]));
      if(d){ if(!maxDate||d>maxDate) maxDate=d; }
    }
    rows.push({
      titulo:   String(r[idx.titulo]||''),
      campanha: String(r[idx.campanha]||'').trim(),
      impressoes:pn(r[idx.impressoes]),
      cliques:  pn(r[idx.cliques]),
      cvr:      pn(r[idx.cvr]),
      receita, invest,
      acos:     pn(r[idx.acos]),
      vendasTotal: pn(r[idx.vendasDir])+pn(r[idx.vendasIndir]),
    });
  }

  let dias=30;
  if(minDate&&maxDate){
    dias=Math.max(1,Math.round((maxDate-minDate)/(1000*60*60*24))+1);
  }
  if(!periodoLabel && rows.length) periodoLabel = 'Período importado';
  const labelMatch = periodoLabel.match(/(\d{2}[- ][a-zç]+[- ]\d{4})/gi);
  if(labelMatch&&labelMatch.length>=2) periodoLabel=labelMatch[0]+' → '+labelMatch[1];

  return {rows, periodoLabel, dias};
}

function adsAggregate(rows){
  const map={};
  rows.forEach(r=>{
    if(!map[r.titulo]) map[r.titulo]={titulo:r.titulo,campanha:r.campanha,receita:0,invest:0,cliques:0,vendasTotal:0,impressoes:0};
    map[r.titulo].receita    +=r.receita;
    map[r.titulo].invest     +=r.invest;
    map[r.titulo].cliques    +=r.cliques;
    map[r.titulo].vendasTotal+=r.vendasTotal;
    map[r.titulo].impressoes +=r.impressoes;
    if(r.invest > (map[r.titulo]._maxInv||0)){ map[r.titulo].campanha=r.campanha; map[r.titulo]._maxInv=r.invest; }
  });
  return Object.values(map).map(a=>{
    a.roas=a.invest>0?a.receita/a.invest:0;
    a.acos=a.receita>0?a.invest/a.receita*100:0;
    a.cvr =a.cliques>0?a.vendasTotal/a.cliques*100:0;
    return a;
  }).filter(a=>a.invest>5||a.receita>5).sort((a,b)=>b.roas-a.roas);
}

function adsCampanhas(rows){
  const map={};
  rows.forEach(r=>{
    const k=r.campanha||'(sem campanha)';
    if(!map[k]) map[k]={campanha:k,receita:0,invest:0,cliques:0,vendasTotal:0,anuncios:[],roasList:[]};
    map[k].receita    +=r.receita;
    map[k].invest     +=r.invest;
    map[k].cliques    +=r.cliques;
    map[k].vendasTotal+=r.vendasTotal;
    if(r.receita>0||r.invest>5) map[k].anuncios.push(r);
  });
  return Object.values(map).map(c=>{
    c.roas=c.invest>0?c.receita/c.invest:0;
    c.acos=c.receita>0?c.invest/c.receita*100:0;
    const adsAgg = adsAggregate(c.anuncios);
    c.adsAgg=adsAgg;
    c.roasMax=adsAgg.length?Math.max(...adsAgg.map(a=>a.roas)):0;
    c.roasMin=adsAgg.length?Math.min(...adsAgg.filter(a=>a.invest>5).map(a=>a.roas)||[0]):0;
    c.spread=c.roasMax-c.roasMin;
    return c;
  }).filter(c=>c.invest>5||c.receita>5).sort((a,b)=>b.roas-a.roas);
}

function adsDetectIsolamento(campanhas){
  const candidatos=[];
  campanhas.forEach(c=>{
    if(c.adsAgg.length<2) return;
    c.adsAgg.forEach(a=>{
      if(a.roas<25) return;
      const outros=c.adsAgg.filter(x=>x.titulo!==a.titulo&&x.invest>5);
      if(!outros.length) return;
      const roasOutros=outros.reduce((s,x)=>s+x.roas,0)/outros.length;
      if(roasOutros>10) return;
      const pctBudget=c.invest>0?a.invest/c.invest:0;
      if(pctBudget>0.6) return;
      candidatos.push({
        anuncio: a, campanha: c,
        roasCampanha: c.roas, roasOutros, pctBudget,
        potencial: a.receita/a.invest * (c.invest*0.4),
      });
    });
  });
  return candidatos.sort((a,b)=>b.anuncio.roas-a.anuncio.roas);
}

function adsGerarAcoes(ads, campanhas, dias){
  const acoes={pausar:[],aumentar:[],isolar:[]};
  ads.filter(a=>a.invest>10&&a.roas<5).sort((a,b)=>a.roas-b.roas).forEach(a=>{
    acoes.pausar.push({titulo:adsShortName(a.titulo),campanha:a.campanha,roas:a.roas,invest:a.invest,receita:a.receita,economia:a.invest});
  });
  const totalInvest=ads.reduce((s,a)=>s+a.invest,0);
  const budgetDiario=totalInvest/dias;
  ads.filter(a=>a.roas>=20).sort((a,b)=>b.roas-a.roas).forEach(a=>{
    const budgetIdeal=Math.min(a.receita*0.08, budgetDiario*0.5);
    const gap=budgetIdeal-a.invest;
    if(gap>20){
      acoes.aumentar.push({titulo:adsShortName(a.titulo),campanha:a.campanha,roas:a.roas,investAtual:a.invest,investSugerido:Math.round(budgetIdeal),aumento:Math.round(gap),receitaEstimada:Math.round(gap*a.roas)});
    }
  });
  adsDetectIsolamento(campanhas).forEach(c=>{
    acoes.isolar.push({titulo:adsShortName(c.anuncio.titulo),campanha:c.campanha.campanha,roas:c.anuncio.roas,roasCampanha:c.roasCampanha,pctBudget:c.pctBudget,potencial:Math.round(c.potencial)});
  });
  return acoes;
}

function adsLoadFile(file){
  if(!file) return;
  const msg=document.getElementById('syncMsg');
  const dot=document.getElementById('syncDot');
  dot.className='sync-dot loading';
  if(msg) msg.textContent='Processando relatório Mercado Ads...';

  const doProcess=()=>{
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const result=parseAdsXLSX(e.target.result);
        if(!result.rows||result.rows.length===0){
          alert('Nenhum dado encontrado. Verifique se é um relatório de Anúncios Patrocinados.');
          dot.className='sync-dot error';
          if(msg) msg.textContent='Erro ao processar relatório Ads';
          return;
        }
        let label=result.periodoLabel||file.name.replace(/\.xlsx?$/i,'');
        const exists=STATE.ads.findIndex(a=>a.label===label);
        if(exists>=0) STATE.ads.splice(exists,1);
        STATE.ads.push({label, rows:result.rows, dias:result.dias||30});
        STATE.selPeriodoAds=STATE.ads.length-1;
        dot.className='sync-dot';
        if(msg) msg.textContent=`✓ Ads importado · ${result.rows.length} linhas · ${label}`;
        document.getElementById('syncTime').textContent='Atualizado às '+new Date().toLocaleTimeString('pt-BR');
        renderAds();
      }catch(err){
        console.error(err);
        alert('Erro: '+err.message);
        dot.className='sync-dot error';
        if(msg) msg.textContent='Erro ao processar arquivo Ads';
      }
    };
    reader.readAsArrayBuffer(file);
  };

  if(window.XLSX){ doProcess(); }
  else{
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
    s.onload=doProcess;
    s.onerror=()=>alert('Não foi possível carregar XLSX. Verifique sua conexão.');
    document.head.appendChild(s);
  }
}

function calcHorasProporcional(allRows, hTurno){
  const ch = r => `${r.operador||''}|${r.turno||''}|${r.data||''}`;
  const kgPorTurno = {};
  allRows.forEach(r=>{ const k=ch(r); kgPorTurno[k]=(kgPorTurno[k]||0)+r.kg; });
  return allRows.map(r=>{
    const totalKgTurno = kgPorTurno[ch(r)] || r.kg;
    const proporcao = totalKgTurno > 0 ? r.kg / totalKgTurno : 1;
    return { ...r, horasLote: hTurno * proporcao };
  });
}

  const byOp=groupBy(rowsProd,'operador'); const byMaq=groupBy(rowsProd,'maquina');

  const kgProjetado=(totalKgH>0?totalKgH:totalKgH)*horasRestantes;

function renderOperacional(){
  const HORAS_TURNO_AL = 10;
  const allOpRows = STATE.f2.filter(r => r.operador && r.operador.trim() !== '');
  const rows = STATE.selMonth ? allOpRows.filter(r => extractMonth(r.data) === STATE.selMonth) : allOpRows;
  const main = document.getElementById('main');

  if(!rows.length){
    main.innerHTML=`<div class="empty" style="padding:80px;text-align:center;color:var(--text3)">
      <div style="font-size:40px;margin-bottom:16px">📋</div>
      <div style="font-size:16px;font-weight:700;color:var(--text2);margin-bottom:8px">Nenhum dado operacional em ${monthLabel(STATE.selMonth)}</div>
    </div>`;
    return;
  }

  function groupBy(arr,key){return arr.reduce((acc,r)=>{const k=r[key]||'—';if(!acc[k])acc[k]={kg:0,mil:0,perda:0,lotes:0};acc[k].kg+=r.kg;acc[k].mil+=r.mil;acc[k].perda+=r.perda;acc[k].lotes++;return acc;},{});}
  const byOp=groupBy(rows,'operador'); const byMaq=groupBy(rows,'maquina'); const byTurno=groupBy(rows,'turno');
  const totalKg=rows.reduce((s,r)=>s+r.kg,0); const totalMil=rows.reduce((s,r)=>s+r.mil,0);
  const totalPerda=rows.reduce((s,r)=>s+r.perda,0);
  const eficiencia=totalKg>0?((totalKg-totalPerda)/totalKg*100):0;

  const rowsComHoras=calcHorasProporcional(rows,HORAS_TURNO_AL);
  const f2ComHoras=calcHorasProporcional(STATE.f2.filter(r=>r.operador&&r.operador.trim()!==''),HORAS_TURNO_AL);
  const mediaKgHAlerta={};const contMedAl={};
  f2ComHoras.forEach(r=>{if(!r.med)return;const kgh=r.kg/r.horasLote;if(!mediaKgHAlerta[r.med]){mediaKgHAlerta[r.med]=0;contMedAl[r.med]=0;}mediaKgHAlerta[r.med]+=kgh;contMedAl[r.med]++;});
  Object.keys(mediaKgHAlerta).forEach(med=>{mediaKgHAlerta[med]=mediaKgHAlerta[med]/contMedAl[med];});

  const alertas=[];
  rowsComHoras.forEach(r=>{
    if(!r.med||!r.kg)return;
    const kghLote=r.kg/r.horasLote; const mediaMed=mediaKgHAlerta[r.med]; if(!mediaMed)return;
    const desvio=(kghLote-mediaMed)/mediaMed;
    const[dd2,mm2]=r.data.split('/').map(Number);
    const dataLote=new Date(new Date().getFullYear(),mm2-1,dd2);
    const diffDias=(new Date()-dataLote)/(1000*60*60*24);
    if(diffDias<=2){
      if(desvio>0.20) alertas.push({tipo:'green',icon:'🟢',titulo:`Lote acima da média — ${r.med} · ${r.data}`,msg:`${r.operador||'—'}: ${kghLote.toFixed(1)} kg/h vs média ${mediaMed.toFixed(1)} kg/h → +${(desvio*100).toFixed(0)}%`});
      else if(desvio<-0.20) alertas.push({tipo:'red',icon:'🔴',titulo:`Lote abaixo da média — ${r.med} · ${r.data}`,msg:`${r.operador||'—'}: ${kghLote.toFixed(1)} kg/h vs média ${mediaMed.toFixed(1)} kg/h → ${(desvio*100).toFixed(0)}%`});
    }
  });
  const perdaMediaGeral=totalKg>0?totalPerda/totalKg*100:0;
  Object.entries(byOp).forEach(([op,d])=>{const perdaOp=d.kg>0?d.perda/d.kg*100:0;if(perdaOp>perdaMediaGeral*1.3&&d.perda>0) alertas.push({tipo:'yellow',icon:'⚠️',titulo:`${op} — Perda acima da média`,msg:`Perda de ${d.perda.toFixed(1)} kg (${perdaOp.toFixed(1)}%) — média geral é ${perdaMediaGeral.toFixed(1)}%`});});

  const f2Rank=calcHorasProporcional(STATE.f2.filter(r=>r.operador&&r.operador.trim()!==''),HORAS_TURNO_AL);
  const mediaKgHPorMed={};const contMed={};
  f2Rank.forEach(r=>{if(!r.med)return;const kgh=r.kg/r.horasLote;if(!mediaKgHPorMed[r.med]){mediaKgHPorMed[r.med]=0;contMed[r.med]=0;}mediaKgHPorMed[r.med]+=kgh;contMed[r.med]++;});
  Object.keys(mediaKgHPorMed).forEach(med=>{mediaKgHPorMed[med]=mediaKgHPorMed[med]/contMed[med];});
  const diasPorOp={};
  rows.forEach(r=>{if(!r.operador)return;if(!diasPorOp[r.operador])diasPorOp[r.operador]=new Set();diasPorOp[r.operador].add(r.data);});
  const maxDias=Math.max(...Object.keys(diasPorOp).map(op=>diasPorOp[op].size),1);
  const eficienciaOp={};
  f2Rank.forEach(r=>{if(!r.operador||!r.med)return;const kghLote=r.kg/r.horasLote;const mediaMed=mediaKgHPorMed[r.med]||kghLote;const indice=mediaMed>0?kghLote/mediaMed:1;if(!eficienciaOp[r.operador])eficienciaOp[r.operador]=[];eficienciaOp[r.operador].push(indice);});
  const efMedia={};Object.entries(eficienciaOp).forEach(([op,arr])=>{efMedia[op]=arr.reduce((a,b)=>a+b,0)/arr.length;});
  const maxEf=Math.max(...Object.values(efMedia),1);
  const ranking=Object.entries(byOp).map(([op,d])=>{
    const dias=diasPorOp[op]?diasPorOp[op].size:0; const ef=efMedia[op]||0;
    const pts=Math.round((ef/maxEf)*80+(dias/maxDias)*20);
    return {op,kg:d.kg,mil:d.mil,perda:d.perda,lotes:d.lotes,dias,ef,pctPerda:d.kg>0?d.perda/d.kg*100:0,pts};
  }).sort((a,b)=>b.pts-a.pts);

  const medals=['🥇','🥈','🥉']; const posClass=['gold','silver','bronze'];
  const cores=['#E87722','#5b8af5','#2ecc71','#a55eea','#f1c40f'];

  let html=`<div class="kpis">
    <div class="kpi"><div class="kpi-icon">⚖️</div><div class="kpi-label">KG Produzido</div><div class="kpi-val">${totalKg.toLocaleString('pt-BR',{maximumFractionDigits:0})} kg</div><div class="kpi-sub">${rows.length} lotes</div></div>
    <div class="kpi"><div class="kpi-icon">📦</div><div class="kpi-label">Milheiros</div><div class="kpi-val">${totalMil.toLocaleString('pt-BR')}</div><div class="kpi-sub">${(totalMil*1000).toLocaleString('pt-BR')} unidades</div></div>
    <div class="kpi"><div class="kpi-icon">🗑️</div><div class="kpi-label">Perda Total</div><div class="kpi-val" style="color:var(--red)">${totalPerda.toFixed(1)} kg</div><div class="kpi-sub">${(totalPerda/totalKg*100).toFixed(1)}% do total</div></div>
    <div class="kpi"><div class="kpi-icon">⚡</div><div class="kpi-label">Eficiência Geral</div><div class="kpi-val" style="color:${eficiencia>=95?'var(--green)':eficiencia>=85?'var(--orange)':'var(--red)'}">${eficiencia.toFixed(1)}%</div><div class="kpi-sub">kg útil / kg total</div></div>
    <div class="kpi"><div class="kpi-icon">👥</div><div class="kpi-label">Operadores</div><div class="kpi-val">${Object.keys(byOp).length}</div><div class="kpi-sub">${Object.keys(byMaq).length} máquinas ativas</div></div>
  </div>`;

  if(alertas.length){
    html+=`<div class="section"><div class="section-header"><div class="section-title">⚡ Alertas</div><div class="section-badge">${alertas.length}</div></div>`;
    alertas.forEach(a=>html+=`<div class="alert-op ${a.tipo}"><div class="alert-op-icon">${a.icon}</div><div class="alert-op-body"><strong>${a.titulo}</strong>${a.msg}</div></div>`);
    html+=`</div>`;
  }

  if(ranking.length>=2){
    html+=`<div class="section"><div class="section-header"><div class="section-title">🏆 Pódio — Bonificação</div><div class="section-badge">Eficiência 80% · Constância 20%</div></div>
    <div class="table-wrap"><div style="padding:20px"><div class="podio">`;
    const podioOrder=ranking.length>=3?[1,0,2]:ranking.length===2?[1,0]:[0];
    podioOrder.forEach(i=>{
      if(!ranking[i])return;
      const r=ranking[i]; const cls=posClass[i]||'other';
      html+=`<div class="podio-item"><div class="podio-avatar ${cls}">${medals[i]||'🎖️'}</div><div class="podio-name">${r.op}</div><div class="podio-pts">${r.pts} pts</div><div class="podio-base ${cls}"><span>${i===0?'1º':i===1?'2º':'3º'} lugar</span></div></div>`;
    });
    html+=`</div></div></div></div>`;
  }

  html+=`<div class="op-grid">`;
  html+=`<div class="section"><div class="section-header"><div class="section-title">👤 Ranking Operadores</div></div><div class="rank-list">`;
  ranking.forEach((r,i)=>{
    const cls=i===0?'gold':i===1?'silver':i===2?'bronze':'other';
    html+=`<div class="rank-item"><div class="rank-pos ${cls}">${medals[i]||i+1}</div><div class="rank-info"><div class="rank-name">${r.op}</div><div class="rank-sub">Ef. ${(r.ef*100).toFixed(1)}% · ${r.dias} dias · ${r.lotes} lotes</div></div><div class="rank-score"><div class="rank-pts">${r.pts}</div><div class="rank-pts-label">pontos</div></div></div>`;
  });
  html+=`</div></div>`;

  const turnos=Object.entries(byTurno).sort((a,b)=>b[1].kg-a[1].kg);
  html+=`<div class="section"><div class="section-header"><div class="section-title">🌅 Turno Dia vs Noite</div></div><div class="turno-compare">`;
  turnos.forEach(([turno,d])=>{
    const ef=d.kg>0?(d.kg-d.perda)/d.kg*100:0;
    const icon=turno.toLowerCase().includes('dia')?'☀️':'🌙';
    html+=`<div class="turno-card"><div class="turno-title">${icon} Turno ${turno}</div>
      <div class="turno-stat"><span class="turno-stat-label">KG</span><span class="turno-stat-val">${d.kg.toFixed(0)} kg</span></div>
      <div class="turno-stat"><span class="turno-stat-label">Milheiros</span><span class="turno-stat-val">${d.mil.toLocaleString('pt-BR')}</span></div>
      <div class="turno-stat"><span class="turno-stat-label">Perda</span><span class="turno-stat-val" style="color:var(--red)">${d.perda.toFixed(1)} kg</span></div>
      <div class="turno-stat"><span class="turno-stat-label">Eficiência</span><span class="turno-stat-val" style="color:${ef>=95?'var(--green)':ef>=85?'var(--orange)':'var(--red)'}">${ef.toFixed(1)}%</span></div>
      <div class="turno-stat"><span class="turno-stat-label">Lotes</span><span class="turno-stat-val">${d.lotes}</span></div>
    </div>`;
  });
  html+=`</div></div></div>`;

  const maqList=Object.entries(byMaq).sort((a,b)=>b[1].kg-a[1].kg);
  const maxMaqKg=Math.max(...maqList.map(m=>m[1].kg),1);
  html+=`<div class="section"><div class="section-header"><div class="section-title">⚙️ Produção por Máquina</div></div>
  <div class="table-wrap"><table class="data-table"><thead><tr><th>Máquina</th><th>KG</th><th>Milheiros</th><th>Lotes</th><th>Perda (kg)</th><th>% Perda</th><th>Eficiência</th></tr></thead><tbody>`;
  maqList.forEach(([maq,d])=>{
    const pctPerda=d.kg>0?d.perda/d.kg*100:0; const ef=d.kg>0?(d.kg-d.perda)/d.kg*100:0;
    html+=`<tr><td style="font-weight:700">${maq}</td><td>${d.kg.toFixed(0)}</td><td>${d.mil.toLocaleString('pt-BR')}</td><td>${d.lotes}</td><td style="color:var(--red)">${d.perda.toFixed(1)}</td><td style="color:${pctPerda<3?'var(--green)':pctPerda<6?'var(--orange)':'var(--red)'}">${pctPerda.toFixed(1)}%</td><td style="color:${ef>=95?'var(--green)':ef>=85?'var(--orange)':'var(--red)'}"><strong>${ef.toFixed(1)}%</strong></td></tr>`;
  });
  html+=`</tbody></table></div></div>`;

  html+=`<div class="section"><div class="section-header"><div class="section-title">📋 Todos os Lotes</div><div class="section-badge">${rows.length} registros</div></div>
  <div class="table-wrap"><table class="data-table"><thead><tr><th>Data</th><th>Medida</th><th>Máquina</th><th>Turno</th><th>Operador</th><th>KG</th><th>Milheiros</th><th>Perda (kg)</th><th>% Perda</th></tr></thead><tbody>`;
  [...rows].reverse().forEach(r=>{
    const pctP=r.kg>0?r.perda/r.kg*100:0;
    html+=`<tr><td style="color:var(--text3);font-size:12px">${r.data}</td><td>${r.med}</td>
      <td><span style="font-family:'DM Mono',monospace;font-size:12px;background:var(--orange-dim);color:var(--orange);padding:2px 8px;border-radius:4px">${r.maquina||'—'}</span></td>
      <td>${r.turno?(r.turno.toLowerCase().includes('dia')?'☀️ '+r.turno:'🌙 '+r.turno):'—'}</td>
      <td style="font-weight:600">${r.operador||'—'}</td><td>${r.kg.toFixed(0)}</td><td>${r.mil.toLocaleString('pt-BR')}</td>
      <td style="color:${r.perda>0?'var(--red)':'var(--text3)'}">${r.perda>0?r.perda.toFixed(1):'—'}</td>
      <td style="color:${pctP<3?'var(--green)':pctP<6?'var(--orange)':'var(--red)'}">${r.perda>0?pctP.toFixed(1)+'%':'—'}</td></tr>`;
  });
  html+=`</tbody></table></div></div>`;
  main.innerHTML=html;
}
</script>
</body>
</html>
