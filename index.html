<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>True Embalagens · Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0c0c0c;--bg2:#141414;--bg3:#1c1c1c;--bg4:#222;
  --border:#2a2a2a;--border2:#333;
  --orange:#E87722;--orange2:#ff9944;--orange-dim:rgba(232,119,34,0.13);--orange-glow:rgba(232,119,34,0.3);
  --text:#f0f0f0;--text2:#aaa;--text3:#666;
  --green:#2ecc71;--green-dim:rgba(46,204,113,0.13);
  --red:#e74c3c;--red-dim:rgba(231,76,60,0.13);
  --blue:#5b8af5;--blue-dim:rgba(91,138,245,0.13);
  --yellow:#f1c40f;--yellow-dim:rgba(241,196,15,0.1);
  --purple:#a55eea;--purple-dim:rgba(165,94,234,0.13);
}
*{margin:0;padding:0;box-sizing:border-box;}
html{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;font-size:15px;}
body{min-height:100vh;padding-bottom:80px;}
.header{background:var(--bg2);border-bottom:2px solid var(--border2);padding:16px 40px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;flex-wrap:wrap;gap:12px;}
.logo{display:flex;align-items:center;gap:14px;}
.logo-icon{width:44px;height:44px;border:2px solid var(--orange);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.logo-name{font-size:22px;font-weight:800;letter-spacing:-0.5px;}
.logo-name em{color:var(--orange);font-style:normal;}
.logo-sub{font-size:11px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-top:2px;}
.header-controls{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.ctrl-box{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:8px 14px;}
.ctrl-label{font-size:11px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;}
.ctrl-input{background:transparent;border:none;outline:none;font-family:'DM Mono',monospace;font-size:16px;color:var(--orange);font-weight:500;width:65px;text-align:right;}
.btn{padding:9px 20px;border-radius:9px;border:none;cursor:pointer;font-family:'Syne',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;transition:all .2s;white-space:nowrap;}
.btn-primary{background:var(--orange);color:#fff;}
.btn-primary:hover{background:var(--orange2);}
.btn-ghost{background:transparent;color:var(--text3);border:1px solid var(--border2);}
.btn-ghost:hover{border-color:var(--text2);color:var(--text);}
.btn-sm{padding:5px 12px;font-size:11px;border-radius:6px;}
.btn-paid{background:var(--green-dim);color:var(--green);border:1px solid rgba(46,204,113,0.3);}
.btn-unpaid{background:var(--bg3);color:var(--text3);border:1px solid var(--border2);}
.tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);padding:0 40px;}
.tab{padding:15px 28px;font-size:13px;font-weight:700;color:var(--text3);cursor:pointer;letter-spacing:1px;text-transform:uppercase;border-bottom:3px solid transparent;margin-bottom:-1px;transition:all .2s;}
.tab:hover{color:var(--text2);}
.tab.active{color:var(--orange);border-bottom-color:var(--orange);}
.month-bar{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 40px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.month-btn{font-size:12px;padding:5px 16px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--text3);cursor:pointer;font-family:'Syne',sans-serif;font-weight:600;letter-spacing:.5px;transition:all .2s;}
.month-btn.active{background:var(--orange-dim);color:var(--orange);border-color:var(--orange-glow);}
.sync-bar{background:var(--bg3);border-bottom:1px solid var(--border);padding:8px 40px;display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--text3);}
.sync-status{display:flex;align-items:center;gap:8px;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);}
.sync-dot.loading{background:var(--yellow);animation:pulse 1s infinite;}
.sync-dot.error{background:var(--red);box-shadow:none;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.main{padding:28px 40px;max-width:1600px;}
.kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;margin-bottom:28px;}
.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:20px 22px;position:relative;overflow:hidden;}
.kpi::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--orange),var(--orange2));}
.kpi-icon{font-size:20px;margin-bottom:8px;}
.kpi-label{font-size:11px;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px;}
.kpi-val{font-family:'DM Mono',monospace;font-size:24px;font-weight:500;color:var(--text);line-height:1;}
.kpi-sub{font-size:12px;color:var(--text3);margin-top:5px;}
.section{margin-bottom:28px;}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.section-title{font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text2);}
.section-badge{font-size:11px;padding:4px 12px;border-radius:20px;background:var(--orange-dim);color:var(--orange);font-weight:600;}
.table-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:14px;overflow:hidden;}
.data-table{width:100%;border-collapse:collapse;font-size:14px;}
.data-table th{padding:12px 16px;text-align:right;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);background:var(--bg3);border-bottom:1px solid var(--border);}
.data-table th:first-child{text-align:left;}
.data-table td{padding:10px 16px;text-align:right;border-bottom:1px solid var(--border);font-variant-numeric:tabular-nums;font-family:'DM Mono',monospace;font-size:13px;color:var(--text2);}
.data-table td:first-child{text-align:left;font-family:'Syne',sans-serif;font-weight:700;font-size:14px;color:var(--text);}
.data-table tr:last-child td{border-bottom:none;}
.data-table tr:hover td{background:rgba(255,255,255,0.02);}
.data-table .total-row td{background:var(--bg3);color:var(--text);font-weight:700;border-top:2px solid var(--border2);}
.badge{display:inline-block;font-size:11px;padding:3px 10px;border-radius:20px;font-weight:700;font-family:'Syne',sans-serif;}
.b-up{background:var(--red-dim);color:var(--red);}
.b-down{background:var(--green-dim);color:var(--green);}
.b-neu{background:var(--bg3);color:var(--text3);}
.b-new{background:var(--blue-dim);color:var(--blue);}
.alerts{display:flex;flex-direction:column;gap:10px;margin-bottom:24px;}
.alert{display:flex;align-items:flex-start;gap:14px;padding:14px 18px;border-radius:12px;font-size:13px;}
.alert-warn{background:var(--yellow-dim);border:1px solid rgba(241,196,15,0.25);}
.alert-icon{font-size:18px;flex-shrink:0;}
.alert-text{line-height:1.6;}
.alert-text strong{display:block;font-size:14px;margin-bottom:2px;}
.chart-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:28px;}
.chart-bars{display:flex;align-items:flex-end;gap:8px;height:130px;margin-top:20px;}
.bar-group{display:flex;flex-direction:column;align-items:center;flex:1;gap:5px;}
.bar{width:100%;border-radius:5px 5px 0 0;background:var(--orange-dim);border:1px solid var(--orange-glow);transition:all .3s;min-height:4px;cursor:pointer;}
.bar:hover{background:var(--orange);}
.bar-lbl{font-size:10px;color:var(--text3);text-align:center;writing-mode:vertical-rl;transform:rotate(180deg);max-height:52px;}
.boletos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;margin-bottom:28px;}
.boleto-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:18px 20px;position:relative;overflow:hidden;transition:all .2s;}
.boleto-card.pago{border-color:rgba(46,204,113,0.35);opacity:.65;}
.boleto-card::before{content:'';position:absolute;top:0;left:0;bottom:0;width:4px;background:var(--orange);}
.boleto-card.pago::before{background:var(--green);}
.bol-data{font-size:11px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;padding-left:10px;margin-bottom:4px;}
.bol-total{font-size:12px;color:var(--text3);padding-left:10px;margin-bottom:10px;}
.bol-vals{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding-left:10px;margin-bottom:12px;}
.bol-item{display:flex;flex-direction:column;gap:3px;}
.bol-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;}
.bol-valor{font-family:'DM Mono',monospace;font-size:19px;font-weight:500;color:var(--text);}
.bol-venc{font-size:12px;color:var(--orange);font-weight:600;margin-top:2px;}
.bol-venc.pago{color:var(--green);}
.bol-actions{display:flex;gap:8px;padding-left:10px;}
.empty{text-align:center;padding:60px;color:var(--text3);font-size:14px;}
.loading-overlay{text-align:center;padding:80px;color:var(--text3);}
.spinner{width:36px;height:36px;border:3px solid var(--border2);border-top-color:var(--orange);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 20px;}
@keyframes spin{to{transform:rotate(360deg);}}
@media(max-width:1100px){.kpis{grid-template-columns:repeat(3,1fr);}.main,.header,.tabs,.month-bar,.sync-bar{padding-left:16px;padding-right:16px;}}
@media(max-width:700px){.kpis{grid-template-columns:repeat(2,1fr);}}

/* OPERACIONAL */
.op-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:28px;}
.op-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;margin-bottom:28px;}
.rank-list{display:flex;flex-direction:column;gap:8px;}
.rank-item{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;transition:all .2s;}
.rank-item:hover{border-color:var(--border2);}
.rank-pos{font-family:'DM Mono',monospace;font-size:18px;font-weight:700;width:28px;text-align:center;flex-shrink:0;}
.rank-pos.gold{color:#FFD700;}
.rank-pos.silver{color:#C0C0C0;}
.rank-pos.bronze{color:#CD7F32;}
.rank-pos.other{color:var(--text3);}
.rank-info{flex:1;}
.rank-name{font-size:14px;font-weight:700;color:var(--text);}
.rank-sub{font-size:11px;color:var(--text3);margin-top:2px;font-family:'DM Mono',monospace;}
.rank-score{text-align:right;}
.rank-pts{font-family:'DM Mono',monospace;font-size:16px;font-weight:700;color:var(--orange);}
.rank-pts-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;}
.bar-h-wrap{display:flex;flex-direction:column;gap:6px;}
.bar-h-item{display:flex;align-items:center;gap:10px;}
.bar-h-label{font-size:12px;color:var(--text2);width:80px;flex-shrink:0;text-align:right;}
.bar-h-track{flex:1;background:var(--bg3);border-radius:4px;height:22px;overflow:hidden;position:relative;}
.bar-h-fill{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:8px;font-size:11px;font-family:'DM Mono',monospace;font-weight:700;color:#000;white-space:nowrap;transition:width .6s ease;}
.bar-h-val{font-size:11px;font-family:'DM Mono',monospace;color:var(--text3);width:70px;text-align:right;flex-shrink:0;}
.alert-op{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;border-radius:10px;font-size:13px;margin-bottom:8px;}
.alert-op.red{background:rgba(231,76,60,0.08);border:1px solid rgba(231,76,60,0.2);}
.alert-op.yellow{background:var(--yellow-dim);border:1px solid rgba(241,196,15,0.2);}
.alert-op.blue{background:var(--blue-dim);border:1px solid rgba(91,138,245,0.2);}
.alert-op.green{background:var(--green-dim);border:1px solid rgba(46,204,113,0.2);}
.alert-op-icon{font-size:16px;flex-shrink:0;}
.alert-op-body{flex:1;line-height:1.5;}
.alert-op-body strong{display:block;margin-bottom:2px;}
.turno-compare{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.turno-card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:16px 18px;}
.turno-title{font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin-bottom:12px;}
.turno-stat{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);}
.turno-stat:last-child{border-bottom:none;}
.turno-stat-label{font-size:12px;color:var(--text3);}
.turno-stat-val{font-family:'DM Mono',monospace;font-size:13px;font-weight:700;color:var(--text);}
.podio{display:flex;align-items:flex-end;justify-content:center;gap:12px;padding:20px 0;}
.podio-item{display:flex;flex-direction:column;align-items:center;gap:8px;}
.podio-avatar{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;}
.podio-avatar.gold{background:rgba(255,215,0,0.15);border:2px solid #FFD700;}
.podio-avatar.silver{background:rgba(192,192,192,0.15);border:2px solid #C0C0C0;}
.podio-avatar.bronze{background:rgba(205,127,50,0.15);border:2px solid #CD7F32;}
.podio-name{font-size:13px;font-weight:700;color:var(--text);}
.podio-pts{font-family:'DM Mono',monospace;font-size:12px;color:var(--orange);}
.podio-base{padding:8px 16px;border-radius:8px;font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);}
.podio-base.gold{background:rgba(255,215,0,0.1);height:70px;display:flex;align-items:center;}
.podio-base.silver{background:rgba(192,192,192,0.08);height:50px;display:flex;align-items:center;}
.podio-base.bronze{background:rgba(205,127,50,0.08);height:35px;display:flex;align-items:center;}

/* ── VENDAS DIRETAS ─────────────────────────────── */
.vd-mes-btn{font-size:12px;padding:5px 14px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--text3);cursor:pointer;font-family:'Syne',sans-serif;font-weight:600;transition:all .2s;}
.vd-mes-btn.active{background:var(--green-dim);color:var(--green);border-color:rgba(46,204,113,0.4);}
.vd-vend-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px;margin-bottom:28px;}
.vd-vend-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:18px 20px;position:relative;overflow:hidden;}
.vd-vend-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--orange);}
.vd-vend-card.meta-ok::before{background:var(--green);}
.vd-vend-name{font-size:16px;font-weight:700;color:var(--text);margin-bottom:2px;display:flex;align-items:center;gap:8px;}
.vd-vend-medal{font-size:18px;}
.vd-vend-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:14px 0;}
.vd-stat{background:var(--bg3);border-radius:8px;padding:8px 10px;}
.vd-stat-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px;}
.vd-stat-val{font-family:'DM Mono',monospace;font-size:13px;font-weight:600;color:var(--text);}
.vd-meta-bar-wrap{margin-top:12px;}
.vd-meta-bar-label{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-bottom:5px;}
.vd-meta-bar-track{height:6px;background:var(--bg3);border-radius:99px;overflow:hidden;}
.vd-meta-bar-fill{height:100%;border-radius:99px;transition:width .4s ease;background:var(--orange);}
.vd-meta-bar-fill.ok{background:var(--green);}
.quinzena-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;}
.quinzena-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px 18px;position:relative;overflow:hidden;}
.quinzena-card::before{content:'';position:absolute;top:0;left:0;bottom:0;width:4px;background:var(--orange);}
.quinzena-card.pago::before{background:var(--green);}
.quinzena-title{font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;padding-left:10px;margin-bottom:3px;}
.quinzena-vendedor{font-size:14px;font-weight:700;color:var(--text);padding-left:10px;margin-bottom:8px;}
.quinzena-valor{font-family:'DM Mono',monospace;font-size:22px;font-weight:500;color:var(--orange);padding-left:10px;margin-bottom:3px;}
.quinzena-valor.pago{color:var(--green);}
.quinzena-periodo{font-size:11px;color:var(--text3);padding-left:10px;margin-bottom:10px;}
.quinzena-actions{padding-left:10px;}
.tag-margem{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px;font-family:'DM Mono',monospace;}
.tag-ok{background:rgba(46,204,113,.15);color:var(--green);}
.tag-atencao{background:rgba(230,179,0,.15);color:#e6b300;}
.tag-ruim{background:rgba(231,76,60,.15);color:var(--red);}

</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-icon">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <rect x="2" y="5" width="16" height="16" rx="2" stroke="#E87722" stroke-width="2"/>
        <path d="M7 13h6M10 10v6" stroke="#E87722" stroke-width="2" stroke-linecap="round"/>
        <path d="M10 2C10 2 13.5 0 17 2" stroke="white" stroke-width="1.8" stroke-linecap="round" fill="none"/>
      </svg>
    </div>
    <div>
      <div class="logo-name">True Embalagens<em>.</em></div>
      <div class="logo-sub">Dashboard de Produção</div>
    </div>
  </div>
  <div class="header-controls">
    <div class="ctrl-box">
      <span class="ctrl-label">Fator kg</span>
      <span style="color:var(--text3);font-size:13px">R$</span>
      <input class="ctrl-input" type="number" step="0.01" id="fatorKg" value="14.50" onchange="render()">
    </div>
    <div class="ctrl-box" id="moCtrl">
      <span class="ctrl-label">MO / kg</span>
      <span style="color:var(--text3);font-size:13px">R$</span>
      <input class="ctrl-input" type="number" step="0.01" id="moKg" value="4.40" onchange="render()" style="width:55px;">
    </div>
    <button class="btn btn-primary" onclick="syncSheets()">↻ Atualizar</button>
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="setFab(0)">ALP — Fábrica 1</div>
  <div class="tab" onclick="setFab(1)">Primícia — Fábrica 2</div>
  <div class="tab" onclick="setFab(2)">Consolidado</div>
  <div class="tab" onclick="setFab(3)">Operacional</div>
  <div class="tab" onclick="setFab(4)">Produtividade</div>
  <div class="tab" onclick="setFab(5)">💰 Vendas Diretas</div>
</div>

<div class="month-bar" id="monthBar"></div>

<div class="sync-bar">
  <div class="sync-status">
    <div class="sync-dot loading" id="syncDot"></div>
    <span id="syncMsg">Conectando ao Google Sheets...</span>
  </div>
  <span id="syncTime"></span>
</div>

<div class="main" id="main">
  <div class="loading-overlay"><div class="spinner"></div>Carregando dados...</div>
</div>

<script>
// ── IDs das abas publicadas ──
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx0kRg5q4rzshc3ZQPTCIYMjC5r6S6nSnA3l1ciOqkVuf6kSt-9Hdna3FNXJe5kYBp5/exec';

const ABRIL_REF={
  '12x18':29.47,'15x20':32.35,'15x25':38.17,'20x20':41.29,
  '19x25':57.52,'20x30':69.74,'26x36':109.17,'32x40':143.18,
  '40x40':166.29,'40x50':218.42,'40x60':271.64,'50x50':223.59,
  '50x60':322.68,'50x70':400.51,'60x50':335.01,'70x60':451.60,
  '80x60':535.58,'100x60':669.66,
};

let STATE={
  fab:0, f1:[], f2:[], vendas:[],
  months:[], selMonth:null, selMesVenda:null,
  paid:JSON.parse(localStorage.getItem('truePaid')||'{}'),
  paidComissao:JSON.parse(localStorage.getItem('truePaidComissao')||'{}'),
};

function getFator(){return parseFloat(document.getElementById('fatorKg').value)||14.50;}
function getMO(){return parseFloat(document.getElementById('moKg').value)||4.40;}
function ceilCents(n){return Math.ceil(n*100)/100;}
function fmt(n){return 'R$ '+n.toFixed(2).replace('.',',');}
function fmtN(n){return n.toLocaleString('pt-BR');}

// Converte "461.400" → 461.4 kg (ponto = separador decimal de kg)
function parseKg(s){
  if(!s) return 0;
  // Planilha usa ponto como separador de milhar com 3 casas: "159.000"=159kg, "461.400"=461.4kg
  // Remove espaços, converte ponto para nada e divide por 1000
  const clean = String(s).replace(/\s/g,'');
  const num = parseFloat(clean.replace('.',''));
  if(isNaN(num)) return 0;
  return num / 1000;
}

function parseMil(s){
  if(!s) return 0;
  // Mesmo padrão do kg: "12.000"=12mil, "131.250"=131.25mil → divide por 1000
  const clean = String(s).replace(/\s/g,'').replace(',','.');
  const num = parseFloat(clean.replace('.',''));
  if(isNaN(num)) return 0;
  return num / 1000;
}

function extractMonth(data){
  const p=String(data).split('/');
  if(p.length>=2) return p[1].padStart(2,'0')+'/'+(p[2]||'2025');
  return null;
}

function monthLabel(m){
  if(!m) return '';
  const [mm,yy]=m.split('/');
  const n=['','Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  return n[parseInt(mm)]+' '+yy;
}

// Parse CSV respeitando campos entre aspas
function parseCSV(text){
  const lines=text.split('\n').map(l=>l.trim()).filter(l=>l);
  return lines.map(line=>{
    const cols=[];let cur='',inq=false;
    for(let c=0;c<line.length;c++){
      if(line[c]==='"'){inq=!inq;}
      else if(line[c]===','&&!inq){cols.push(cur.trim());cur='';}
      else cur+=line[c];
    }
    cols.push(cur.trim());
    return cols;
  });
}

function parseRows(csv, hasmo){
  const rows=parseCSV(csv);
  const result=[];
  let id=1;
  // Acha linha de cabeçalho (contém "data" ou "kg")
  let startRow=1;
  for(let i=0;i<Math.min(5,rows.length);i++){
    if(rows[i].some(c=>c.toLowerCase()==='data'||c.toLowerCase()==='kg')){
      startRow=i+1; break;
    }
  }
  for(let i=startRow;i<rows.length;i++){
    const c=rows[i];
    if(!c[0]||!c[0].trim()) continue;

    // Formata data — aceita "dd/mm", "dd/mm/yyyy" e formato JS Date completo
    let data='';
    const raw=c[0].trim();
    if(raw.match(/^\d{1,2}\/\d{1,2}/)){
      // Formato original: "03/03" ou "03/03/2025"
      data=raw.split('/').slice(0,2).map(p=>p.padStart(2,'0')).join('/');
    } else if(raw.includes('GMT')||raw.match(/^[A-Za-z]{3}\s/)){
      // Formato Apps Script: "Tue Mar 03 2026 00:00:00 GMT-0300..."
      const d=new Date(raw);
      if(!isNaN(d)){
        data=String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0');
      }
    }
    if(!data) continue;

    // KG: Apps Script retorna inteiro "495000" = 495kg → divide por 1000
    const kgRaw=String(c[1]||'').trim();
    const kg=parseFloat(kgRaw)/1000;
    if(!kg||isNaN(kg)) continue;

    const fardos=parseInt(c[2])||0;
    const med=c[3]?c[3].trim().toUpperCase().replace(/X/gi,'x'):'';
    if(!med) continue;

    // Milheiros: mesma lógica — "32500" = 32.5 mil → divide por 1000
    const milRaw=String(c[4]||'').trim();
    const mil=parseFloat(milRaw)/1000;
    if(!mil||isNaN(mil)) continue;

    let mo=0;
    if(hasmo&&c[5]){
      const ms=String(c[5]).replace(/[R$\s]/g,'').replace(',','.').replace(/\.(?=.*\.)/g,'');
      mo=parseFloat(ms)||0;
    }
    // Colunas extras: ALP tem MO na col 5, então maquina começa na 6
    // Primícia NÃO tem MO, então maquina começa na 5
    const baseIdx = hasmo ? 6 : 5;
    const maquina = c[baseIdx]   ? String(c[baseIdx]).trim().toUpperCase() : '';
    const turno   = c[baseIdx+1] ? String(c[baseIdx+1]).trim() : '';
    const operador= c[baseIdx+2] ? String(c[baseIdx+2]).trim() : '';
    const perdaRaw= c[baseIdx+3] ? String(c[baseIdx+3]).trim().replace(',','.') : '0';
    const perda   = parseFloat(perdaRaw) || 0;
    result.push({id:id++,data,kg,fardos,med,mil,mo,maquina,turno,operador,perda});
  }
  return result;
}

async function syncSheets(){
  const dot=document.getElementById('syncDot');
  const msg=document.getElementById('syncMsg');
  dot.className='sync-dot loading';
  msg.textContent='Sincronizando com Google Sheets...';
  try{
    msg.textContent='Buscando ALP...';
    const r1 = await fetch(`${SCRIPT_URL}?aba=alp`).then(r=>{
      if(!r.ok) throw new Error('ALP erro '+r.status);
      return r.text();
    });
    msg.textContent='Buscando Primícia...';
    const r2 = await fetch(`${SCRIPT_URL}?aba=primicia`).then(r=>{
      if(!r.ok) throw new Error('Primícia erro '+r.status);
      return r.text();
    });
    msg.textContent='Buscando Vendas Diretas...';
    const r3 = await fetch(`${SCRIPT_URL}?aba=vendas`).then(r=>{
      if(!r.ok) throw new Error('Vendas erro '+r.status);
      return r.text();
    });
    STATE.f1=parseRows(r1,true);
    STATE.f2=parseRows(r2,false);
    STATE.vendas=parseVendas(r3);
    buildMonths();
    dot.className='sync-dot';
    msg.textContent=`✓ Conectado · ALP: ${STATE.f1.length} lotes · Primícia: ${STATE.f2.length} lotes · Vendas: ${STATE.vendas.length} pedidos`;

  }catch(e){
    dot.className='sync-dot error';

function buildMonths(){
  const set=new Set();
  [...STATE.f1,...STATE.f2].forEach(r=>{const m=extractMonth(r.data);if(m)set.add(m);});
  STATE.months=Array.from(set).sort();
  if(!STATE.selMonth||!STATE.months.includes(STATE.selMonth))
    STATE.selMonth=STATE.months[STATE.months.length-1]||null;
}

function getRows(){
  const src=STATE.fab===0?STATE.f1:STATE.fab===1?STATE.f2:[...STATE.f1,...STATE.f2];
  return STATE.selMonth?src.filter(r=>extractMonth(r.data)===STATE.selMonth):src;
}

function getPrevRows(){
  const src=STATE.fab===0?STATE.f1:STATE.fab===1?STATE.f2:[...STATE.f1,...STATE.f2];
  const idx=STATE.months.indexOf(STATE.selMonth);
  if(idx<=0) return [];
  const prev=STATE.months[idx-1];
  return src.filter(r=>extractMonth(r.data)===prev);
}

function consolidate(rows){
  const map={};
  rows.forEach(r=>{
    if(!map[r.med])map[r.med]={med:r.med,kg:0,fardos:0,mil:0};
    map[r.med].kg+=r.kg;map[r.med].fardos+=r.fardos;map[r.med].mil+=r.mil;
  });
  return Object.values(map).sort((a,b)=>a.med.localeCompare(b.med));
}

function calcCusto(kg,mil){
  // kg por mil unidades = kg/mil
  // custo/mil = (kg/mil) * fator
  return ceilCents((kg/mil)*getFator());
}

// ── NOVO: kg por unidade = kg total / (mil * 1000)  →  resultado em kg ──
function kgPorUnidade(kg, mil){
  return kg / (mil * 1000);
}

// ── NOVO: kg por milheiro = kg total / mil  →  resultado em kg ──
function kgPorMilheiro(kg, mil){
  return kg / mil;
}

function getBoletos(rows){
  const byDay={};
  rows.forEach(r=>{
    if(!byDay[r.data])byDay[r.data]={data:r.data,kg:0};
    byDay[r.data].kg+=r.kg;
  });
  const moKg=getMO();
  return Object.values(byDay).sort((a,b)=>a.data.localeCompare(b.data)).map(d=>{
    const total=d.kg*moKg;
    if(total<=0) return null;
    const [dd,mm]=(d.data+'/2025').split('/').map(Number);
    const yy=2025;
    const base=new Date(yy,mm-1,dd);
    const v21=new Date(base);v21.setDate(v21.getDate()+21);
    const v28=new Date(base);v28.setDate(v28.getDate()+28);
    const fd=dt=>`${String(dt.getDate()).padStart(2,'0')}/${String(dt.getMonth()+1).padStart(2,'0')}/${dt.getFullYear()}`;
    const k1=d.data+'_b1',k2=d.data+'_b2';
    return{data:d.data,total,
      b1:{val:total/2,venc:fd(v21),key:k1,paid:!!STATE.paid[k1]},
      b2:{val:total/2,venc:fd(v28),key:k2,paid:!!STATE.paid[k2]},
    };
  }).filter(Boolean);
}

function togglePaid(key){
  if(STATE.paid[key])delete STATE.paid[key];
  else STATE.paid[key]=true;
  localStorage.setItem('truePaid',JSON.stringify(STATE.paid));
  render();
}

function getAlerts(rows){
  const cons=consolidate(rows);
  const alerts=[];
  cons.forEach(c=>{
    // média em kg/unidade
    const media=kgPorUnidade(c.kg, c.mil);
    rows.filter(r=>r.med===c.med).forEach(r=>{
      const lote=kgPorUnidade(r.kg, r.mil);
      const dev=Math.abs((lote-media)/media);
      if(dev>0.20)alerts.push({med:c.med,data:r.data,lote,media,dev});
    });
  });
  return alerts.slice(0,5);
}

// ── Horas por lote proporcional ao kg (global — usada em Operacional, Ranking e Produtividade)
// Ex: Erika 600kg 26x36 + 200kg 12x18 no mesmo Turno Dia (10h) → 7.5h e 2.5h
function calcHorasProporcional(allRows, hTurno){
  const ch = r => `${r.operador||''}|${r.turno||''}|${r.data||''}`;
  const kgPorTurno = {};
  allRows.forEach(r=>{ const k=ch(r); kgPorTurno[k]=(kgPorTurno[k]||0)+r.kg; });
  return allRows.map(r=>{
    const totalKgTurno = kgPorTurno[ch(r)] || r.kg;
    const proporcao = totalKgTurno > 0 ? r.kg / totalKgTurno : 1;
    return { ...r, horasLote: hTurno * proporcao };
  });
}

function diasUteisNoMes(mesRef){
  if(!mesRef) return 22;
  const [mm,yy]=mesRef.split('/').map(Number);
  const ano=yy<100?2000+yy:yy;
  const dias=new Date(ano,mm,0).getDate();
  let uteis=0;
  for(let d=1;d<=dias;d++){
    const dow=new Date(ano,mm-1,d).getDay();
    if(dow!==0&&dow!==6) uteis++;
  }
  return uteis;
}

function diasUteisDecorridos(mesRef){
  if(!mesRef) return 1;
  const [mm,yy]=mesRef.split('/').map(Number);
  const ano=yy<100?2000+yy:yy;
  const hoje=new Date();
  // Se o mês selecionado ainda está em curso, conta só até hoje
  // Se já fechou, conta o mês todo
  // Normaliza ano: 25 → 2025, 2025 → 2025
  const anoNorm=ano<100?2000+ano:ano;
  const eMesAtual=(hoje.getFullYear()===anoNorm && hoje.getMonth()+1===mm);
  const limDia=eMesAtual?hoje.getDate():new Date(anoNorm,mm,0).getDate();
  let uteis=0;
  for(let d=1;d<=limDia;d++){
    const dow=new Date(anoNorm,mm-1,d).getDay();
    if(dow!==0&&dow!==6) uteis++;
  }
  return Math.max(uteis,1);
}

// ══════════════════════════════════════════════
//  PARSE VENDAS DIRETAS
// ══════════════════════════════════════════════
function parseVendas(csv){
  const rows=parseCSV(csv);
  const result=[];
  let startRow=1;
  for(let i=0;i<Math.min(5,rows.length);i++){
    if(rows[i].some(c=>['data','vendedor'].includes((c||'').toLowerCase().trim()))){startRow=i+1;break;}
  }
  for(let i=startRow;i<rows.length;i++){
    const c=rows[i];
    if(!c[0]||!String(c[0]).trim()) continue;
    const raw=String(c[0]).trim();
    let data='';
    if(raw.match(/^\d{1,2}\/\d{1,2}/)){
      data=raw.split('/').slice(0,2).map(p=>p.padStart(2,'0')).join('/');
    } else {
      const d=new Date(raw);
      if(!isNaN(d)) data=String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0');
    }
    if(!data) continue;
    const vendedor=(c[1]||'').trim();
    const cliente=(c[2]||'').trim();
    const itensRaw=(c[3]||'').trim();
    const valorTotal=parseFloat(String(c[4]||'').replace(/[R$\s]/g,'').replace(',','.'))||0;
    const freteCobrado=parseFloat(String(c[5]||'').replace(/[R$\s\-]/g,'').replace(',','.'))||0;
    const prazo=(c[6]||'').trim();
    const freteCusto=parseFloat(String(c[7]||'').replace(/[R$\s\-]/g,'').replace(',','.'))||0;
    if(!valorTotal) continue;

    // Parse itens — aceita: 10mil | 1.5mil | 500uni | 250uni
    const itens=[];
    itensRaw.split('/').forEach(part=>{
      const p=part.trim().split(':');
      if(p.length<3) return;
      const med=p[0].trim().toUpperCase().replace(/X/gi,'x');
      const qtdRaw=p[1].trim().toLowerCase().replace(',','.');
      let qtdMil=0;
      if(qtdRaw.endsWith('uni')) qtdMil=parseFloat(qtdRaw.replace('uni',''))/1000;
      else qtdMil=parseFloat(qtdRaw.replace('mil',''))||0;
      const precoTotal=parseFloat(p[2].trim().replace(',','.'))||0;
      if(med&&qtdMil&&precoTotal) itens.push({med,qtdMil,precoTotal});
    });

    // Comissão — base usa frete cobrado do cliente
    const temComissao=!['ramon'].includes(vendedor.toLowerCase().trim());
    const baseComissao=valorTotal-freteCobrado;
    const comissao=temComissao?ceilCents(baseComissao*0.05):0;

    // Parcelas
    const parcelas=calcParcelas(data,valorTotal,prazo);

    // Quinzena e mês
    const [dd]=data.split('/').map(Number);
    const quinzena=dd<=15?'primeira':'segunda';
    const mesRef=extractMonth(data);

    result.push({data,vendedor,cliente,itensRaw,itens,valorTotal,freteCobrado,freteCusto,prazo,baseComissao,comissao,temComissao,parcelas,quinzena,mesRef});
  }
  return result;
}

function calcParcelas(data,valor,prazo){
  if(!prazo||['à vista','a vista'].includes(prazo.toLowerCase()))
    return [{label:'À vista',valor,venc:data}];
  const dias=prazo.split('/').map(d=>parseInt(d.trim())).filter(d=>!isNaN(d)&&d>0);
  if(!dias.length) return [{label:'À vista',valor,venc:data}];
  const [dd,mm]=data.split('/').map(Number);
  const ano=new Date().getFullYear();
  const base=new Date(ano,mm-1,dd);
  const valParcela=ceilCents(valor/dias.length);
  return dias.map(d=>{
    const dt=new Date(base); dt.setDate(dt.getDate()+d);
    const venc=String(dt.getDate()).padStart(2,'0')+'/'+String(dt.getMonth()+1).padStart(2,'0')+'/'+dt.getFullYear();
    return {label:d+' dias',valor:valParcela,venc};
  });
}

function getCustoMilMaisRecente(med){
  const porMes={};
  [...STATE.f1,...STATE.f2].forEach(r=>{
    if(r.med!==med) return;
    const m=extractMonth(r.data);
    if(!m) return;
    if(!porMes[m])porMes[m]={kg:0,mil:0};
    porMes[m].kg+=r.kg; porMes[m].mil+=r.mil;
  });
  const meses=Object.keys(porMes).sort();
  if(!meses.length) return 0;
  const d=porMes[meses[meses.length-1]];
  return d.mil?calcCusto(d.kg,d.mil):0;
}

function getCustoVenda(venda){
  return venda.itens.reduce((s,it)=>{
    const c=getCustoMilMaisRecente(it.med);
    return s+(c?c*it.qtdMil:0);
  },0);
}

function getLucroVenda(venda){
  return venda.valorTotal-venda.freteCusto-venda.comissao-getCustoVenda(venda);
}

function getMargemVenda(venda){
  if(!venda.valorTotal) return 0;
  return (getLucroVenda(venda)/venda.valorTotal)*100;
}

function tagMargem(pct){
  if(pct>=15) return `<span class="tag-margem tag-ok">${pct.toFixed(1)}%</span>`;
  if(pct>=0)  return `<span class="tag-margem tag-atencao">${pct.toFixed(1)}%</span>`;
  return `<span class="tag-margem tag-ruim">${pct.toFixed(1)}%</span>`;
}

function renderProdutividade(){
  const HORAS_TURNO = 10; // Dia: 07-17 / Noite: 20-06
  // Filtra por mês selecionado
  const allProdRows = STATE.f2.filter(r => r.operador && r.operador.trim() !== '');
  const rows = STATE.selMonth
    ? allProdRows.filter(r => extractMonth(r.data) === STATE.selMonth)
    : allProdRows;
  const main = document.getElementById('main');

  if(!rows.length){
    main.innerHTML=`<div class="empty" style="padding:80px;text-align:center;color:var(--text3)">
      <div style="font-size:40px;margin-bottom:16px">📈</div>
      <div style="font-size:16px;font-weight:700;color:var(--text2);margin-bottom:8px">Nenhum dado de produtividade em ${monthLabel(STATE.selMonth)}</div>
      <div style="font-size:13px">Preencha as colunas máquina, turno, operador na planilha Primícia.</div>
    </div>`;
    return;
  }

  // ── Helpers ──────────────────────────────────
  // Horas proporcional ao kg para produtividade
  const rowsProd = calcHorasProporcional(rows, HORAS_TURNO);

  function groupBy(arr, key){
    return arr.reduce((acc,r)=>{
      const k=r[key]||'—';
      if(!acc[k]) acc[k]={kg:0,mil:0,perda:0,lotes:0,horas:0};
      acc[k].kg+=r.kg; acc[k].mil+=r.mil;
      acc[k].perda+=r.perda; acc[k].lotes++;
      acc[k].horas+=r.horasLote; // usa horas reais do lote
      return acc;
    },{});
  }

  const byOp    = groupBy(rowsProd,'operador');
  const byMaq   = groupBy(rowsProd,'maquina');
  const byMed   = groupBy(rowsProd,'med');
  const byTurno = groupBy(rowsProd,'turno');
  const byData  = groupBy(rowsProd,'data');

  // kg/hora e mil/hora
  function kgh(d){ return d.horas>0 ? d.kg/d.horas : 0; }
  function milh(d){ return d.horas>0 ? d.mil/d.horas : 0; }

  // Totais
  const totalKg   = rows.reduce((s,r)=>s+r.kg,0);
  const totalMil  = rows.reduce((s,r)=>s+r.mil,0);
  const totalH    = rowsProd.reduce((s,r)=>s+r.horasLote,0);
  const totalKgH  = totalH>0 ? totalKg/totalH : 0;
  const totalMilH = totalH>0 ? totalMil/totalH : 0;

  // Melhor dia
  const melhorDia = Object.entries(byData).sort((a,b)=>kgh(b[1])-kgh(a[1]))[0];
  const piorDia   = Object.entries(byData).sort((a,b)=>kgh(a[1])-kgh(b[1]))[0];

  const cores = ['#E87722','#5b8af5','#2ecc71','#a55eea','#f1c40f','#e74c3c','#1abc9c'];

  // ── KPIs ─────────────────────────────────────
  let html=`<div class="kpis">
    <div class="kpi"><div class="kpi-icon">⚡</div><div class="kpi-label">kg/hora geral</div>
      <div class="kpi-val" style="color:var(--orange)">${totalKgH.toFixed(1)}</div>
      <div class="kpi-sub">média todas máquinas</div></div>
    <div class="kpi"><div class="kpi-icon">📦</div><div class="kpi-label">Mil/hora geral</div>
      <div class="kpi-val" style="color:var(--blue)">${totalMilH.toFixed(2)}</div>
      <div class="kpi-sub">milheiros por hora</div></div>
    <div class="kpi"><div class="kpi-icon">⏱️</div><div class="kpi-label">Horas registradas</div>
      <div class="kpi-val">${totalH.toLocaleString('pt-BR')}</div>
      <div class="kpi-sub">${rows.length} lotes · ${HORAS_TURNO}h/turno</div></div>
    <div class="kpi"><div class="kpi-icon">🏆</div><div class="kpi-label">Melhor dia</div>
      <div class="kpi-val" style="color:var(--green);font-size:18px">${melhorDia?melhorDia[0]:'—'}</div>
      <div class="kpi-sub">${melhorDia?kgh(melhorDia[1]).toFixed(1)+' kg/h':''}</div></div>
    <div class="kpi"><div class="kpi-icon">📉</div><div class="kpi-label">Dia mais fraco</div>
      <div class="kpi-val" style="color:var(--red);font-size:18px">${piorDia?piorDia[0]:'—'}</div>
      <div class="kpi-sub">${piorDia?kgh(piorDia[1]).toFixed(1)+' kg/h':''}</div></div>
  </div>`;

  // ── Gráfico evolução diária ───────────────────
  const diasSort = Object.entries(byData).sort((a,b)=>a[0].localeCompare(b[0]));
  const maxDiaKgH = Math.max(...diasSort.map(d=>kgh(d[1])),1);
  html+=`<div class="chart-wrap">
    <div class="section-header">
      <div class="section-title">📈 Evolução diária — kg/hora</div>
      <div class="section-badge">${HORAS_TURNO}h por turno</div>
    </div>
    <div class="chart-bars" style="height:150px;margin-top:16px">`;
  diasSort.forEach(([data,d],i)=>{
    const h=Math.max(6,Math.round((kgh(d)/maxDiaKgH)*140));
    const cor = kgh(d)>=totalKgH ? 'var(--green)' : 'var(--orange-dim)';
    html+=`<div class="bar-group">
      <div class="bar" style="height:${h}px;background:${cor};border-color:${cor}" 
           title="${data}: ${kgh(d).toFixed(1)} kg/h · ${d.kg.toFixed(0)} kg"></div>
      <div class="bar-lbl">${data}</div>
    </div>`;
  });
  html+=`</div>
    <div style="display:flex;gap:16px;margin-top:10px;font-size:11px;color:var(--text3)">
      <span style="color:var(--green)">■</span><span>Acima da média (${totalKgH.toFixed(1)} kg/h)</span>
      <span style="color:var(--orange)">■</span><span>Abaixo da média</span>
    </div>
  </div>`;

  // ── Grid: Operadores + Máquinas ───────────────
  html+=`<div class="op-grid">`;

  // kg/hora por operador
  const opSort = Object.entries(byOp).sort((a,b)=>kgh(b[1])-kgh(a[1]));
  const maxOpKgH = Math.max(...opSort.map(d=>kgh(d[1])),1);
  html+=`<div class="section">
    <div class="section-header">
      <div class="section-title">👤 kg/hora por Operador</div>
      <div class="section-badge">Turno = ${HORAS_TURNO}h</div>
    </div>
    <div class="table-wrap"><div style="padding:16px"><div class="bar-h-wrap">`;
  opSort.forEach(([op,d],i)=>{
    const v=kgh(d); const pct=v/maxOpKgH*100;
    const cor=cores[i%cores.length];
    const milHora=milh(d);
    html+=`<div class="bar-h-item">
      <div class="bar-h-label" style="width:70px">${op}</div>
      <div class="bar-h-track">
        <div class="bar-h-fill" style="width:${pct}%;background:${cor}">${v.toFixed(1)} kg/h</div>
      </div>
      <div class="bar-h-val" style="width:80px">${milHora.toFixed(2)} mil/h</div>
    </div>`;
  });
  html+=`</div></div></div></div>`;

  // kg/hora por máquina
  const maqSort = Object.entries(byMaq).sort((a,b)=>kgh(b[1])-kgh(a[1]));
  const maxMaqKgH = Math.max(...maqSort.map(d=>kgh(d[1])),1);
  html+=`<div class="section">
    <div class="section-header">
      <div class="section-title">⚙️ kg/hora por Máquina</div>
    </div>
    <div class="table-wrap"><div style="padding:16px"><div class="bar-h-wrap">`;
  maqSort.forEach(([maq,d],i)=>{
    const v=kgh(d); const pct=v/maxMaqKgH*100;
    const cor=cores[i%cores.length];
    html+=`<div class="bar-h-item">
      <div class="bar-h-label" style="width:70px">${maq}</div>
      <div class="bar-h-track">
        <div class="bar-h-fill" style="width:${pct}%;background:${cor}">${v.toFixed(1)} kg/h</div>
      </div>
      <div class="bar-h-val" style="width:80px">${milh(d).toFixed(2)} mil/h</div>
    </div>`;
  });
  html+=`</div></div></div></div>`;
  html+=`</div>`; // fim op-grid

  // ── kg/hora por medida ────────────────────────
  const medSort = Object.entries(byMed).sort((a,b)=>kgh(b[1])-kgh(a[1]));
  const maxMedKgH = Math.max(...medSort.map(d=>kgh(d[1])),1);
  html+=`<div class="section">
    <div class="section-header">
      <div class="section-title">📐 kg/hora por Medida</div>
      <div class="section-badge">${medSort.length} medidas</div>
    </div>
    <div class="table-wrap"><div style="padding:16px 16px 8px"><div class="bar-h-wrap">`;
  medSort.forEach(([med,d],i)=>{
    const v=kgh(d); const pct=v/maxMedKgH*100;
    const cor=v>=totalKgH?'var(--green)':'var(--orange)';
    html+=`<div class="bar-h-item">
      <div class="bar-h-label" style="width:70px;font-family:DM Mono,monospace;font-size:11px">${med}</div>
      <div class="bar-h-track">
        <div class="bar-h-fill" style="width:${pct}%;background:${cor}">${v.toFixed(1)} kg/h</div>
      </div>
      <div class="bar-h-val" style="width:90px">${milh(d).toFixed(2)} mil/h</div>
    </div>`;
  });
  html+=`</div></div></div></div>`;

  // ── Comparativo turno Dia vs Noite ────────────
  const turnoSort = Object.entries(byTurno).sort((a,b)=>kgh(b[1])-kgh(a[1]));
  html+=`<div class="op-grid">`;
  html+=`<div class="section">
    <div class="section-header"><div class="section-title">🌅 Turno Dia vs Noite — kg/hora</div></div>
    <div class="turno-compare">`;
  turnoSort.forEach(([turno,d])=>{
    const icon=turno.toLowerCase().includes('dia')?'☀️':'🌙';
    const v=kgh(d); const vm=milh(d);
    const cor=v>=totalKgH?'var(--green)':'var(--orange)';
    html+=`<div class="turno-card">
      <div class="turno-title">${icon} Turno ${turno}</div>
      <div class="turno-stat"><span class="turno-stat-label">kg/hora</span>
        <span class="turno-stat-val" style="color:${cor};font-size:20px">${v.toFixed(1)}</span></div>
      <div class="turno-stat"><span class="turno-stat-label">Milheiros/hora</span>
        <span class="turno-stat-val">${vm.toFixed(2)}</span></div>
      <div class="turno-stat"><span class="turno-stat-label">kg total</span>
        <span class="turno-stat-val">${d.kg.toFixed(0)} kg</span></div>
      <div class="turno-stat"><span class="turno-stat-label">Horas totais</span>
        <span class="turno-stat-val">${d.horas}h</span></div>
      <div class="turno-stat"><span class="turno-stat-label">Lotes</span>
        <span class="turno-stat-val">${d.lotes}</span></div>
    </div>`;
  });
  html+=`</div></div>`;

  // Tabela completa operadores
  html+=`<div class="section">
    <div class="section-header"><div class="section-title">📊 Tabela completa — Operadores</div></div>
    <div class="table-wrap"><table class="data-table"><thead><tr>
      <th>Operador</th><th>Lotes</th><th>KG Total</th><th>Milheiros</th><th>Horas</th><th>kg/hora</th><th>Mil/hora</th><th>Perda kg</th><th>% Perda</th>
    </tr></thead><tbody>`;
  opSort.forEach(([op,d])=>{
    const v=kgh(d); const vm=milh(d);
    const pctP=d.kg>0?d.perda/d.kg*100:0;
    const corKgH=v>=totalKgH?'var(--green)':'var(--orange)';
    html+=`<tr>
      <td style="font-weight:700">${op}</td>
      <td>${d.lotes}</td>
      <td>${d.kg.toFixed(0)}</td>
      <td>${d.mil.toLocaleString('pt-BR')}</td>
      <td>${d.horas}h</td>
      <td style="color:${corKgH};font-weight:700">${v.toFixed(1)}</td>
      <td>${vm.toFixed(2)}</td>
      <td style="color:var(--red)">${d.perda.toFixed(1)}</td>
      <td style="color:${pctP<3?'var(--green)':pctP<6?'var(--orange)':'var(--red)'}">${pctP.toFixed(1)}%</td>
    </tr>`;
  });
  html+=`</tbody></table></div></div>`;
  html+=`</div>`; // fim op-grid


  // ── PROJEÇÃO MENSAL ──────────────────────────────────────────────────────
  const maqAtivas = Object.keys(byMaq).length || 1;

  // Passo 1: define ano/mês selecionado
  let anoSel, mesSel;
  if(STATE.selMonth){
    const [_mm, _yy] = STATE.selMonth.split('/');
    mesSel = parseInt(_mm) - 1; // 0-indexed
    anoSel = parseInt('20' + _yy);
  } else {
    const _n = new Date();
    anoSel = _n.getFullYear();
    mesSel = _n.getMonth();
  }

  // Passo 2: "hoje" = data mais recente nos dados (não depende do relógio do PC)
  let diaRef = 1;
  rowsProd.forEach(r=>{
    const [_dd] = r.data.split('/').map(Number);
    if(_dd > diaRef) diaRef = _dd;
  });

  const ehMesAtual  = true; // sempre trata o mês selecionado como "em andamento" se há dados
  const ultimoDia   = new Date(anoSel, mesSel+1, 0).getDate();

  // Passo 3: conta dias úteis
  function contarUteis(inicio, fim){
    let u = 0;
    for(let d = inicio; d <= fim; d++){
      const dow = new Date(anoSel, mesSel, d).getDay();
      if(dow >= 1 && dow <= 5) u++;
    }
    return u;
  }

  const diasPassados   = contarUteis(1, diaRef);
  const diasRestantes  = contarUteis(diaRef + 1, ultimoDia);
  const totalDiasUteis = diasPassados + diasRestantes;

  const horasDia       = 20; // 2 turnos × 10h
  const horasRestantes = diasRestantes * horasDia * maqAtivas;
  const kghGeral       = totalH > 0 ? totalKg / totalH : 0;
  const kgProjetado    = kghGeral * horasRestantes;
  const kgTotalMes     = totalKg + kgProjetado;
  const pctConcluido   = totalDiasUteis > 0 ? (diasPassados / totalDiasUteis) * 100 : 0;
  const corBarra       = pctConcluido >= 80 ? 'var(--green)' : pctConcluido >= 50 ? 'var(--orange)' : 'var(--blue)';

  html += `
  <div class="section">
    <div class="section-header">
      <div class="section-title">🔮 Projeção Mensal — ${monthLabel(STATE.selMonth)}</div>
      <div class="section-badge">${maqAtivas} máq. · 2 turnos · ${horasDia}h/dia</div>
    </div>
    <div class="table-wrap" style="margin-bottom:16px">
      <div style="padding:20px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
          <span style="font-size:13px;color:var(--text2);font-weight:600">Progresso do mês</span>
          <span style="font-family:'DM Mono',monospace;font-size:13px;color:var(--text3)">${diasPassados} de ${totalDiasUteis} dias úteis</span>
        </div>
        <div style="background:var(--bg3);border-radius:6px;height:28px;overflow:hidden">
          <div style="width:${pctConcluido.toFixed(1)}%;height:100%;background:${corBarra};border-radius:6px;display:flex;align-items:center;padding-left:12px;transition:width .6s">
            <span style="font-family:'DM Mono',monospace;font-size:12px;font-weight:700;color:#000;white-space:nowrap">${pctConcluido.toFixed(0)}% concluído</span>
          </div>
        </div>
        <div style="display:flex;justify-content:space-between;margin-top:6px;font-size:11px;color:var(--text3);font-family:'DM Mono',monospace">
          <span>01/${(mesSel+1).toString().padStart(2,'0')}/${anoSel}</span>
          <span style="color:var(--orange)">▲ dia ${diaRef}</span>
          <span>${ultimoDia}/${(mesSel+1).toString().padStart(2,'0')}/${anoSel}</span>
        </div>
      </div>
    </div>
    <div class="kpis" style="margin-bottom:0">
      <div class="kpi">
        <div class="kpi-icon">✅</div>
        <div class="kpi-label">Já produzido</div>
        <div class="kpi-val" style="color:var(--green)">${totalKg.toLocaleString('pt-BR',{maximumFractionDigits:0})} kg</div>
        <div class="kpi-sub">${diasPassados} dias úteis · ${totalH.toFixed(0)}h</div>
      </div>
      <div class="kpi">
        <div class="kpi-icon">🔮</div>
        <div class="kpi-label">Projeção restante</div>
        <div class="kpi-val" style="color:var(--blue)">${kgProjetado.toLocaleString('pt-BR',{maximumFractionDigits:0})} kg</div>
        <div class="kpi-sub">${diasRestantes} dias úteis restantes</div>
      </div>
      <div class="kpi">
        <div class="kpi-icon">📊</div>
        <div class="kpi-label">Total projetado mês</div>
        <div class="kpi-val" style="color:var(--orange)">${kgTotalMes.toLocaleString('pt-BR',{maximumFractionDigits:0})} kg</div>
        <div class="kpi-sub">base: ${kghGeral.toFixed(1)} kg/h médio</div>
      </div>
      <div class="kpi">
        <div class="kpi-icon">⚡</div>
        <div class="kpi-label">kg/hora atual</div>
        <div class="kpi-val">${kghGeral.toFixed(1)}</div>
        <div class="kpi-sub">todas as máquinas</div>
      </div>
      <div class="kpi">
        <div class="kpi-icon">🏭</div>
        <div class="kpi-label">Máquinas ativas</div>
        <div class="kpi-val">${maqAtivas}</div>
        <div class="kpi-sub">de 3 disponíveis</div>
      </div>
    </div>
  </div>`;

  main.innerHTML=html;
}


// ══════════════════════════════════════════════
//  ABA OPERACIONAL — Primícia
// ══════════════════════════════════════════════
function renderOperacional(){
  // Apenas dados da Primícia com operador preenchido
  // Filtra por mês selecionado
  const allOpRows = STATE.f2.filter(r => r.operador && r.operador.trim() !== '');
  const rows = STATE.selMonth
    ? allOpRows.filter(r => extractMonth(r.data) === STATE.selMonth)
    : allOpRows;
  const main = document.getElementById('main');

  if(!rows.length){
    main.innerHTML=`<div class="empty" style="padding:80px;text-align:center;color:var(--text3)">
      <div style="font-size:40px;margin-bottom:16px">📋</div>
      <div style="font-size:16px;font-weight:700;color:var(--text2);margin-bottom:8px">Nenhum dado operacional em ${monthLabel(STATE.selMonth)}</div>
      <div style="font-size:13px">Preencha as colunas máquina, turno, operador e perda na planilha Primícia.</div>
    </div>`;
    return;
  }

  // ── Agrupadores ──────────────────────────────
  function groupBy(arr, key){
    return arr.reduce((acc,r)=>{ const k=r[key]||'—'; if(!acc[k])acc[k]={kg:0,mil:0,perda:0,lotes:0}; acc[k].kg+=r.kg; acc[k].mil+=r.mil; acc[k].perda+=r.perda; acc[k].lotes++; return acc; },{});
  }

  const byOp  = groupBy(rows,'operador');
  const byMaq = groupBy(rows,'maquina');
  const byTurno = groupBy(rows,'turno');

  // ── KPI totais ───────────────────────────────
  const totalKg    = rows.reduce((s,r)=>s+r.kg,0);
  const totalMil   = rows.reduce((s,r)=>s+r.mil,0);
  const totalPerda = rows.reduce((s,r)=>s+r.perda,0);
  const eficiencia = totalKg>0 ? ((totalKg-totalPerda)/totalKg*100) : 0;

  // ── Média kg/unidade por medida (padrão histórico) ──
  const mediaPorMed={};
  const consAll={};
  [...STATE.f1,...STATE.f2].forEach(r=>{
    if(!consAll[r.med])consAll[r.med]={kg:0,mil:0};
    consAll[r.med].kg+=r.kg; consAll[r.med].mil+=r.mil;
  });
  Object.keys(consAll).forEach(med=>{
    const c=consAll[med];
    if(c.mil>0) mediaPorMed[med]=c.kg/(c.mil*1000);
  });

  // ── Alertas inteligentes ─────────────────────
  const HORAS_TURNO_AL = 10;

  const rowsComHoras = calcHorasProporcional(rows, HORAS_TURNO_AL);
  const f2ComHoras   = calcHorasProporcional(STATE.f2.filter(r=>r.operador&&r.operador.trim()!==''), HORAS_TURNO_AL);

  // Média histórica de kg/hora por medida (base para alertas de produtividade)
  const mediaKgHAlerta = {};
  const contMedAl = {};
  f2ComHoras.forEach(r=>{
    if(!r.med) return;
    const kgh = r.kg / r.horasLote;
    if(!mediaKgHAlerta[r.med]){ mediaKgHAlerta[r.med]=0; contMedAl[r.med]=0; }
    mediaKgHAlerta[r.med] += kgh;
    contMedAl[r.med]++;
  });
  Object.keys(mediaKgHAlerta).forEach(med=>{
    mediaKgHAlerta[med] = mediaKgHAlerta[med] / contMedAl[med];
  });

  const alertas=[];

  // 1. Lotes com produtividade kg/hora ACIMA da média da medida (>20%)
  // 2. Lotes com produtividade kg/hora ABAIXO da média da medida (>20%)
  rowsComHoras.forEach(r=>{
    if(!r.med||!r.kg) return;
    const kghLote = r.kg / r.horasLote;
    const mediaMed = mediaKgHAlerta[r.med];
    if(!mediaMed) return;
    const desvio = (kghLote - mediaMed) / mediaMed;
    if(desvio > 0.20){
      // Alerta expira após 2 dias
      const [dd2a,mm2a] = r.data.split('/').map(Number);
      const dataLote2a = new Date(new Date().getFullYear(), mm2a-1, dd2a);
      const diffDias2a = (new Date() - dataLote2a) / (1000*60*60*24);
      if(diffDias2a <= 2){
        alertas.push({
          tipo:'green', icon:'🟢',
          titulo:`Lote acima da média — ${r.med} · ${r.data}`,
          msg:`${r.operador||'—'} na ${r.maquina||'—'} (Turno ${r.turno||'—'}): ${kghLote.toFixed(1)} kg/h vs média ${mediaMed.toFixed(1)} kg/h da medida → <strong>+${(desvio*100).toFixed(0)}% acima</strong>`
        });
      }
    } else if(desvio < -0.20){
      // Alerta expira após 2 dias
      const [dd2b,mm2b] = r.data.split('/').map(Number);
      const dataLote2b = new Date(new Date().getFullYear(), mm2b-1, dd2b);
      const diffDias2b = (new Date() - dataLote2b) / (1000*60*60*24);
      if(diffDias2b <= 2){
        alertas.push({
          tipo:'red', icon:'🔴',
          titulo:`Lote abaixo da média — ${r.med} · ${r.data}`,
          msg:`${r.operador||'—'} na ${r.maquina||'—'} (Turno ${r.turno||'—'}): ${kghLote.toFixed(1)} kg/h vs média ${mediaMed.toFixed(1)} kg/h da medida → <strong>${(desvio*100).toFixed(0)}% abaixo</strong>`
        });
      }
    }
  });

  // 3. Operador com perda acima da média geral
  const perdaMediaGeral = totalKg>0 ? totalPerda/totalKg*100 : 0;
  Object.entries(byOp).forEach(([op,d])=>{
    const perdaOp = d.kg>0 ? d.perda/d.kg*100 : 0;
    if(perdaOp > perdaMediaGeral*1.3 && d.perda>0){
      alertas.push({
        tipo:'yellow', icon:'⚠️',
        titulo:`${op} — Perda acima da média`,
        msg:`Perda de ${d.perda.toFixed(1)} kg (${perdaOp.toFixed(1)}% do produzido) — média geral é ${perdaMediaGeral.toFixed(1)}%`
      });
    }
  });

  // 4. Turno com produtividade muito abaixo
  const turnoVals = Object.values(byTurno).map(d=>d.kg);
  const mediaKgTurno = turnoVals.reduce((a,b)=>a+b,0)/(turnoVals.length||1);
  Object.entries(byTurno).forEach(([turno,d])=>{
    if(d.kg < mediaKgTurno*0.7 && turnoVals.length>1){
      alertas.push({
        tipo:'blue', icon:'🔵',
        titulo:`Turno ${turno} — Produção abaixo da média`,
        msg:`Produziu ${d.kg.toFixed(0)} kg — média entre turnos é ${mediaKgTurno.toFixed(0)} kg`
      });
    }
  });

  // Ordena: primeiro vermelhos, depois amarelos, verdes, azuis
  const ordemTipo = {red:0, yellow:1, green:2, blue:3};
  alertas.sort((a,b)=>(ordemTipo[a.tipo]||9)-(ordemTipo[b.tipo]||9));

  // ── Sistema de pontuação (bonificação) ───────
  // 80% eficiência vs média kg/hora da medida + 20% constância (dias únicos)
  // Cada lote é comparado com a média histórica de kg/hora daquela medida específica
  // Assim é 100% justo: medida pequena compete com média da medida pequena

  const HORAS_TURNO_OP = 10;

  // Média histórica de kg/hora por medida (todos os lotes da Primícia)
  // Horas proporcional ao kg para o ranking
  const f2Rank = calcHorasProporcional(
    STATE.f2.filter(r=>r.operador&&r.operador.trim()!==''),
    HORAS_TURNO_OP
  );

  const mediaKgHPorMed = {};
  const contMed = {};
  f2Rank.forEach(r=>{
    if(!r.med) return;
    const kgh = r.kg / r.horasLote;
    if(!mediaKgHPorMed[r.med]){ mediaKgHPorMed[r.med]=0; contMed[r.med]=0; }
    mediaKgHPorMed[r.med] += kgh;
    contMed[r.med]++;
  });
  Object.keys(mediaKgHPorMed).forEach(med=>{
    mediaKgHPorMed[med] = mediaKgHPorMed[med] / contMed[med];
  });

  // Dias únicos por operador (constância)
  const diasPorOp = {};
  rows.forEach(r=>{
    if(!r.operador) return;
    if(!diasPorOp[r.operador]) diasPorOp[r.operador] = new Set();
    diasPorOp[r.operador].add(r.data);
  });
  const maxDias = Math.max(...Object.keys(diasPorOp).map(op=>diasPorOp[op].size), 1);

  // Índice de eficiência por operador:
  // Para cada lote: kgh_lote / media_kgh_medida → índice
  // Média de todos os índices do operador = eficiência final
  const eficienciaOp = {};
  const eficienciaDetalhe = {}; // para exibir no rank
  f2Rank.forEach(r=>{
    if(!r.operador||!r.med) return;
    const kghLote = r.kg / r.horasLote;
    const mediaMed = mediaKgHPorMed[r.med] || kghLote;
    const indice = mediaMed > 0 ? kghLote / mediaMed : 1;
    if(!eficienciaOp[r.operador]){ eficienciaOp[r.operador]=[]; }
    eficienciaOp[r.operador].push(indice);
  });
  // Média dos índices de cada operador
  const efMedia = {};
  Object.entries(eficienciaOp).forEach(([op,arr])=>{
    efMedia[op] = arr.reduce((a,b)=>a+b,0)/arr.length;
  });
  const maxEf = Math.max(...Object.values(efMedia), 1);

  const ranking = Object.entries(byOp).map(([op,d])=>{
    const dias = diasPorOp[op] ? diasPorOp[op].size : 0;
    const ef = efMedia[op] || 0;
    const pctPerda = d.kg>0 ? d.perda/d.kg*100 : 0;
    // 80% eficiência vs média da medida + 20% constância
    const pts = Math.round(
      (ef / maxEf) * 80 +
      (dias / maxDias) * 20
    );
    return {op, kg:d.kg, mil:d.mil, perda:d.perda, lotes:d.lotes, dias, ef, pctPerda, pts};
  }).sort((a,b)=>b.pts-a.pts);

  // ── HTML ──────────────────────────────────────
  const medals=['🥇','🥈','🥉'];
  const posClass=['gold','silver','bronze'];

  // KPIs
  let html=`<div class="kpis">
    <div class="kpi"><div class="kpi-icon">⚖️</div><div class="kpi-label">KG Produzido</div><div class="kpi-val">${totalKg.toLocaleString('pt-BR',{maximumFractionDigits:0})} kg</div><div class="kpi-sub">${rows.length} lotes registrados</div></div>
    <div class="kpi"><div class="kpi-icon">📦</div><div class="kpi-label">Milheiros</div><div class="kpi-val">${totalMil.toLocaleString('pt-BR')}</div><div class="kpi-sub">${(totalMil*1000).toLocaleString('pt-BR')} unidades</div></div>
    <div class="kpi"><div class="kpi-icon">🗑️</div><div class="kpi-label">Perda Total</div><div class="kpi-val" style="color:var(--red)">${totalPerda.toFixed(1)} kg</div><div class="kpi-sub">${(totalPerda/totalKg*100).toFixed(1)}% do total produzido</div></div>
    <div class="kpi"><div class="kpi-icon">⚡</div><div class="kpi-label">Eficiência Geral</div><div class="kpi-val" style="color:${eficiencia>=95?'var(--green)':eficiencia>=85?'var(--orange)':'var(--red)'}">${eficiencia.toFixed(1)}%</div><div class="kpi-sub">kg útil / kg total</div></div>
    <div class="kpi"><div class="kpi-icon">👥</div><div class="kpi-label">Operadores</div><div class="kpi-val">${Object.keys(byOp).length}</div><div class="kpi-sub">${Object.keys(byMaq).length} máquinas ativas</div></div>
  </div>`;

  // Alertas
  if(alertas.length){
    html+=`<div class="section"><div class="section-header"><div class="section-title">⚡ Alertas do período</div><div class="section-badge">${alertas.length} alerta${alertas.length>1?'s':''}</div></div>`;
    alertas.forEach(a=>{
      html+=`<div class="alert-op ${a.tipo}"><div class="alert-op-icon">${a.icon}</div><div class="alert-op-body"><strong>${a.titulo}</strong>${a.msg}</div></div>`;
    });
    html+=`</div>`;
  }

  // Pódio bonificação
  if(ranking.length>=2){
    html+=`<div class="section"><div class="section-header"><div class="section-title">🏆 Pódio — Bonificação</div><div class="section-badge">Eficiência kg/h 80% · Constância 20%</div></div>
    <div class="table-wrap"><div class="card-body" style="padding:20px">
    <div class="podio">`;
    // Ordem pódio: 2º, 1º, 3º
    const podioOrder = ranking.length>=3 ? [1,0,2] : ranking.length===2 ? [1,0] : [0];
    podioOrder.forEach(i=>{
      if(!ranking[i]) return;
      const r=ranking[i];
      const cls=posClass[i]||'other';
      const h=i===0?70:i===1?50:35;
      html+=`<div class="podio-item">
        <div class="podio-avatar ${cls}">${medals[i]||'🎖️'}</div>
        <div class="podio-name">${r.op}</div>
        <div class="podio-pts">${r.pts} pts</div>
        <div class="podio-base ${cls}"><span>${i===0?'1º':i===1?'2º':'3º'} lugar</span></div>
      </div>`;
    });
    html+=`</div></div></div></div>`;
  }

  // Grid: Ranking operadores + Comparativo turno
  html+=`<div class="op-grid">`;

  // Ranking operadores
  html+=`<div class="section"><div class="section-header"><div class="section-title">👤 Ranking Operadores</div></div>
  <div class="rank-list">`;
  ranking.forEach((r,i)=>{
    const cls=i===0?'gold':i===1?'silver':i===2?'bronze':'other';
    html+=`<div class="rank-item">
      <div class="rank-pos ${cls}">${medals[i]||i+1}</div>
      <div class="rank-info">
        <div class="rank-name">${r.op}</div>
        <div class="rank-sub">Ef. ${(r.ef*100).toFixed(1)}% vs média · ${r.dias} dias · ${r.lotes} lotes</div>
      </div>
      <div class="rank-score">
        <div class="rank-pts">${r.pts}</div>
        <div class="rank-pts-label">pontos</div>
      </div>
    </div>`;
  });
  html+=`</div></div>`;

  // Comparativo turnos
  const turnos = Object.entries(byTurno).sort((a,b)=>b[1].kg-a[1].kg);
  html+=`<div class="section"><div class="section-header"><div class="section-title">🌅 Turno Dia vs Noite</div></div>
  <div class="turno-compare">`;
  turnos.forEach(([turno,d])=>{
    const ef = d.kg>0?(d.kg-d.perda)/d.kg*100:0;
    const icon = turno.toLowerCase().includes('dia')?'☀️':'🌙';
    html+=`<div class="turno-card">
      <div class="turno-title">${icon} Turno ${turno}</div>
      <div class="turno-stat"><span class="turno-stat-label">KG Produzido</span><span class="turno-stat-val">${d.kg.toFixed(0)} kg</span></div>
      <div class="turno-stat"><span class="turno-stat-label">Milheiros</span><span class="turno-stat-val">${d.mil.toLocaleString('pt-BR')}</span></div>
      <div class="turno-stat"><span class="turno-stat-label">Perda</span><span class="turno-stat-val" style="color:var(--red)">${d.perda.toFixed(1)} kg</span></div>
      <div class="turno-stat"><span class="turno-stat-label">Eficiência</span><span class="turno-stat-val" style="color:${ef>=95?'var(--green)':ef>=85?'var(--orange)':'var(--red)'}">${ef.toFixed(1)}%</span></div>
      <div class="turno-stat"><span class="turno-stat-label">Lotes</span><span class="turno-stat-val">${d.lotes}</span></div>
    </div>`;
  });
  html+=`</div></div>`;
  html+=`</div>`; // fim op-grid

  // Produção por máquina (barras horizontais)
  const maqList = Object.entries(byMaq).sort((a,b)=>b[1].kg-a[1].kg);
  const maxMaqKg = Math.max(...maqList.map(m=>m[1].kg),1);
  const cores=['#E87722','#5b8af5','#2ecc71','#a55eea','#f1c40f'];
  html+=`<div class="op-grid">`;

  html+=`<div class="section"><div class="section-header"><div class="section-title">⚙️ Produção por Máquina</div></div>
  <div class="table-wrap"><div style="padding:16px"><div class="bar-h-wrap">`;
  maqList.forEach(([maq,d],i)=>{
    const pct=d.kg/maxMaqKg*100;
    const ef=d.kg>0?(d.kg-d.perda)/d.kg*100:0;
    html+=`<div class="bar-h-item">
      <div class="bar-h-label">${maq}</div>
      <div class="bar-h-track">
        <div class="bar-h-fill" style="width:${pct}%;background:${cores[i%cores.length]}">${ef.toFixed(0)}% ef.</div>
      </div>
      <div class="bar-h-val">${d.kg.toFixed(0)} kg</div>
    </div>`;
  });
  html+=`</div></div></div></div>`;

  // Tabela detalhada por máquina
  html+=`<div class="section"><div class="section-header"><div class="section-title">📊 Detalhe por Máquina</div></div>
  <div class="table-wrap"><table class="data-table"><thead><tr>
    <th>Máquina</th><th>KG</th><th>Milheiros</th><th>Lotes</th><th>Perda (kg)</th><th>% Perda</th><th>Eficiência</th>
  </tr></thead><tbody>`;
  maqList.forEach(([maq,d])=>{
    const pctPerda=d.kg>0?d.perda/d.kg*100:0;
    const ef=d.kg>0?(d.kg-d.perda)/d.kg*100:0;
    html+=`<tr>
      <td style="font-weight:700">${maq}</td>
      <td>${d.kg.toFixed(0)}</td>
      <td>${d.mil.toLocaleString('pt-BR')}</td>
      <td>${d.lotes}</td>
      <td style="color:var(--red)">${d.perda.toFixed(1)}</td>
      <td style="color:${pctPerda<3?'var(--green)':pctPerda<6?'var(--orange)':'var(--red)'}">${pctPerda.toFixed(1)}%</td>
      <td style="color:${ef>=95?'var(--green)':ef>=85?'var(--orange)':'var(--red)'}"><strong>${ef.toFixed(1)}%</strong></td>
    </tr>`;
  });
  html+=`</tbody></table></div></div>`;
  html+=`</div>`; // fim op-grid

  // Tabela lotes completa
  html+=`<div class="section"><div class="section-header"><div class="section-title">📋 Todos os Lotes — Operacional</div><div class="section-badge">${rows.length} registros</div></div>
  <div class="table-wrap"><table class="data-table"><thead><tr>
    <th>Data</th><th>Medida</th><th>Máquina</th><th>Turno</th><th>Operador</th><th>KG</th><th>Milheiros</th><th>Perda (kg)</th><th>% Perda</th>
  </tr></thead><tbody>`;
  [...rows].reverse().forEach(r=>{
    const pctP=r.kg>0?r.perda/r.kg*100:0;
    html+=`<tr>
      <td style="color:var(--text3);font-size:12px">${r.data}</td>
      <td>${r.med}</td>
      <td><span style="font-family:'DM Mono',monospace;font-size:12px;background:var(--orange-dim);color:var(--orange);padding:2px 8px;border-radius:4px">${r.maquina||'—'}</span></td>
      <td>${r.turno?( r.turno.toLowerCase().includes('dia')?'☀️ '+r.turno:'🌙 '+r.turno):'—'}</td>
      <td style="font-weight:600">${r.operador||'—'}</td>
      <td>${r.kg.toFixed(0)}</td>
      <td>${r.mil.toLocaleString('pt-BR')}</td>
      <td style="color:${r.perda>0?'var(--red)':'var(--text3)'}">${r.perda>0?r.perda.toFixed(1):'—'}</td>
      <td style="color:${pctP<3?'var(--green)':pctP<6?'var(--orange)':'var(--red)'}">${r.perda>0?pctP.toFixed(1)+'%':'—'}</td>
    </tr>`;
  });
  html+=`</tbody></table></div></div>`;

  main.innerHTML=html;
}

</script>
</body>
</html>
