        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;">
          ${[['📅 Dia 10','Exporta 1º→10º','Identifica cortes urgentes e heróis subfinanciados. Age no budget.'],
             ['📅 Dia 20','Exporta 1º→20º','Valida se ajustes funcionaram. Amplifica heróis que aceleraram.'],
             ['📅 Fechamento','Exporta mês completo','Análise final. Benchmark atualizado. Estratégia do mês seguinte.']
            ].map(([t,p,d])=>`<div style="background:var(--bg3);border-radius:10px;padding:14px;">
            <div style="font-size:13px;font-weight:700;color:var(--orange);margin-bottom:4px">${t}</div>
            <div style="font-size:11px;color:var(--text2);font-weight:600;margin-bottom:6px">${p}</div>
            <div style="font-size:11px;color:var(--text3);line-height:1.5">${d}</div>
          </div>`).join('')}
        </div>
      </div>
    </div>`;
    setTimeout(()=>{
      const z=document.getElementById('adsDropZone');
      if(!z) return;
      z.addEventListener('dragover',e=>{e.preventDefault();z.style.borderColor='var(--orange)';});
      z.addEventListener('dragleave',()=>{z.style.borderColor='';});
      z.addEventListener('drop',e=>{e.preventDefault();z.style.borderColor='';if(e.dataTransfer.files[0])adsLoadFile(e.dataTransfer.files[0]);});
    },100);
    return;
  }

  const periods=STATE.ads;
  const selIdx =STATE.selPeriodoAds!==null?STATE.selPeriodoAds:periods.length-1;
  const period =periods[selIdx];
  const ads    =adsAggregate(period.rows);
  const campanhas=adsCampanhas(period.rows);
  const acoes  =adsGerarAcoes(ads, campanhas, period.dias||30);

  const totRec =ads.reduce((s,a)=>s+a.receita,0);
  const totInv =ads.reduce((s,a)=>s+a.invest,0);
  const totCliq=ads.reduce((s,a)=>s+a.cliques,0);
  const totVend=ads.reduce((s,a)=>s+a.vendasTotal,0);
  const roasG  =totInv>0?totRec/totInv:0;
  const acosG  =totRec>0?totInv/totRec*100:0;
  const cvrG   =totCliq>0?totVend/totCliq*100:0;

  const heroes =ads.filter(a=>a.roas>=20);
  const healthy=ads.filter(a=>a.roas>=8&&a.roas<20);
  const alertA =ads.filter(a=>a.roas>=5&&a.roas<8);
  const cut    =ads.filter(a=>a.invest>5&&a.roas<5);
  const subfin =heroes.filter(a=>a.invest<200);

  const dRoas=roasG-ADS_BENCHMARK.roas;
  const dAcos=acosG-ADS_BENCHMARK.acos;
  const dRec =totRec-ADS_BENCHMARK.receita;

  let html='';

  // ── Barra de períodos + botão importar ──
  html+=`<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:20px;">
    <div class="ads-period-bar" style="margin-bottom:0;flex:1;">
      <span class="ads-period-label">Período</span>
      ${periods.map((p,i)=>`<button class="ads-period-btn${i===selIdx?' active':''}" onclick="STATE.selPeriodoAds=${i};renderAds()">${p.label}</button>`).join('')}
    </div>
    <div style="display:flex;gap:8px;">
      <button class="btn btn-ghost btn-sm" onclick="document.getElementById('adsFileInputExtra').click()">+ Importar período</button>
      <input type="file" id="adsFileInputExtra" accept=".xlsx,.xls" style="display:none" onchange="adsLoadFile(this.files[0])">
      <button class="btn btn-ghost btn-sm" onclick="if(confirm('Limpar todos os períodos?')){STATE.ads=[];STATE.selPeriodoAds=null;renderAds();}">✕ Limpar</button>
    </div>
  </div>`;

  // ── KPIs ──
  html+=`<div class="kpis">
    <div class="kpi"><div class="kpi-icon">💰</div><div class="kpi-label">Receita via Ads</div>
      <div class="kpi-val">${fmtRk(totRec)}</div>
      <div class="kpi-sub" style="color:${dRec>=0?'var(--green)':'var(--red)'}">${sign(dRec)}${fmtRk(Math.abs(dRec))} vs benchmark</div></div>
    <div class="kpi"><div class="kpi-icon">📈</div><div class="kpi-label">ROAS geral</div>
      <div class="kpi-val" style="color:${roasG>=15.9?'var(--green)':roasG>=8?'var(--orange)':'var(--red)'}">${roasG.toFixed(1)}x</div>
      <div class="kpi-sub" style="color:${dRoas>=0?'var(--green)':'var(--red)'}">${sign(dRoas)}${Math.abs(dRoas).toFixed(1)}x vs 15,9x ref</div></div>
    <div class="kpi"><div class="kpi-icon">🎯</div><div class="kpi-label">ACOS</div>
      <div class="kpi-val" style="color:${acosG<=6.28?'var(--green)':acosG<=10?'var(--orange)':'var(--red)'}">${acosG.toFixed(2)}%</div>
      <div class="kpi-sub" style="color:${dAcos<=0?'var(--green)':'var(--red)'}">${sign(dAcos)}${Math.abs(dAcos).toFixed(2)}pp vs 6,28% ref</div></div>
    <div class="kpi"><div class="kpi-icon">🔄</div><div class="kpi-label">CVR</div>
      <div class="kpi-val">${cvrG.toFixed(1)}%</div>
      <div class="kpi-sub">${totVend.toLocaleString('pt-BR')} vendas · ${totCliq.toLocaleString('pt-BR')} cliques</div></div>
    <div class="kpi"><div class="kpi-icon">🏆</div><div class="kpi-label">Heróis</div>
      <div class="kpi-val" style="color:var(--green)">${heroes.length}</div>
      <div class="kpi-sub" style="color:${subfin.length>0?'var(--red)':'var(--text3)'}">${subfin.length} subfinanciados</div></div>
    <div class="kpi"><div class="kpi-icon">⚡</div><div class="kpi-label">Ações pendentes</div>
      <div class="kpi-val" style="color:var(--orange)">${acoes.pausar.length+acoes.aumentar.length+acoes.isolar.length}</div>
      <div class="kpi-sub">${acoes.pausar.length} pausar · ${acoes.aumentar.length} escalar · ${acoes.isolar.length} isolar</div></div>
  </div>`;

  // ── Alertas de ação imediata ──
  const totalEconomia=acoes.pausar.reduce((s,a)=>s+a.economia,0);
  const totalPotencial=acoes.aumentar.reduce((s,a)=>s+a.receitaEstimada,0);
  if(acoes.pausar.length||acoes.aumentar.length||acoes.isolar.length){
    html+=`<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin-bottom:24px;">`;
    if(acoes.pausar.length) html+=`<div class="ads-insight" style="margin-bottom:0">
      <div class="ads-insight-icon">✂️</div>
      <div class="ads-insight-body"><strong style="color:var(--red)">Pausar agora — ${acoes.pausar.length} anúncios</strong>
      Libera <strong>${fmtR(totalEconomia)}</strong> de budget desperdiçado em anúncios abaixo de 5x ROAS.</div></div>`;
    if(acoes.aumentar.length) html+=`<div class="ads-insight" style="margin-bottom:0">
      <div class="ads-insight-icon">🚀</div>
      <div class="ads-insight-body"><strong style="color:var(--green)">Escalar — ${acoes.aumentar.length} heróis subfinanciados</strong>
      Potencial de <strong>+${fmtR(totalPotencial)}</strong> em receita incremental com reforço de budget.</div></div>`;
    if(acoes.isolar.length) html+=`<div class="ads-insight" style="margin-bottom:0">
      <div class="ads-insight-icon">⭐</div>
      <div class="ads-insight-body"><strong style="color:var(--yellow)">Isolar — ${acoes.isolar.length} herói(s) prontos para voar sozinhos</strong>
      Anúncios com ROAS >25x presos em campanhas com anúncios fracos. Criar campanha exclusiva.</div></div>`;
    html+=`</div>`;
  }

  // ── Navegação de views ──
  html+=`<div style="display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;">
    ${[['anuncios','📋 Anúncios'],['campanhas','🗂️ Campanhas'],['acoes','⚡ Plano de Ação'],['isolamento','⭐ Isolar Heróis'],['comparativo','📊 Comparativo']].map(([v,l])=>
      `<button class="ads-filter-btn${ADS_VIEW===v?' active':''}" onclick="ADS_VIEW='${v}';renderAds()">${l}${v==='acoes'&&(acoes.pausar.length+acoes.aumentar.length+acoes.isolar.length)>0?' ('+( acoes.pausar.length+acoes.aumentar.length+acoes.isolar.length)+')':''}</button>`
    ).join('')}
  </div>`;

  // ════════════════════════════════════════
  //  VIEW: ANÚNCIOS
  // ════════════════════════════════════════
  if(ADS_VIEW==='anuncios'){
    const maxRoas=Math.max(...ads.map(a=>a.roas),1);
    let filtered=ads;
    if(ADS_FILTER==='hero')    filtered=heroes;
    if(ADS_FILTER==='healthy') filtered=healthy;
    if(ADS_FILTER==='alert')   filtered=alertA;
    if(ADS_FILTER==='cut')     filtered=cut;

    html+=`<div class="ads-filter-bar">
      ${[['todos','Todos',ads.length],['hero','🏆 Heróis',heroes.length],['healthy','✅ Saudáveis',healthy.length],['alert','⚠️ Alerta',alertA.length],['cut','✂️ Corte',cut.length]]
        .map(([v,l,n])=>`<button class="ads-filter-btn${ADS_FILTER===v?' active':''}" onclick="ADS_FILTER='${v}';renderAds()">${l} (${n})</button>`).join('')}
    </div>`;

    html+=`<div class="section"><div class="section-header">
      <div class="section-title">Ranking por ROAS — ${period.label}</div>
      <div class="section-badge">${filtered.length} anúncios</div>
    </div><div class="table-wrap"><table class="data-table">
    <thead><tr><th>Anúncio</th><th>Campanha</th><th>Classe</th><th>ROAS</th><th>Receita</th><th>Investimento</th><th>ACOS</th><th>CVR</th><th>Vendas</th></tr></thead><tbody>`;

    filtered.forEach(a=>{
      const cls=adsClass(a.roas);
      const bw=Math.max(4,Math.round(a.roas/maxRoas*70));
      const isS=a.roas>=20&&a.invest<200;
      html+=`<tr>
        <td style="max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${a.titulo}">${adsShortName(a.titulo)}</td>
        <td style="font-size:11px;color:var(--text3);max-width:140px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${a.campanha||'—'}</td>
        <td><span class="${cls.css}">${cls.label}</span>${isS?` <span class="ads-class-sub">subfin.</span>`:''}</td>
        <td><span class="ads-roas-bar" style="width:${bw}px"></span><span style="font-family:'DM Mono',monospace;font-weight:700;color:${a.roas>=20?'var(--green)':a.roas>=8?'var(--text)':'var(--red)'}">${a.roas.toFixed(1)}x</span></td>
        <td style="color:var(--text)">${fmtR(a.receita)}</td>
        <td>${fmtR(a.invest)}</td>
        <td style="color:${a.acos<=6.28?'var(--green)':a.acos<=10?'var(--orange)':'var(--red)'}">${a.acos.toFixed(1)}%</td>
        <td>${a.cvr.toFixed(1)}%</td>
        <td style="font-family:'DM Mono',monospace">${a.vendasTotal.toLocaleString('pt-BR')}</td>
      </tr>`;
    });
    html+=`<tr class="total-row"><td>TOTAL</td><td>—</td><td>—</td>
      <td><strong>${roasG.toFixed(1)}x</strong></td>
      <td>${fmtR(totRec)}</td><td>${fmtR(totInv)}</td>
      <td>${acosG.toFixed(2)}%</td><td>${cvrG.toFixed(1)}%</td><td>${totVend.toLocaleString('pt-BR')}</td></tr>`;
    html+=`</tbody></table></div></div>`;

    // Mini comparativo vs benchmark
    html+=`<div class="ads-compare-grid"><div class="ads-compare-card">
      <div class="ads-compare-title">vs Benchmark mai/2026</div>
      ${[['Receita',fmtRk(totRec),dRec>=0,sign(dRec)+fmtRk(Math.abs(dRec))],
         ['ROAS',roasG.toFixed(1)+'x',dRoas>=0,sign(dRoas)+Math.abs(dRoas).toFixed(1)+'x'],
         ['ACOS',acosG.toFixed(2)+'%',dAcos<=0,sign(dAcos)+Math.abs(dAcos).toFixed(2)+'pp'],
         ['Investimento',fmtRk(totInv),totInv<=ADS_BENCHMARK.investimento,sign(totInv-ADS_BENCHMARK.investimento)+fmtRk(Math.abs(totInv-ADS_BENCHMARK.investimento))],
        ].map(([l,v,g,d])=>`<div class="ads-compare-row">
          <span class="ads-compare-label">${l}</span><span class="ads-compare-val">${v}</span>
          <span class="ads-compare-delta ${g?'ads-delta-up':'ads-delta-down'}">${d}</span></div>`).join('')}
    </div><div class="ads-compare-card">
      <div class="ads-compare-title">Budget por classificação</div>
      ${[['Heróis ≥20x',heroes,true],['Saudáveis 8–20x',healthy,false],['Alerta 5–8x',alertA,false],['Corte <5x',cut,false]]
        .map(([l,arr])=>{const inv=arr.reduce((s,a)=>s+a.invest,0);const pct=totInv>0?inv/totInv*100:0;
          return `<div class="ads-compare-row"><span class="ads-compare-label">${l}</span>
          <span class="ads-compare-val">${fmtR(inv)}</span>
          <span style="font-size:11px;color:var(--text3);font-family:'DM Mono',monospace">${pct.toFixed(0)}%</span></div>`;}).join('')}
    </div></div>`;
  }

  // ════════════════════════════════════════
  //  VIEW: CAMPANHAS
  // ════════════════════════════════════════
  else if(ADS_VIEW==='campanhas'){
    html+=`<div class="section"><div class="section-header">
      <div class="section-title">Performance por campanha</div>
      <div class="section-badge">${campanhas.length} campanhas</div>
    </div><div class="table-wrap"><table class="data-table">
    <thead><tr><th>Campanha</th><th>ROAS médio</th><th>ROAS máx/mín</th><th>Receita</th><th>Investimento</th><th>Anúncios</th><th>Diagnóstico</th></tr></thead><tbody>`;

    campanhas.forEach(c=>{
      const cls=adsClass(c.roas);
      const spread=c.roasMax-c.roasMin;
      let diag='', diagColor='var(--text3)';
      if(spread>20){diag='⚠️ Budget mal distribuído';diagColor='var(--yellow)';}
      else if(c.roas>=20){diag='✅ Campanha sólida';diagColor='var(--green)';}
      else if(c.roas>=8){diag='Saudável';diagColor='var(--text2)';}
      else if(c.roas>=5){diag='👀 Monitorar';diagColor='var(--orange)';}
      else{diag='✂️ Revisar campanhas';diagColor='var(--red)';}

      html+=`<tr>
        <td style="max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:13px" title="${c.campanha}">${c.campanha||'(sem campanha)'}</td>
        <td><span class="${cls.css}">${c.roas.toFixed(1)}x</span></td>
        <td style="font-family:'DM Mono',monospace;font-size:12px;color:var(--text3)">
          <span style="color:var(--green)">${c.roasMax.toFixed(1)}x</span> / <span style="color:${c.roasMin<5?'var(--red)':'var(--text3)'}">${c.roasMin.toFixed(1)}x</span>
        </td>
        <td style="color:var(--text)">${fmtR(c.receita)}</td>
        <td>${fmtR(c.invest)}</td>
        <td style="text-align:center;font-family:'DM Mono',monospace">${c.adsAgg.length}</td>
        <td style="color:${diagColor};font-size:12px">${diag}</td>
      </tr>`;
    });
    html+=`</tbody></table></div></div>`;
  }

  // ════════════════════════════════════════
  //  VIEW: PLANO DE AÇÃO
  // ════════════════════════════════════════
  else if(ADS_VIEW==='acoes'){
    // LISTA 1 — PAUSAR
    html+=`<div class="section"><div class="section-header">
      <div class="section-title" style="color:var(--red)">✂️ Lista 1 — Pausar agora</div>
      <div class="section-badge">${acoes.pausar.length} anúncios · libera ${fmtR(totalEconomia)}</div>
    </div>`;
    if(acoes.pausar.length){
      html+=`<div class="table-wrap"><table class="data-table">
      <thead><tr><th>Anúncio</th><th>Campanha</th><th>ROAS</th><th>Invest. desperdiçado</th><th>Receita gerada</th><th>Ação</th></tr></thead><tbody>`;
      acoes.pausar.forEach(a=>{
        html+=`<tr>
          <td title="${a.titulo}">${a.titulo}</td>
          <td style="font-size:11px;color:var(--text3)">${a.campanha||'—'}</td>
          <td style="color:var(--red);font-family:'DM Mono',monospace;font-weight:700">${a.roas.toFixed(1)}x</td>
          <td style="color:var(--red)">${fmtR(a.invest)}</td>
          <td>${fmtR(a.receita)}</td>
          <td><span class="ads-class-cut">Pausar</span></td>
        </tr>`;
      });
      html+=`</tbody></table></div>`;
    } else html+=`<div style="padding:20px;color:var(--text3);font-size:13px">✅ Nenhum anúncio para pausar neste período.</div>`;
    html+=`</div>`;

    // LISTA 2 — AUMENTAR BUDGET
    html+=`<div class="section"><div class="section-header">
      <div class="section-title" style="color:var(--green)">🚀 Lista 2 — Aumentar budget</div>
      <div class="section-badge">${acoes.aumentar.length} heróis · potencial +${fmtR(totalPotencial)}</div>
    </div>`;
    if(acoes.aumentar.length){
      html+=`<div class="table-wrap"><table class="data-table">
      <thead><tr><th>Anúncio</th><th>Campanha</th><th>ROAS</th><th>Budget atual</th><th>Budget sugerido</th><th>Receita estimada</th></tr></thead><tbody>`;
      acoes.aumentar.forEach(a=>{
        html+=`<tr>
          <td title="${a.titulo}">${a.titulo}</td>
          <td style="font-size:11px;color:var(--text3)">${a.campanha||'—'}</td>
          <td style="color:var(--green);font-family:'DM Mono',monospace;font-weight:700">${a.roas.toFixed(1)}x</td>
          <td>${fmtR(a.investAtual)}</td>
          <td style="color:var(--orange);font-weight:700">${fmtR(a.investSugerido)}</td>
          <td style="color:var(--green)">+${fmtR(a.receitaEstimada)}</td>
        </tr>`;
      });
      html+=`</tbody></table></div>`;
    } else html+=`<div style="padding:20px;color:var(--text3);font-size:13px">✅ Todos os heróis estão adequadamente financiados.</div>`;
    html+=`</div>`;

    // LISTA 3 — ISOLAR
    html+=`<div class="section"><div class="section-header">
      <div class="section-title" style="color:var(--yellow)">⭐ Lista 3 — Isolar em campanha própria</div>
      <div class="section-badge">${acoes.isolar.length} candidatos</div>
    </div>`;
    if(acoes.isolar.length){
      html+=`<div class="table-wrap"><table class="data-table">
      <thead><tr><th>Anúncio</th><th>Campanha atual</th><th>ROAS anúncio</th><th>ROAS campanha</th><th>% do budget</th><th>Ação</th></tr></thead><tbody>`;
      acoes.isolar.forEach(a=>{
        html+=`<tr>
          <td title="${a.titulo}">${a.titulo}</td>
          <td style="font-size:11px;color:var(--text3)">${a.campanha||'—'}</td>
          <td style="color:var(--green);font-family:'DM Mono',monospace;font-weight:700">${a.roas.toFixed(1)}x</td>
          <td style="color:var(--orange);font-family:'DM Mono',monospace">${a.roasCampanha.toFixed(1)}x</td>
          <td style="color:var(--red);font-family:'DM Mono',monospace">${(a.pctBudget*100).toFixed(0)}%</td>
          <td><span class="ads-class-sub">Isolar</span></td>
        </tr>`;
      });
      html+=`</tbody></table></div>`;
    } else html+=`<div style="padding:20px;color:var(--text3);font-size:13px">✅ Nenhum herói preso em campanha mista neste período.</div>`;
    html+=`</div>`;
  }

  // ════════════════════════════════════════
  //  VIEW: ISOLAR HERÓIS (explicativo)
  // ════════════════════════════════════════
  else if(ADS_VIEW==='isolamento'){
    const cands=adsDetectIsolamento(campanhas);
    html+=`<div class="section"><div class="section-header">
      <div class="section-title">⭐ Heróis prontos para voar sozinhos</div>
      <div class="section-badge">${cands.length} candidatos identificados</div>
    </div>`;
    if(!cands.length){
      html+=`<div style="padding:40px;text-align:center;color:var(--text3);font-size:14px">
        Nenhum candidato a isolamento identificado neste período.<br>
        <span style="font-size:12px">Critério: ROAS > 25x, em campanha com outros anúncios ROAS < 10x, recebendo menos de 60% do budget da campanha.</span>
      </div>`;
    }
    cands.forEach(c=>{
      html+=`<div style="background:var(--bg2);border:1px solid rgba(241,196,15,0.3);border-radius:14px;padding:20px 24px;margin-bottom:16px;">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;">
          <div style="flex:1;">
            <div style="font-size:11px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px">Candidato a isolamento</div>
            <div style="font-size:15px;font-weight:700;color:var(--text);margin-bottom:8px">${adsShortName(c.anuncio.titulo)}</div>
            <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;">
              <div style="background:var(--bg3);border-radius:8px;padding:10px 12px;">
                <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px">ROAS do anúncio</div>
                <div style="font-family:'DM Mono',monospace;font-size:18px;font-weight:700;color:var(--green)">${c.anuncio.roas.toFixed(1)}x</div>
              </div>
              <div style="background:var(--bg3);border-radius:8px;padding:10px 12px;">
                <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px">ROAS da campanha</div>
                <div style="font-family:'DM Mono',monospace;font-size:18px;font-weight:700;color:var(--orange)">${c.roasCampanha.toFixed(1)}x</div>
              </div>
              <div style="background:var(--bg3);border-radius:8px;padding:10px 12px;">
                <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px">% do budget</div>
                <div style="font-family:'DM Mono',monospace;font-size:18px;font-weight:700;color:var(--red)">${(c.pctBudget*100).toFixed(0)}%</div>
              </div>
              <div style="background:var(--bg3);border-radius:8px;padding:10px 12px;">
                <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px">Receita gerada</div>
                <div style="font-family:'DM Mono',monospace;font-size:18px;font-weight:700;color:var(--text)">${fmtRk(c.anuncio.receita)}</div>
              </div>
            </div>
          </div>
        </div>
        <div style="margin-top:16px;padding-top:14px;border-top:1px solid var(--border);">
          <div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">Passo a passo no Mercado Ads</div>
          <div style="font-size:13px;color:var(--text2);line-height:1.8;">
            1. Acesse <strong style="color:var(--orange)">Publicidade → Campanhas</strong> e crie uma nova campanha chamada <strong style="color:var(--orange)">"HERO — ${adsShortName(c.anuncio.titulo).slice(0,30)}"</strong><br>
            2. Adicione <strong>somente este anúncio</strong> nessa campanha<br>
            3. Defina o budget inicial como <strong style="color:var(--orange)">${fmtR(Math.max(c.anuncio.invest*1.5, 200))}/mês</strong> (1,5x o que recebia antes)<br>
            4. Pause ou mova o anúncio da campanha original <strong>"${c.campanha.campanha}"</strong><br>
            5. Monitore no próximo checkpoint — o ROAS tende a subir nos primeiros 15 dias
          </div>
        </div>
      </div>`;
    });
    html+=`</div>`;
  }

  // ════════════════════════════════════════
  //  VIEW: COMPARATIVO
  // ════════════════════════════════════════
  else if(ADS_VIEW==='comparativo'){
    // Só mostra se tem 2+ períodos
    if(STATE.ads.length < 2){
      html+=`<div style="padding:60px;text-align:center;color:var(--color-text-secondary,#888)">
        <div style="font-size:32px;margin-bottom:16px">📊</div>
        <div style="font-size:15px;font-weight:500;margin-bottom:8px;color:var(--text,#f0f0f0)">Importe 2 períodos para ver o comparativo</div>
        <div style="font-size:13px">Use o botão <strong>+ Importar período</strong> para adicionar outro mês.</div>
      </div>`;
    } else {
      // Pega os dois períodos mais recentes
      const pA = STATE.ads.length >= 2 ? STATE.ads[STATE.ads.length-2] : STATE.ads[0];
      const pB = STATE.ads[STATE.ads.length-1];
      const adsA = adsAggregate(pA.rows);
      const adsB = adsAggregate(pB.rows);

      // KPIs totais
      const tRA=adsA.reduce((s,a)=>s+a.receita,0), tIA=adsA.reduce((s,a)=>s+a.invest,0);
      const tCA=adsA.reduce((s,a)=>s+a.cliques,0), tVA=adsA.reduce((s,a)=>s+a.vendasTotal,0);
      const tRB=adsB.reduce((s,a)=>s+a.receita,0), tIB=adsB.reduce((s,a)=>s+a.invest,0);
      const tCB=adsB.reduce((s,a)=>s+a.cliques,0), tVB=adsB.reduce((s,a)=>s+a.vendasTotal,0);
      const roasA=tIA>0?tRA/tIA:0, roasB=tIB>0?tRB/tIB:0;
      const acosA=tRA>0?tIA/tRA*100:0, acosB=tRB>0?tIB/tRB*100:0;
      const cvrA=tCA>0?tVA/tCA*100:0, cvrB=tCB>0?tVB/tCB*100:0;
      const heroesA=adsA.filter(a=>a.roas>=20).length, heroesB=adsB.filter(a=>a.roas>=20).length;
      const subfA=adsA.filter(a=>a.roas>=20&&a.invest<200).length;
      const subfB=adsB.filter(a=>a.roas>=20&&a.invest<200).length;

      const fR=n=>'R$ '+Math.round(n).toLocaleString('pt-BR');
      const fRk=n=>n>=1000?'R$ '+(n/1000).toFixed(1).replace('.',',')+'k':fR(n);
      const sg=n=>n>0?'+':'';
      const dRec=tRB-tRA, dRoas=roasB-roasA, dAcos=acosB-acosA, dCvr=cvrB-cvrA, dInv=tIB-tIA;

      // Mapa por título para cruzar anúncios
      const mapA={}, mapB={};
      adsA.forEach(a=>mapA[a.titulo]=a);
      adsB.forEach(a=>mapB[a.titulo]=a);

      // Maiores altas por delta ROAS
      const altas = Object.keys(mapB).filter(t=>mapA[t])
        .map(t=>({titulo:t, rA:mapA[t].roas, rB:mapB[t].roas, recA:mapA[t].receita, recB:mapB[t].receita, delta:mapB[t].roas-mapA[t].roas}))
        .filter(x=>x.delta>0).sort((a,b)=>b.delta-a.delta).slice(0,6);

      // Maiores quedas
      const quedas = Object.keys(mapB).filter(t=>mapA[t])
        .map(t=>({titulo:t, rA:mapA[t].roas, rB:mapB[t].roas, recA:mapA[t].receita, recB:mapB[t].receita, delta:mapB[t].roas-mapA[t].roas}))
        .filter(x=>x.delta<0).sort((a,b)=>a.delta-b.delta).slice(0,6);

      // Novos em B (não existiam em A)
      const novos = adsB.filter(a=>!mapA[a.titulo]).sort((a,b)=>b.roas-a.roas).slice(0,5);

      // Saíram (existiam em A, não estão em B com receita)
      const saiu = adsA.filter(a=>!mapB[a.titulo]||mapB[a.titulo].receita<10).sort((a,b)=>b.roas-a.roas).slice(0,5);

      // Turnaround mais dramático
      const turnaround = altas.length ? altas[0] : null;
      const urgente = saiu.filter(a=>a.roas>=20).length ? saiu.filter(a=>a.roas>=20)[0] : null;

      // Insight automático
      const pct = tRA>0?((tRB-tRA)/tRA*100):0;
      const sentido = pct>=0?'cresceu':'caiu';
      html+=`<div style="display:flex;gap:12px;padding:14px 16px;border-radius:12px;background:rgba(232,119,34,0.07);border:0.5px solid rgba(232,119,34,0.3);margin-bottom:20px;">
        <div style="font-size:20px;flex-shrink:0">💡</div>
        <div style="font-size:13px;color:var(--text,#f0f0f0);line-height:1.65;">
          <strong style="color:#E87722;display:block;margin-bottom:3px">${pB.label} vs ${pA.label}</strong>
          Receita ${sentido} <strong style="color:${pct>=0?'#2ecc71':'#e74c3c'}">${pct>=0?'+':''}${pct.toFixed(0)}%</strong> (${fRk(tRA)} → ${fRk(tRB)}).
          ROAS ${dRoas>=0?'melhorou':'piorou'} de ${roasA.toFixed(1)}x para ${roasB.toFixed(1)}x.
          ${turnaround?`Maior virada: <strong style="color:#2ecc71">${adsShortName(turnaround.titulo)}</strong> saltou de ${turnaround.rA.toFixed(1)}x para ${turnaround.rB.toFixed(1)}x ROAS.`:''}
          ${urgente?`Atenção: <strong style="color:#e74c3c">${adsShortName(urgente.titulo)}</strong> era herói em ${pA.label} e zerou em ${pB.label}.`:''}
        </div>
      </div>`;

      // KPIs lado a lado
      html+=`<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:24px;">
        ${[
          ['💰 Receita', fRk(tRA), fRk(tRB), dRec>=0, sg(dRec)+fRk(Math.abs(dRec))],
          ['📈 ROAS', roasA.toFixed(1)+'x', roasB.toFixed(1)+'x', dRoas>=0, sg(dRoas)+Math.abs(dRoas).toFixed(1)+'x'],
          ['🎯 ACOS', acosA.toFixed(2)+'%', acosB.toFixed(2)+'%', dAcos<=0, sg(dAcos)+Math.abs(dAcos).toFixed(2)+'pp'],
          ['🔄 CVR', cvrA.toFixed(1)+'%', cvrB.toFixed(1)+'%', dCvr>=0, sg(dCvr)+Math.abs(dCvr).toFixed(1)+'pp'],
          ['🏆 Heróis', heroesA+'', heroesB+'', heroesB>=heroesA, sg(heroesB-heroesA)+(heroesB-heroesA)],
          ['💸 Investimento', fRk(tIA), fRk(tIB), dInv<=0, sg(dInv)+fRk(Math.abs(dInv))],
        ].map(([label,vA,vB,good,delta])=>`
          <div style="background:var(--bg2,#141414);border:1px solid var(--border,#2a2a2a);border-radius:14px;padding:14px 16px;">
            <div style="font-size:11px;color:var(--text3,#666);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px">${label}</div>
            <div style="display:flex;justify-content:space-between;align-items:baseline;gap:6px;">
              <span style="font-size:13px;color:var(--text2,#aaa)">${vA}</span>
              <span style="font-size:20px;font-weight:500;color:var(--text,#f0f0f0)">${vB}</span>
            </div>
            <span style="display:inline-block;font-size:11px;padding:2px 8px;border-radius:12px;margin-top:4px;background:${good?'rgba(46,204,113,0.12)':'rgba(231,76,60,0.12)'};color:${good?'#2ecc71':'#e74c3c'}">${delta}</span>
          </div>`).join('')}
      </div>`;

      // Tabs de detalhe
      html+=`<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;" id="compTabBar">
        <button class="ads-filter-btn active" onclick="adsCompTab('altas',this)">⬆️ Maiores altas (${altas.length})</button>
        <button class="ads-filter-btn" onclick="adsCompTab('quedas',this)">⬇️ Maiores quedas (${quedas.length})</button>
        <button class="ads-filter-btn" onclick="adsCompTab('novos',this)">✨ Novos (${novos.length})</button>
        <button class="ads-filter-btn" onclick="adsCompTab('saiu',this)">👻 Saíram (${saiu.length})</button>
      </div>`;

      // Tabela altas (default visível)
      const buildRow = (titulo, rA, rB, recA, recB, tipo) => {
        const delta = rB - rA;
        const cor = tipo==='alta'?'#2ecc71':'#e74c3c';
        return `<tr>
          <td style="max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${titulo}">${adsShortName(titulo)}</td>
          <td>${rA.toFixed(1)}x</td>
          <td style="color:${cor};font-weight:500">${rB.toFixed(1)}x</td>
          <td style="color:${cor}">${delta>0?'+':''}${delta.toFixed(1)}x</td>
          <td style="color:var(--text2,#aaa)">${fR(recA)}</td>
          <td style="color:${cor}">${fR(recB)}</td>
        </tr>`;
      };

      const tblHeader = `<thead><tr>
        <th style="text-align:left">Anúncio</th>
        <th style="text-align:right">${pA.label.slice(0,12)}</th>
        <th style="text-align:right">${pB.label.slice(0,12)}</th>
        <th style="text-align:right">Δ ROAS</th>
        <th style="text-align:right">Receita A</th>
        <th style="text-align:right">Receita B</th>
      </tr></thead>`;

      const tblAltas = `<div id="comp-altas" style=""><div class="table-wrap"><table class="data-table">${tblHeader}<tbody>${altas.map(x=>buildRow(x.titulo,x.rA,x.rB,x.recA,x.recB,'alta')).join('')}</tbody></table></div></div>`;
      const tblQuedas = `<div id="comp-quedas" style="display:none"><div class="table-wrap"><table class="data-table">${tblHeader}<tbody>${quedas.map(x=>buildRow(x.titulo,x.rA,x.rB,x.recA,x.recB,'queda')).join('')}</tbody></table></div></div>`;
      const tblNovos = `<div id="comp-novos" style="display:none"><div class="table-wrap"><table class="data-table">
        <thead><tr><th style="text-align:left">Anúncio novo em ${pB.label.slice(0,12)}</th><th style="text-align:right">ROAS</th><th style="text-align:right">Receita</th><th style="text-align:right">Investimento</th></tr></thead>
        <tbody>${novos.map(a=>`<tr><td style="max-width:220px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${a.titulo}">${adsShortName(a.titulo)}</td><td style="text-align:right;color:${a.roas>=20?'#2ecc71':'var(--text,#f0f0f0)'};font-weight:${a.roas>=20?'500':'400'}">${a.roas.toFixed(1)}x</td><td style="text-align:right">${fR(a.receita)}</td><td style="text-align:right">${fR(a.invest)}</td></tr>`).join('')}</tbody>
      </table></div></div>`;
      const tblSaiu = `<div id="comp-saiu" style="display:none"><div class="table-wrap"><table class="data-table">
        <thead><tr><th style="text-align:left">Anúncio em ${pA.label.slice(0,12)}</th><th style="text-align:right">ROAS era</th><th style="text-align:right">Receita era</th><th style="text-align:right">Status</th></tr></thead>
        <tbody>${saiu.map(a=>`<tr><td style="max-width:220px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${a.titulo}">${adsShortName(a.titulo)}</td><td style="text-align:right;color:${a.roas>=20?'#2ecc71':'var(--text,#f0f0f0)'}">${a.roas.toFixed(1)}x</td><td style="text-align:right">${fR(a.receita)}</td><td style="text-align:right"><span style="font-size:10px;padding:2px 8px;border-radius:12px;background:rgba(231,76,60,0.12);color:#e74c3c">${a.roas>=20?'Herói perdido':'Saiu'}</span></td></tr>`).join('')}</tbody>
      </table></div></div>`;

      html += tblAltas + tblQuedas + tblNovos + tblSaiu;
    }
  }

  main.innerHTML=html;

  // Tabs do comparativo — roda após innerHTML
  if(ADS_VIEW==='comparativo'){
    window.adsCompTab = (tab, btn) => {
      ['altas','quedas','novos','saiu'].forEach(t=>{
        const el=document.getElementById('comp-'+t);
        if(el) el.style.display = t===tab?'':'none';
      });
      document.querySelectorAll('#compTabBar .ads-filter-btn').forEach(b=>b.classList.remove('active'));
      if(btn) btn.classList.add('active');
    };
  }
}

// ── Carrega arquivo ───────────────────────────
function adsLoadFile(file){
  if(!file) return;
  const msg=document.getElementById('syncMsg');
  const dot=document.getElementById('syncDot');
  dot.className='sync-dot loading';
  if(msg) msg.textContent='Processando relatório Mercado Ads...';

  const doProcess=()=>{
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const result=parseAdsXLSX(e.target.result);
        if(!result.rows||result.rows.length===0){
          alert('Nenhum dado encontrado. Verifique se é um relatório de Anúncios Patrocinados do Mercado Ads.');
          dot.className='sync-dot error';
          if(msg) msg.textContent='Erro ao processar relatório Ads';
          return;
        }
        // Label do período
        let label=result.periodoLabel||file.name.replace(/\.xlsx?$/i,'');
        // Se já existe mesmo label, sobrescreve
        const exists=STATE.ads.findIndex(a=>a.label===label);
        if(exists>=0) STATE.ads.splice(exists,1);
        STATE.ads.push({label, rows:result.rows, dias:result.dias||30});
        // Ordena por posição cronológica (ordem de importação)
        STATE.selPeriodoAds=STATE.ads.length-1;
        dot.className='sync-dot';
        if(msg) msg.textContent=`✓ Ads importado · ${result.rows.length} linhas · ${label} · ${result.dias} dias`;
        document.getElementById('syncTime').textContent='Atualizado às '+new Date().toLocaleTimeString('pt-BR');
        renderAds();
      }catch(err){
        console.error(err);
        alert('Erro: '+err.message);
        dot.className='sync-dot error';
        if(msg) msg.textContent='Erro ao processar arquivo Ads';
      }
    };
    reader.readAsArrayBuffer(file);
  };

  if(window.XLSX){ doProcess(); }
  else{
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
    s.onload=doProcess;
    s.onerror=()=>alert('Não foi possível carregar a biblioteca XLSX. Verifique sua conexão.');
    document.head.appendChild(s);
  }
}

//  ABA PRODUTIVIDADE — Primícia
// ══════════════════════════════════════════════
function renderProdutividade(){
  const HORAS_TURNO = 10; // Dia: 07-17 / Noite: 20-06
  // Filtra por mês selecionado
  const allProdRows = STATE.f2.filter(r => r.operador && r.operador.trim() !== '');
  const rows = STATE.selMonth
    ? allProdRows.filter(r => extractMonth(r.data) === STATE.selMonth)
    : allProdRows;
  const main = document.getElementById('main');

  if(!rows.length){
    main.innerHTML=`<div class="empty" style="padding:80px;text-align:center;color:var(--text3)">
      <div style="font-size:40px;margin-bottom:16px">📈</div>
      <div style="font-size:16px;font-weight:700;color:var(--text2);margin-bottom:8px">Nenhum dado de produtividade em ${monthLabel(STATE.selMonth)}</div>
      <div style="font-size:13px">Preencha as colunas máquina, turno, operador na planilha Primícia.</div>
    </div>`;
    return;
  }

  // ── Helpers ──────────────────────────────────
  // Horas proporcional ao kg para produtividade
  const rowsProd = calcHorasProporcional(rows, HORAS_TURNO);

  function groupBy(arr, key){
    return arr.reduce((acc,r)=>{
      const k=r[key]||'—';
      if(!acc[k]) acc[k]={kg:0,mil:0,perda:0,lotes:0,horas:0};
      acc[k].kg+=r.kg; acc[k].mil+=r.mil;
      acc[k].perda+=r.perda; acc[k].lotes++;
      acc[k].horas+=r.horasLote; // usa horas reais do lote
      return acc;
    },{});
  }

  const byOp    = groupBy(rowsProd,'operador');
  const byMaq   = groupBy(rowsProd,'maquina');
  const byMed   = groupBy(rowsProd,'med');
  const byTurno = groupBy(rowsProd,'turno');
  const byData  = groupBy(rowsProd,'data');

  // kg/hora e mil/hora
  function kgh(d){ return d.horas>0 ? d.kg/d.horas : 0; }
  function milh(d){ return d.horas>0 ? d.mil/d.horas : 0; }

  // Totais
  const totalKg   = rows.reduce((s,r)=>s+r.kg,0);
  const totalMil  = rows.reduce((s,r)=>s+r.mil,0);
  const totalH    = rowsProd.reduce((s,r)=>s+r.horasLote,0);
  const totalKgH  = totalH>0 ? totalKg/totalH : 0;
  const totalMilH = totalH>0 ? totalMil/totalH : 0;

  // Melhor dia
  const melhorDia = Object.entries(byData).sort((a,b)=>kgh(b[1])-kgh(a[1]))[0];
  const piorDia   = Object.entries(byData).sort((a,b)=>kgh(a[1])-kgh(b[1]))[0];

  const cores = ['#E87722','#5b8af5','#2ecc71','#a55eea','#f1c40f','#e74c3c','#1abc9c'];

  // ── KPIs ─────────────────────────────────────
  let html=`<div class="kpis">
    <div class="kpi"><div class="kpi-icon">⚡</div><div class="kpi-label">kg/hora geral</div>
      <div class="kpi-val" style="color:var(--orange)">${totalKgH.toFixed(1)}</div>
      <div class="kpi-sub">média todas máquinas</div></div>
    <div class="kpi"><div class="kpi-icon">📦</div><div class="kpi-label">Mil/hora geral</div>
      <div class="kpi-val" style="color:var(--blue)">${totalMilH.toFixed(2)}</div>
      <div class="kpi-sub">milheiros por hora</div></div>
    <div class="kpi"><div class="kpi-icon">⏱️</div><div class="kpi-label">Horas registradas</div>
      <div class="kpi-val">${totalH.toLocaleString('pt-BR')}</div>
      <div class="kpi-sub">${rows.length} lotes · ${HORAS_TURNO}h/turno</div></div>
    <div class="kpi"><div class="kpi-icon">🏆</div><div class="kpi-label">Melhor dia</div>
      <div class="kpi-val" style="color:var(--green);font-size:18px">${melhorDia?melhorDia[0]:'—'}</div>
      <div class="kpi-sub">${melhorDia?kgh(melhorDia[1]).toFixed(1)+' kg/h':''}</div></div>
    <div class="kpi"><div class="kpi-icon">📉</div><div class="kpi-label">Dia mais fraco</div>
      <div class="kpi-val" style="color:var(--red);font-size:18px">${piorDia?piorDia[0]:'—'}</div>
      <div class="kpi-sub">${piorDia?kgh(piorDia[1]).toFixed(1)+' kg/h':''}</div></div>
  </div>`;

  // ── Gráfico evolução diária ───────────────────
  const diasSort = Object.entries(byData).sort((a,b)=>a[0].localeCompare(b[0]));
  const maxDiaKgH = Math.max(...diasSort.map(d=>kgh(d[1])),1);
  html+=`<div class="chart-wrap">
    <div class="section-header">
      <div class="section-title">📈 Evolução diária — kg/hora</div>
      <div class="section-badge">${HORAS_TURNO}h por turno</div>
    </div>
    <div class="chart-bars" style="height:150px;margin-top:16px">`;
  diasSort.forEach(([data,d],i)=>{
    const h=Math.max(6,Math.round((kgh(d)/maxDiaKgH)*140));
    const cor = kgh(d)>=totalKgH ? 'var(--green)' : 'var(--orange-dim)';
    html+=`<div class="bar-group">
      <div class="bar" style="height:${h}px;background:${cor};border-color:${cor}" 
           title="${data}: ${kgh(d).toFixed(1)} kg/h · ${d.kg.toFixed(0)} kg"></div>
      <div class="bar-lbl">${data}</div>
    </div>`;
  });
  html+=`</div>
    <div style="display:flex;gap:16px;margin-top:10px;font-size:11px;color:var(--text3)">
      <span style="color:var(--green)">■</span><span>Acima da média (${totalKgH.toFixed(1)} kg/h)</span>
      <span style="color:var(--orange)">■</span><span>Abaixo da média</span>
    </div>
  </div>`;

  // ── Grid: Operadores + Máquinas ───────────────
  html+=`<div class="op-grid">`;

  // kg/hora por operador
  const opSort = Object.entries(byOp).sort((a,b)=>kgh(b[1])-kgh(a[1]));
  const maxOpKgH = Math.max(...opSort.map(d=>kgh(d[1])),1);
  html+=`<div class="section">
    <div class="section-header">
      <div class="section-title">👤 kg/hora por Operador</div>
      <div class="section-badge">Turno = ${HORAS_TURNO}h</div>
    </div>
    <div class="table-wrap"><div style="padding:16px"><div class="bar-h-wrap">`;
  opSort.forEach(([op,d],i)=>{
    const v=kgh(d); const pct=v/maxOpKgH*100;
    const cor=cores[i%cores.length];
    const milHora=milh(d);
    html+=`<div class="bar-h-item">
      <div class="bar-h-label" style="width:70px">${op}</div>
      <div class="bar-h-track">
        <div class="bar-h-fill" style="width:${pct}%;background:${cor}">${v.toFixed(1)} kg/h</div>
      </div>
      <div class="bar-h-val" style="width:80px">${milHora.toFixed(2)} mil/h</div>
    </div>`;
  });
  html+=`</div></div></div></div>`;

  // kg/hora por máquina
  const maqSort = Object.entries(byMaq).sort((a,b)=>kgh(b[1])-kgh(a[1]));
  const maxMaqKgH = Math.max(...maqSort.map(d=>kgh(d[1])),1);
  html+=`<div class="section">
    <div class="section-header">
      <div class="section-title">⚙️ kg/hora por Máquina</div>
    </div>
    <div class="table-wrap"><div style="padding:16px"><div class="bar-h-wrap">`;
  maqSort.forEach(([maq,d],i)=>{
    const v=kgh(d); const pct=v/maxMaqKgH*100;
    const cor=cores[i%cores.length];
    html+=`<div class="bar-h-item">
      <div class="bar-h-label" style="width:70px">${maq}</div>
      <div class="bar-h-track">
        <div class="bar-h-fill" style="width:${pct}%;background:${cor}">${v.toFixed(1)} kg/h</div>
      </div>
      <div class="bar-h-val" style="width:80px">${milh(d).toFixed(2)} mil/h</div>
    </div>`;
  });
  html+=`</div></div></div></div>`;
  html+=`</div>`; // fim op-grid

  // ── kg/hora por medida ────────────────────────
  const medSort = Object.entries(byMed).sort((a,b)=>kgh(b[1])-kgh(a[1]));
  const maxMedKgH = Math.max(...medSort.map(d=>kgh(d[1])),1);
  html+=`<div class="section">
    <div class="section-header">
      <div class="section-title">📐 kg/hora por Medida</div>
      <div class="section-badge">${medSort.length} medidas</div>
    </div>
    <div class="table-wrap"><div style="padding:16px 16px 8px"><div class="bar-h-wrap">`;
  medSort.forEach(([med,d],i)=>{
    const v=kgh(d); const pct=v/maxMedKgH*100;
    const cor=v>=totalKgH?'var(--green)':'var(--orange)';
    html+=`<div class="bar-h-item">
      <div class="bar-h-label" style="width:70px;font-family:DM Mono,monospace;font-size:11px">${med}</div>
      <div class="bar-h-track">
        <div class="bar-h-fill" style="width:${pct}%;background:${cor}">${v.toFixed(1)} kg/h</div>
      </div>
      <div class="bar-h-val" style="width:90px">${milh(d).toFixed(2)} mil/h</div>
    </div>`;
  });
  html+=`</div></div></div></div>`;

  // ── Comparativo turno Dia vs Noite ────────────
  const turnoSort = Object.entries(byTurno).sort((a,b)=>kgh(b[1])-kgh(a[1]));
  html+=`<div class="op-grid">`;
  html+=`<div class="section">
    <div class="section-header"><div class="section-title">🌅 Turno Dia vs Noite — kg/hora</div></div>
    <div class="turno-compare">`;
  turnoSort.forEach(([turno,d])=>{
    const icon=turno.toLowerCase().includes('dia')?'☀️':'🌙';
    const v=kgh(d); const vm=milh(d);
    const cor=v>=totalKgH?'var(--green)':'var(--orange)';
    html+=`<div class="turno-card">
      <div class="turno-title">${icon} Turno ${turno}</div>
      <div class="turno-stat"><span class="turno-stat-label">kg/hora</span>
        <span class="turno-stat-val" style="color:${cor};font-size:20px">${v.toFixed(1)}</span></div>
      <div class="turno-stat"><span class="turno-stat-label">Milheiros/hora</span>
        <span class="turno-stat-val">${vm.toFixed(2)}</span></div>
      <div class="turno-stat"><span class="turno-stat-label">kg total</span>
        <span class="turno-stat-val">${d.kg.toFixed(0)} kg</span></div>
      <div class="turno-stat"><span class="turno-stat-label">Horas totais</span>
        <span class="turno-stat-val">${d.horas}h</span></div>
      <div class="turno-stat"><span class="turno-stat-label">Lotes</span>
        <span class="turno-stat-val">${d.lotes}</span></div>
    </div>`;
  });
  html+=`</div></div>`;

  // Tabela completa operadores
  html+=`<div class="section">
    <div class="section-header"><div class="section-title">📊 Tabela completa — Operadores</div></div>
    <div class="table-wrap"><table class="data-table"><thead><tr>
      <th>Operador</th><th>Lotes</th><th>KG Total</th><th>Milheiros</th><th>Horas</th><th>kg/hora</th><th>Mil/hora</th><th>Perda kg</th><th>% Perda</th>
    </tr></thead><tbody>`;
  opSort.forEach(([op,d])=>{
    const v=kgh(d); const vm=milh(d);
    const pctP=d.kg>0?d.perda/d.kg*100:0;
    const corKgH=v>=totalKgH?'var(--green)':'var(--orange)';
    html+=`<tr>
      <td style="font-weight:700">${op}</td>
      <td>${d.lotes}</td>
      <td>${d.kg.toFixed(0)}</td>
      <td>${d.mil.toLocaleString('pt-BR')}</td>
      <td>${d.horas}h</td>
      <td style="color:${corKgH};font-weight:700">${v.toFixed(1)}</td>
      <td>${vm.toFixed(2)}</td>
      <td style="color:var(--red)">${d.perda.toFixed(1)}</td>
      <td style="color:${pctP<3?'var(--green)':pctP<6?'var(--orange)':'var(--red)'}">${pctP.toFixed(1)}%</td>
    </tr>`;
  });
  html+=`</tbody></table></div></div>`;
  html+=`</div>`; // fim op-grid


  // ── PROJEÇÃO MENSAL ──────────────────────────────────────────────────────
  const maqAtivas = Object.keys(byMaq).length || 1;

  // Passo 1: define ano/mês selecionado
  let anoSel, mesSel;
  if(STATE.selMonth){
    const [_mm, _yy] = STATE.selMonth.split('/');
    mesSel = parseInt(_mm) - 1; // 0-indexed
    anoSel = parseInt('20' + _yy);
  } else {
    const _n = new Date();
    anoSel = _n.getFullYear();
    mesSel = _n.getMonth();
  }

  // Passo 2: "hoje" = data mais recente nos dados (não depende do relógio do PC)
  let diaRef = 1;
  rowsProd.forEach(r=>{
    const [_dd] = r.data.split('/').map(Number);
    if(_dd > diaRef) diaRef = _dd;
  });

  const ehMesAtual  = true; // sempre trata o mês selecionado como "em andamento" se há dados
  const ultimoDia   = new Date(anoSel, mesSel+1, 0).getDate();

  // Passo 3: conta dias úteis
  function contarUteis(inicio, fim){
    let u = 0;
    for(let d = inicio; d <= fim; d++){
      const dow = new Date(anoSel, mesSel, d).getDay();
      if(dow >= 1 && dow <= 5) u++;
    }
    return u;
  }

  const diasPassados   = contarUteis(1, diaRef);
  const diasRestantes  = contarUteis(diaRef + 1, ultimoDia);
  const totalDiasUteis = diasPassados + diasRestantes;

  const horasDia       = 20; // 2 turnos × 10h
  const horasRestantes = diasRestantes * horasDia * maqAtivas;
  const kghGeral       = totalH > 0 ? totalKg / totalH : 0;
  const kgProjetado    = kghGeral * horasRestantes;
  const kgTotalMes     = totalKg + kgProjetado;
  const pctConcluido   = totalDiasUteis > 0 ? (diasPassados / totalDiasUteis) * 100 : 0;
  const corBarra       = pctConcluido >= 80 ? 'var(--green)' : pctConcluido >= 50 ? 'var(--orange)' : 'var(--blue)';

  html += `
  <div class="section">
    <div class="section-header">
      <div class="section-title">🔮 Projeção Mensal — ${monthLabel(STATE.selMonth)}</div>
      <div class="section-badge">${maqAtivas} máq. · 2 turnos · ${horasDia}h/dia</div>
    </div>
    <div class="table-wrap" style="margin-bottom:16px">
      <div style="padding:20px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
          <span style="font-size:13px;color:var(--text2);font-weight:600">Progresso do mês</span>
          <span style="font-family:'DM Mono',monospace;font-size:13px;color:var(--text3)">${diasPassados} de ${totalDiasUteis} dias úteis</span>
        </div>
        <div style="background:var(--bg3);border-radius:6px;height:28px;overflow:hidden">
          <div style="width:${pctConcluido.toFixed(1)}%;height:100%;background:${corBarra};border-radius:6px;display:flex;align-items:center;padding-left:12px;transition:width .6s">
            <span style="font-family:'DM Mono',monospace;font-size:12px;font-weight:700;color:#000;white-space:nowrap">${pctConcluido.toFixed(0)}% concluído</span>
          </div>
        </div>
        <div style="display:flex;justify-content:space-between;margin-top:6px;font-size:11px;color:var(--text3);font-family:'DM Mono',monospace">
          <span>01/${(mesSel+1).toString().padStart(2,'0')}/${anoSel}</span>
          <span style="color:var(--orange)">▲ dia ${diaRef}</span>
          <span>${ultimoDia}/${(mesSel+1).toString().padStart(2,'0')}/${anoSel}</span>
        </div>
      </div>
    </div>
    <div class="kpis" style="margin-bottom:0">
      <div class="kpi">
        <div class="kpi-icon">✅</div>
        <div class="kpi-label">Já produzido</div>
        <div class="kpi-val" style="color:var(--green)">${totalKg.toLocaleString('pt-BR',{maximumFractionDigits:0})} kg</div>
        <div class="kpi-sub">${diasPassados} dias úteis · ${totalH.toFixed(0)}h</div>
      </div>
      <div class="kpi">
        <div class="kpi-icon">🔮</div>
        <div class="kpi-label">Projeção restante</div>
        <div class="kpi-val" style="color:var(--blue)">${kgProjetado.toLocaleString('pt-BR',{maximumFractionDigits:0})} kg</div>
        <div class="kpi-sub">${diasRestantes} dias úteis restantes</div>
      </div>
      <div class="kpi">
        <div class="kpi-icon">📊</div>
        <div class="kpi-label">Total projetado mês</div>
        <div class="kpi-val" style="color:var(--orange)">${kgTotalMes.toLocaleString('pt-BR',{maximumFractionDigits:0})} kg</div>
        <div class="kpi-sub">base: ${kghGeral.toFixed(1)} kg/h médio</div>
      </div>
      <div class="kpi">
        <div class="kpi-icon">⚡</div>
        <div class="kpi-label">kg/hora atual</div>
        <div class="kpi-val">${kghGeral.toFixed(1)}</div>
        <div class="kpi-sub">todas as máquinas</div>
      </div>
      <div class="kpi">
        <div class="kpi-icon">🏭</div>
        <div class="kpi-label">Máquinas ativas</div>
        <div class="kpi-val">${maqAtivas}</div>
        <div class="kpi-sub">de 3 disponíveis</div>
      </div>
    </div>
  </div>`;

  main.innerHTML=html;
}


// ══════════════════════════════════════════════
//  ABA OPERACIONAL — Primícia
// ══════════════════════════════════════════════
function renderOperacional(){
  // Apenas dados da Primícia com operador preenchido
  // Filtra por mês selecionado
  const allOpRows = STATE.f2.filter(r => r.operador && r.operador.trim() !== '');
  const rows = STATE.selMonth
    ? allOpRows.filter(r => extractMonth(r.data) === STATE.selMonth)
    : allOpRows;
  const main = document.getElementById('main');

  if(!rows.length){
    main.innerHTML=`<div class="empty" style="padding:80px;text-align:center;color:var(--text3)">
      <div style="font-size:40px;margin-bottom:16px">📋</div>
      <div style="font-size:16px;font-weight:700;color:var(--text2);margin-bottom:8px">Nenhum dado operacional em ${monthLabel(STATE.selMonth)}</div>
      <div style="font-size:13px">Preencha as colunas máquina, turno, operador e perda na planilha Primícia.</div>
    </div>`;
    return;
  }

  // ── Agrupadores ──────────────────────────────
  function groupBy(arr, key){
    return arr.reduce((acc,r)=>{ const k=r[key]||'—'; if(!acc[k])acc[k]={kg:0,mil:0,perda:0,lotes:0}; acc[k].kg+=r.kg; acc[k].mil+=r.mil; acc[k].perda+=r.perda; acc[k].lotes++; return acc; },{});
  }

  const byOp  = groupBy(rows,'operador');
  const byMaq = groupBy(rows,'maquina');
  const byTurno = groupBy(rows,'turno');

  // ── KPI totais ───────────────────────────────
  const totalKg    = rows.reduce((s,r)=>s+r.kg,0);
  const totalMil   = rows.reduce((s,r)=>s+r.mil,0);
  const totalPerda = rows.reduce((s,r)=>s+r.perda,0);
  const eficiencia = totalKg>0 ? ((totalKg-totalPerda)/totalKg*100) : 0;

  // ── Média kg/unidade por medida (padrão histórico) ──
  const mediaPorMed={};
  const consAll={};
  [...STATE.f1,...STATE.f2].forEach(r=>{
    if(!consAll[r.med])consAll[r.med]={kg:0,mil:0};
    consAll[r.med].kg+=r.kg; consAll[r.med].mil+=r.mil;
  });
  Object.keys(consAll).forEach(med=>{
    const c=consAll[med];
    if(c.mil>0) mediaPorMed[med]=c.kg/(c.mil*1000);
  });

  // ── Alertas inteligentes ─────────────────────
  const HORAS_TURNO_AL = 10;

  const rowsComHoras = calcHorasProporcional(rows, HORAS_TURNO_AL);
  const f2ComHoras   = calcHorasProporcional(STATE.f2.filter(r=>r.operador&&r.operador.trim()!==''), HORAS_TURNO_AL);

  // Média histórica de kg/hora por medida (base para alertas de produtividade)
  const mediaKgHAlerta = {};
  const contMedAl = {};
  f2ComHoras.forEach(r=>{
    if(!r.med) return;
    const kgh = r.kg / r.horasLote;
    if(!mediaKgHAlerta[r.med]){ mediaKgHAlerta[r.med]=0; contMedAl[r.med]=0; }
    mediaKgHAlerta[r.med] += kgh;
    contMedAl[r.med]++;
  });
  Object.keys(mediaKgHAlerta).forEach(med=>{
    mediaKgHAlerta[med] = mediaKgHAlerta[med] / contMedAl[med];
  });

  const alertas=[];

  // 1. Lotes com produtividade kg/hora ACIMA da média da medida (>20%)
  // 2. Lotes com produtividade kg/hora ABAIXO da média da medida (>20%)
  rowsComHoras.forEach(r=>{
    if(!r.med||!r.kg) return;
    const kghLote = r.kg / r.horasLote;
    const mediaMed = mediaKgHAlerta[r.med];
    if(!mediaMed) return;
    const desvio = (kghLote - mediaMed) / mediaMed;
    if(desvio > 0.20){
      // Alerta expira após 2 dias
      const [dd2a,mm2a] = r.data.split('/').map(Number);
      const dataLote2a = new Date(new Date().getFullYear(), mm2a-1, dd2a);
      const diffDias2a = (new Date() - dataLote2a) / (1000*60*60*24);
      if(diffDias2a <= 2){
        alertas.push({
          tipo:'green', icon:'🟢',
          titulo:`Lote acima da média — ${r.med} · ${r.data}`,
          msg:`${r.operador||'—'} na ${r.maquina||'—'} (Turno ${r.turno||'—'}): ${kghLote.toFixed(1)} kg/h vs média ${mediaMed.toFixed(1)} kg/h da medida → <strong>+${(desvio*100).toFixed(0)}% acima</strong>`
        });
      }
    } else if(desvio < -0.20){
      // Alerta expira após 2 dias
      const [dd2b,mm2b] = r.data.split('/').map(Number);
      const dataLote2b = new Date(new Date().getFullYear(), mm2b-1, dd2b);
      const diffDias2b = (new Date() - dataLote2b) / (1000*60*60*24);
      if(diffDias2b <= 2){
        alertas.push({
          tipo:'red', icon:'🔴',
          titulo:`Lote abaixo da média — ${r.med} · ${r.data}`,
          msg:`${r.operador||'—'} na ${r.maquina||'—'} (Turno ${r.turno||'—'}): ${kghLote.toFixed(1)} kg/h vs média ${mediaMed.toFixed(1)} kg/h da medida → <strong>${(desvio*100).toFixed(0)}% abaixo</strong>`
        });
      }
    }
  });

  // 3. Operador com perda acima da média geral
  const perdaMediaGeral = totalKg>0 ? totalPerda/totalKg*100 : 0;
  Object.entries(byOp).forEach(([op,d])=>{
    const perdaOp = d.kg>0 ? d.perda/d.kg*100 : 0;
    if(perdaOp > perdaMediaGeral*1.3 && d.perda>0){
      alertas.push({
        tipo:'yellow', icon:'⚠️',
        titulo:`${op} — Perda acima da média`,
        msg:`Perda de ${d.perda.toFixed(1)} kg (${perdaOp.toFixed(1)}% do produzido) — média geral é ${perdaMediaGeral.toFixed(1)}%`
      });
    }
  });

  // 4. Turno com produtividade muito abaixo
  const turnoVals = Object.values(byTurno).map(d=>d.kg);
  const mediaKgTurno = turnoVals.reduce((a,b)=>a+b,0)/(turnoVals.length||1);
  Object.entries(byTurno).forEach(([turno,d])=>{
    if(d.kg < mediaKgTurno*0.7 && turnoVals.length>1){
      alertas.push({
        tipo:'blue', icon:'🔵',
        titulo:`Turno ${turno} — Produção abaixo da média`,
        msg:`Produziu ${d.kg.toFixed(0)} kg — média entre turnos é ${mediaKgTurno.toFixed(0)} kg`
      });
    }
  });

  // Ordena: primeiro vermelhos, depois amarelos, verdes, azuis
  const ordemTipo = {red:0, yellow:1, green:2, blue:3};
  alertas.sort((a,b)=>(ordemTipo[a.tipo]||9)-(ordemTipo[b.tipo]||9));

  // ── Sistema de pontuação (bonificação) ───────
  // 80% eficiência vs média kg/hora da medida + 20% constância (dias únicos)
  // Cada lote é comparado com a média histórica de kg/hora daquela medida específica
  // Assim é 100% justo: medida pequena compete com média da medida pequena

  const HORAS_TURNO_OP = 10;

  // Média histórica de kg/hora por medida (todos os lotes da Primícia)
  // Horas proporcional ao kg para o ranking
  const f2Rank = calcHorasProporcional(
    STATE.f2.filter(r=>r.operador&&r.operador.trim()!==''),
    HORAS_TURNO_OP
  );

  const mediaKgHPorMed = {};
  const contMed = {};
  f2Rank.forEach(r=>{
    if(!r.med) return;
    const kgh = r.kg / r.horasLote;
    if(!mediaKgHPorMed[r.med]){ mediaKgHPorMed[r.med]=0; contMed[r.med]=0; }
    mediaKgHPorMed[r.med] += kgh;
    contMed[r.med]++;
  });
  Object.keys(mediaKgHPorMed).forEach(med=>{
    mediaKgHPorMed[med] = mediaKgHPorMed[med] / contMed[med];
  });

  // Dias únicos por operador (constância)
  const diasPorOp = {};
  rows.forEach(r=>{
    if(!r.operador) return;
    if(!diasPorOp[r.operador]) diasPorOp[r.operador] = new Set();
    diasPorOp[r.operador].add(r.data);
  });
  const maxDias = Math.max(...Object.keys(diasPorOp).map(op=>diasPorOp[op].size), 1);

  // Índice de eficiência por operador:
  // Para cada lote: kgh_lote / media_kgh_medida → índice
  // Média de todos os índices do operador = eficiência final
  const eficienciaOp = {};
  const eficienciaDetalhe = {}; // para exibir no rank
  f2Rank.forEach(r=>{
    if(!r.operador||!r.med) return;
    const kghLote = r.kg / r.horasLote;
    const mediaMed = mediaKgHPorMed[r.med] || kghLote;
    const indice = mediaMed > 0 ? kghLote / mediaMed : 1;
    if(!eficienciaOp[r.operador]){ eficienciaOp[r.operador]=[]; }
    eficienciaOp[r.operador].push(indice);
  });
  // Média dos índices de cada operador
  const efMedia = {};
  Object.entries(eficienciaOp).forEach(([op,arr])=>{
    efMedia[op] = arr.reduce((a,b)=>a+b,0)/arr.length;
  });
  const maxEf = Math.max(...Object.values(efMedia), 1);

  const ranking = Object.entries(byOp).map(([op,d])=>{
    const dias = diasPorOp[op] ? diasPorOp[op].size : 0;
    const ef = efMedia[op] || 0;
    const pctPerda = d.kg>0 ? d.perda/d.kg*100 : 0;
    // 80% eficiência vs média da medida + 20% constância
    const pts = Math.round(
      (ef / maxEf) * 80 +
      (dias / maxDias) * 20
    );
    return {op, kg:d.kg, mil:d.mil, perda:d.perda, lotes:d.lotes, dias, ef, pctPerda, pts};
  }).sort((a,b)=>b.pts-a.pts);

  // ── HTML ──────────────────────────────────────
  const medals=['🥇','🥈','🥉'];
  const posClass=['gold','silver','bronze'];

  // KPIs
  let html=`<div class="kpis">

function parseInsumos(csv){
  const lines = parseCSV(csv);
  const result = [];
  let startRow = 1;
  for(let i=0;i<Math.min(5,lines.length);i++){
    const low = lines[i].map(c=>c.toLowerCase());
    if(low.includes('data')||low.includes('tipo')) { startRow=i+1; break; }
  }
  for(let i=startRow;i<lines.length;i++){
    const c = lines[i];
    if(!c[0]||!c[0].trim()) continue;
    const raw = c[0].trim();
    let data = '';
    if(raw.match(/^\d{1,2}\/\d{1,2}/)){
      data = raw.split('/').slice(0,2).map(p=>p.padStart(2,'0')).join('/');
    } else if(raw.includes('GMT')||raw.match(/^[A-Za-z]{3}\s/)){
      const d=new Date(raw);
      if(!isNaN(d)) data=String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0');
    }
    if(!data) continue;
    const tipo    = (c[1]||'').trim().toUpperCase();   // ENVIO | RETORNO
    const destino = (c[2]||'').trim();                 // ALP | Fabiano | Toninho | Primícia
    const insumo  = (c[3]||'').trim();                 // Grão | Pigmento | Dessecante | Bobina | Aparas | Grão Reciclado | Tubos | Envelope
    const kgRaw   = String(c[4]||'').replace(',','.').trim();
    const kg      = parseFloat(kgRaw) || 0;
    if(!tipo||!destino||!insumo||kg<=0) continue;
    const obs = (c[5]||'').trim();
    result.push({ data, tipo, destino, insumo, kg, obs });
  }
  return result;
}

// KG total da Primícia produzido (envelopes registrados na aba Primícia) — abate bobinas

function calcSaldoInsumos(){
  const mes = STATE.selMonth; // ex: "06/2026"
  const todosLanc = STATE.insumos || [];

  // Filtra lançamentos manuais pelo mês selecionado
  function noMes(l){
    if(!mes) return true;
    const m = extractMonth(l.data);
    return m === mes;
  }

  // Saldo acumulado ATÉ o mês anterior (saldo anterior)
  // Para cada terceiro: enviado_anterior - recebido_anterior
  function saldoAnterior(terceiro){
    if(!mes) return 0;
    const [mm, yy] = mes.split('/').map(Number);
    const envAnt = todosLanc
      .filter(l => l.tipo==='ENVIO' && l.destino===terceiro)
      .filter(l => { const m=extractMonth(l.data); if(!m) return false; const [lm,ly]=m.split('/').map(Number); return ly<yy||(ly===yy&&lm<mm); })
      .reduce((s,l)=>s+l.kg, 0);
    const retAnt = todosLanc
      .filter(l => l.tipo==='RETORNO' && l.destino===terceiro)
      .filter(l => { const m=extractMonth(l.data); if(!m) return false; const [lm,ly]=m.split('/').map(Number); return ly<yy||(ly===yy&&lm<mm); })
      .reduce((s,l)=>s+l.kg, 0);
    // ALP: desconta também envelopes automáticos anteriores
    const alpAnt = terceiro==='ALP'
      ? STATE.f1.filter(r=>{ const m=extractMonth(r.data); if(!m) return false; const [lm,ly]=m.split('/').map(Number); return ly<yy||(ly===yy&&lm<mm); }).reduce((s,r)=>s+r.kg,0)
      : 0;
    return envAnt - retAnt - alpAnt;
  }

  const lancMes = todosLanc.filter(noMes);

  // Envios e retornos manuais do mês
  const envios   = {};
  const retornos = {};
  lancMes.forEach(l => {
    if(l.tipo==='ENVIO')   envios[l.destino]   = (envios[l.destino]  ||0) + l.kg;
    if(l.tipo==='RETORNO') retornos[l.destino] = (retornos[l.destino]||0) + l.kg;
  });

  // ALP: envelopes automáticos do mês (aba ALP filtrada pelo mês)
  const alpEnvAuto = STATE.f1
    .filter(r => !mes || extractMonth(r.data)===mes)
    .reduce((s,r)=>s+r.kg, 0);

  // Primícia: bobinas recebidas no mês vs envelopes produzidos no mês
  const bobinasPrimicia = lancMes
    .filter(l => l.tipo==='RETORNO' && (l.destino==='ALP'||l.destino==='Fabiano') && l.insumo==='Bobina')
    .reduce((s,l)=>s+l.kg, 0);
  const envPrimicia = STATE.f2
    .filter(r => !mes || extractMonth(r.data)===mes)
    .reduce((s,r)=>s+r.kg, 0);
  const saldoBobinaPrimicia = bobinasPrimicia - envPrimicia;

  const terceiros = ['ALP','Fabiano','Toninho'];
  const saldos = terceiros.map(t => {
    const anterior  = saldoAnterior(t);
    const enviado   = envios[t]   || 0;
    const retManual = retornos[t] || 0;
    const retAuto   = t==='ALP' ? alpEnvAuto : 0;
    const recebido  = retManual + retAuto;
    const saldo     = anterior + enviado - recebido;
    return { terceiro:t, anterior, enviado, recebido, retManual, retAuto, saldo };
  });

  const totalEnviado  = saldos.reduce((s,x)=>s+x.enviado,  0);
  const totalRecebido = saldos.reduce((s,x)=>s+x.recebido, 0);
  const totalSaldo    = saldos.reduce((s,x)=>s+x.saldo,    0);

  return { saldos, totalEnviado, totalRecebido, totalSaldo, bobinasPrimicia, envPrimicia, saldoBobinaPrimicia, alpEnvAuto, lancamentos: lancMes, todosLanc };
}

async function insExcluir(idx){
  const l = STATE.insumos[idx];
  if(!l) return;
  if(!confirm(`Excluir lançamento?\n${l.tipo} · ${l.destino} · ${l.insumo} · ${insKgFmt(l.kg)}\nData: ${l.data}`)) return;

  try {
    const res = await fetch(SCRIPT_URL, {
      method:'POST',
      body: JSON.stringify({ action:'deleteInsumo', index: idx, data:l.data, tipo:l.tipo, destino:l.destino, insumo:l.insumo, kg:l.kg }),
      headers:{'Content-Type':'application/json'}
    });
    const json = await res.json();
    if(json.success){
      STATE.insumos.splice(idx, 1);
      insToast('Lançamento excluído.','ok');
      renderInsumos();
    } else {
      // Fallback: remove localmente mesmo sem Apps Script confirmado
      STATE.insumos.splice(idx, 1);
      insToast('Removido localmente (sincronize o Apps Script)','info');
      renderInsumos();
    }
  } catch(e) {
    // Remove localmente mesmo sem conexão
    STATE.insumos.splice(idx, 1);
    insToast('Removido localmente.','info');
    renderInsumos();
  }
}
  const data   = document.getElementById('insData').value;
  const dest   = document.getElementById('insDest').value;
  const insumo = document.getElementById('insInsumo').value;
  const kg     = parseFloat(document.getElementById('insKg').value);
  const obs    = document.getElementById('insObs').value.trim();

  if(!data)           return insToast('Informe a data.','err');
  if(!dest)           return insToast('Selecione o destino/origem.','err');
  if(!insumo)         return insToast('Selecione o insumo.','err');
  if(isNaN(kg)||kg<=0) return insToast('Informe um kg válido.','err');

  const btn = document.getElementById('insFormBtn');
  btn.disabled = true;
  btn.textContent = 'SALVANDO...';

  const payload = {
    action: 'addInsumo',
    data: data.split('-').reverse().join('/'), // converte yyyy-mm-dd → dd/mm/yyyy
    tipo: INS_TAB,
    destino: dest,
    insumo,
    kg,
    obs
  };

  try {
    const res = await fetch(SCRIPT_URL, {
      method:'POST',
      body: JSON.stringify(payload),
      headers:{'Content-Type':'application/json'}
    });
    const json = await res.json();
    if(json.success){
      // Adiciona localmente para feedback imediato
      const [dd,mm] = payload.data.split('/');
      STATE.insumos.push({ data:`${dd}/${mm}`, tipo:INS_TAB, destino:dest, insumo, kg, obs });
      insToast('Lançamento salvo!','ok');
      document.getElementById('insKg').value = '';
      document.getElementById('insObs').value = '';
      renderInsumos();
    } else {
      insToast('Erro: '+(json.error||'falha ao salvar'),'err');
    }
  } catch(e) {
    // Fallback: salva localmente sem persistir (para teste sem Apps Script)
    const [dd,mm] = payload.data.split('/');
    STATE.insumos.push({ data:`${dd}/${mm}`, tipo:INS_TAB, destino:dest, insumo, kg, obs });
    insToast('Salvo localmente (Apps Script não conectado)','info');
    document.getElementById('insKg').value = '';
    document.getElementById('insObs').value = '';
    renderInsumos();
  } finally {
    btn.disabled = false;
    insAtualizarFormulario();
  }
}

function insToast(msg, tipo){
  const t = document.getElementById('insToast');
  t.textContent = msg;
  t.className = 'ins-toast '+tipo;
  t.style.display = 'block';
  setTimeout(()=>{ t.style.display='none'; }, 3000);
}

function insKgFmt(n){
  if(!n&&n!==0) return '—';
  return n.toLocaleString('pt-BR',{minimumFractionDigits:0,maximumFractionDigits:1})+' kg';
}

  html += `<div class="section-header"><div class="section-title">⚖️ Saldo por Terceiro</div></div>`;
  html += `<div class="ins-saldo-grid">`;

  const icons = { ALP:'🏭', Fabiano:'⚙️', Toninho:'♻️' };
  S.saldos.forEach(s => {
    const pct = (s.anterior + s.enviado) > 0 ? Math.min(100, s.recebido/(s.anterior+s.enviado)*100) : 0;
    const cor  = s.saldo <= 0 ? 'var(--green)' : s.saldo/(Math.max(s.anterior+s.enviado,1)) > 0.3 ? 'var(--red)' : 'var(--yellow)';
    html += `<div class="ins-saldo-card">
      <div class="ins-saldo-title">${icons[s.terceiro]||'🏢'} ${s.terceiro}</div>`;
    if(s.anterior > 0){
      html += `<div class="ins-saldo-row">
        <span class="ins-saldo-row-label">Saldo anterior</span>
        <span class="ins-saldo-row-val" style="color:var(--yellow)">${insKgFmt(s.anterior)}</span>
      </div>`;
    }
    html += `<div class="ins-saldo-row">
        <span class="ins-saldo-row-label">Enviado no mês</span>
        <span class="ins-saldo-row-val" style="color:var(--text)">${insKgFmt(s.enviado)}</span>
      </div>
      <div class="ins-saldo-row">
        <span class="ins-saldo-row-label">Retornado (manual)</span>
        <span class="ins-saldo-row-val" style="color:var(--text2)">${insKgFmt(s.retManual)}</span>
      </div>`;
    if(s.terceiro === 'ALP'){
      html += `<div class="ins-saldo-row">
        <span class="ins-saldo-row-label">Envelopes ALP (auto)</span>
        <span class="ins-saldo-row-val" style="color:var(--blue)">${insKgFmt(s.retAuto)}</span>
      </div>`;
    }
    html += `<div class="ins-saldo-total">
        <span class="ins-saldo-total-label">Saldo a receber</span>
        <span class="ins-saldo-total-val" style="color:${cor}">${insKgFmt(s.saldo)}</span>
      </div>
      <div class="ins-saldo-bar">
        <div class="ins-saldo-bar-fill" style="width:${pct.toFixed(1)}%;background:${pct>=100?'var(--green)':pct>=50?'var(--orange)':'var(--red)'}"></div>
      </div>
      <div style="font-size:10px;color:var(--text3);margin-top:5px;font-family:'DM Mono',monospace">${pct.toFixed(0)}% retornado</div>
    </div>`;
  });

  // Card Primícia — ciclo bobina → envelope
  const pctPrim = S.bobinasPrimicia > 0 ? Math.min(100, S.envPrimicia/S.bobinasPrimicia*100) : 0;
  html += `<div class="ins-saldo-card" style="grid-column:1/-1;border-color:rgba(91,138,245,.35)">
    <div class="ins-saldo-title">🏠 Primícia — Ciclo Bobina → Envelope</div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;">
      <div>
        <div class="ins-saldo-row-label" style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Bobinas Recebidas</div>
        <div style="font-family:'DM Mono',monospace;font-size:20px;font-weight:700;color:var(--blue)">${insKgFmt(S.bobinasPrimicia)}</div>
        <div style="font-size:11px;color:var(--text3);margin-top:2px">de ALP + Fabiano</div>
      </div>
      <div>
        <div class="ins-saldo-row-label" style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Produzido (Envelopes)</div>
        <div style="font-family:'DM Mono',monospace;font-size:20px;font-weight:700;color:var(--orange)">${insKgFmt(S.envPrimicia)}</div>
        <div style="font-size:11px;color:var(--text3);margin-top:2px">aba Primícia (auto)</div>
      </div>
      <div>
        <div class="ins-saldo-row-label" style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Saldo Bobina</div>
        <div style="font-family:'DM Mono',monospace;font-size:20px;font-weight:700;color:${S.saldoBobinaPrimicia>0?'var(--yellow)':'var(--green)'}">${insKgFmt(S.saldoBobinaPrimicia)}</div>
        <div style="font-size:11px;color:var(--text3);margin-top:2px">aguardando corte</div>
      </div>
    </div>
    <div class="ins-saldo-bar" style="margin-top:16px">
      <div class="ins-saldo-bar-fill" style="width:${pctPrim.toFixed(1)}%;background:var(--blue)"></div>
    </div>
    <div style="font-size:10px;color:var(--text3);margin-top:5px;font-family:'DM Mono',monospace">${pctPrim.toFixed(0)}% das bobinas já virou envelope</div>
  </div>`;

  html += `</div>`; // fim ins-saldo-grid

  // Formulário de lançamento
  html += `<div class="ins-form-wrap">
    <div class="ins-form-title">✏️ Novo Lançamento</div>
    <div class="ins-form-tabs">
      <button class="ins-form-tab active" data-tab="ENVIO" onclick="insSetTab('ENVIO')">↑ Envio para Terceiro</button>
      <button class="ins-form-tab" data-tab="RETORNO" onclick="insSetTab('RETORNO')">↓ Retorno de Terceiro</button>
    </div>
    <div class="ins-form-grid">
      <div class="ins-form-group">
        <label class="ins-form-label">Data</label>
        <input class="ins-form-input" type="date" id="insData" value="${hoje}">
      </div>
      <div class="ins-form-group">
        <label class="ins-form-label">Destino / Origem</label>
        <select class="ins-form-input" id="insDest">
          <option value="ALP">ALP</option>
          <option value="Fabiano">Fabiano</option>
          <option value="Toninho">Toninho</option>
        </select>
      </div>
      <div class="ins-form-group">
        <label class="ins-form-label">Insumo</label>
        <select class="ins-form-input" id="insInsumo">
          <option value="Grão">Grão</option>
          <option value="Pigmento">Pigmento</option>
          <option value="Dessecante">Dessecante</option>
          <option value="Aparas">Aparas</option>
        </select>
      </div>
      <div class="ins-form-group">
        <label class="ins-form-label">Kg</label>
        <input class="ins-form-input" type="number" id="insKg" placeholder="ex: 1860" step="0.001" min="0">
      </div>
      <div class="ins-form-group">
        <label class="ins-form-label">Observação</label>
        <input class="ins-form-input" type="text" id="insObs" placeholder="Opcional">
      </div>
    </div>
    <div style="margin-top:16px;display:flex;align-items:center;gap:16px;">
      <button class="ins-form-btn" id="insFormBtn" onclick="insSalvar()">↑ REGISTRAR ENVIO</button>
      <span style="font-size:12px;color:var(--text3)">⚠️ Envelopes ALP são lançados automaticamente via aba ALP</span>
    </div>
  </div>`;

  // Histórico
  let hist = [...(STATE.insumos||[])];
  if(INS_FILTER_TIPO) hist = hist.filter(l=>l.tipo===INS_FILTER_TIPO);
  if(INS_FILTER_DEST) hist = hist.filter(l=>l.destino===INS_FILTER_DEST);
  hist.sort((a,b)=>b.data.localeCompare(a.data));

  html += `<div class="section">
    <div class="section-header">
      <div class="section-title">📋 Histórico de Lançamentos</div>
      <div class="section-badge">${hist.length} registros</div>
    </div>
    <div class="ins-hist-filter">
      <select onchange="INS_FILTER_TIPO=this.value;renderInsumos()">
        <option value="">Todos os tipos</option>
        <option value="ENVIO" ${INS_FILTER_TIPO==='ENVIO'?'selected':''}>Envio</option>
        <option value="RETORNO" ${INS_FILTER_TIPO==='RETORNO'?'selected':''}>Retorno</option>
      </select>
      <select onchange="INS_FILTER_DEST=this.value;renderInsumos()">
        <option value="">Todos os terceiros</option>
        <option value="ALP" ${INS_FILTER_DEST==='ALP'?'selected':''}>ALP</option>
        <option value="Fabiano" ${INS_FILTER_DEST==='Fabiano'?'selected':''}>Fabiano</option>
        <option value="Toninho" ${INS_FILTER_DEST==='Toninho'?'selected':''}>Toninho</option>
      </select>
      <button class="btn btn-ghost btn-sm" onclick="INS_FILTER_TIPO='';INS_FILTER_DEST='';renderInsumos()">✕ Limpar</button>
    </div>`;

  if(!hist.length){
    html += `<div class="empty">Nenhum lançamento encontrado.<br><span style="font-size:12px">Use o formulário acima para registrar o primeiro lançamento.</span></div>`;
  } else {
    html += `<div class="table-wrap"><table class="data-table"><thead><tr>
      <th>Data</th><th>Tipo</th><th>Terceiro</th><th>Insumo</th><th>Kg</th><th>Obs</th><th></th>
    </tr></thead><tbody>`;
    hist.forEach((l, i) => {
      // índice real no array STATE.insumos para exclusão
      const realIdx = STATE.insumos.indexOf(l);
      html += `<tr>
        <td style="color:var(--text3);font-size:12px">${l.data}</td>
        <td><span class="${l.tipo==='ENVIO'?'ins-tipo-envio':'ins-tipo-retorno'}">${l.tipo}</span></td>
        <td style="font-weight:700">${l.destino}</td>
        <td><span class="ins-insumo-tag">${l.insumo}</span></td>
        <td>${insKgFmt(l.kg)}</td>
        <td style="color:var(--text3);font-size:12px">${l.obs||'—'}</td>
        <td><button onclick="insExcluir(${realIdx})" style="background:transparent;border:1px solid rgba(231,76,60,.3);color:var(--red);border-radius:6px;padding:3px 10px;font-size:11px;cursor:pointer;font-family:'Syne',sans-serif;font-weight:700;transition:all .2s" onmouseover="this.style.background='rgba(231,76,60,.15)'" onmouseout="this.style.background='transparent'">✕</button></td>
      </tr>`;
    });
    // Linha de total
    const totalHist = hist.reduce((s,l)=>s+l.kg,0);
    html += `<tr class="total-row"><td>TOTAL</td><td></td><td></td><td></td><td>${insKgFmt(totalHist)}</td><td></td><td></td></tr>`;
    html += `</tbody></table></div>`;
  }
  html += `</div>`; // fim section histórico

  main.innerHTML = html;
}

// ── Inicialização automática ao carregar a página ──
window.addEventListener('DOMContentLoaded', ()=>{
  syncSheets();
});

</script>
</body>
</html>
